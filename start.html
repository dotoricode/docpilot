<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>docpilot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0e10;--s:#141518;--s2:#1c1e22;--bd:rgba(255,255,255,.08);
  --t:#e8e9ea;--t2:#9a9b9e;--t3:#5a5c61;--cy:#57c1ff;--ac:#a78bfa;
  --cursor-default:url("assets/cursor-default.png?v=2") 4 2, default;
  --cursor-click:url("assets/cursor-click.png?v=2") 12 4, pointer;
  color-scheme:dark;
}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;
  -webkit-app-region:drag;user-select:none;cursor:var(--cursor-default)}
.titlebar{height:28px;flex-shrink:0}
.content{flex:1;display:flex;flex-direction:column;padding:0 32px 28px;min-height:0;-webkit-app-region:no-drag}
.content *{-webkit-app-region:no-drag}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.logo-icon{width:36px;height:36px;object-fit:contain}
.logo-name{font-size:18px;font-weight:700;letter-spacing:-.02em}
.logo-ver{font-size:11px;color:var(--t3);font-weight:500;margin-top:1px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:var(--t3);margin-bottom:8px}
.recent-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;min-height:0;margin-bottom:16px}
.recent-empty{font-size:12px;color:var(--t3);padding:16px 0;text-align:center}
.recent-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;
  cursor:var(--cursor-click);-webkit-app-region:no-drag;transition:background .1s}
.recent-item:hover{background:var(--s2)}
.recent-icon{font-size:18px;flex-shrink:0}
.recent-info{flex:1;overflow:hidden}
.recent-name{font-size:13px;font-weight:500;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-path{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;font-family:ui-monospace,monospace}
.recent-del{opacity:0;font-size:15px;color:var(--t3);padding:2px 4px;border-radius:4px;
  transition:opacity .1s;-webkit-app-region:no-drag;background:none;border:none;cursor:var(--cursor-click);color:var(--t3)}
.recent-item:hover .recent-del{opacity:1}
.recent-del:hover{color:var(--t);background:rgba(255,255,255,.08)}
.open-btn{width:100%;height:38px;border-radius:8px;border:1px dashed var(--bd);
  background:transparent;color:var(--t2);font-size:13px;font-family:inherit;
  cursor:var(--cursor-click);-webkit-app-region:no-drag;transition:background .12s,border-color .12s,color .12s;
  display:flex;align-items:center;justify-content:center;gap:7px}
.open-btn:hover{background:var(--s2);border-color:rgba(255,255,255,.16);color:var(--t)}
.open-icon{font-size:16px}
.loading{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
  background:rgba(8,9,11,.72);backdrop-filter:blur(8px);-webkit-app-region:no-drag}
.loading.show{display:flex}
.loading-box{min-width:220px;padding:22px 24px;border:1px solid rgba(87,193,255,.24);
  border-radius:12px;background:rgba(20,21,24,.94);display:flex;flex-direction:column;align-items:center;gap:12px}
.spin{width:22px;height:22px;border-radius:50%;border:2px solid rgba(87,193,255,.20);
  border-top-color:var(--cy);animation:spin .75s linear infinite}
.loading-title{font-size:14px;font-weight:700;color:var(--t)}
.loading-sub{font-size:11px;color:var(--t2);font-family:ui-monospace,monospace;max-width:300px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="titlebar"></div>
<div class="content">
  <div class="logo">
    <img class="logo-icon" src="assets/icon.png" onerror="this.style.display='none'">
    <div>
      <div class="logo-name">docpilot</div>
    </div>
  </div>
  <div class="section-label">최근 폴더</div>
  <div class="recent-list" id="recent-list">
    <div class="recent-empty">최근 열었던 폴더가 없습니다</div>
  </div>
  <button class="open-btn" id="open-btn">
    <span class="open-icon">📂</span> 폴더 열기
  </button>
</div>
<div class="loading" id="loading">
  <div class="loading-box">
    <div class="spin"></div>
    <div class="loading-title">문서 가져오는 중</div>
    <div class="loading-sub" id="loading-path">workspace scan</div>
  </div>
</div>
<script>
const dp = window.docpilot;

async function render() {
  const list = await dp.getRecent();
  const el = document.getElementById('recent-list');
  if (!list.length) {
    el.innerHTML = '<div class="recent-empty">최근 열었던 폴더가 없습니다</div>';
    return;
  }
  el.innerHTML = '';
  list.forEach(p => {
    const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
    const name = parts[parts.length - 1] || p;
    const item = document.createElement('div');
    item.className = 'recent-item';
    item.innerHTML = `
      <span class="recent-icon">📁</span>
      <div class="recent-info">
        <div class="recent-name">${esc(name)}</div>
        <div class="recent-path">${esc(p)}</div>
      </div>
      <button class="recent-del" type="button" title="목록에서 제거">×</button>`;
    item.addEventListener('click', () => openFolderPath(p));
    item.querySelector('.recent-del').addEventListener('click', async e => {
      e.stopPropagation();
      await removeFolder(p);
    });
    el.appendChild(item);
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openFolderPath(p) {
  document.getElementById('loading-path').textContent=p;
  document.getElementById('loading').classList.add('show');
  dp.openFolder(p).catch(() => {});
}

async function removeFolder(p) {
  await dp.removeRecent(p);
  render();
}

document.getElementById('open-btn').onclick = async () => {
  const p = await dp.openFolderDialog();
  if (p) openFolderPath(p);
};

render();
</script>
</body>
</html>
