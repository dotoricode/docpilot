<title>docpilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<style>
:root{
  /* Raycast surface ladder */
  --g:#07080a;       /* canvas */
  --s:#0d0d0d;       /* surface */
  --s2:#101111;      /* surface-elevated */
  --s3:#121212;      /* surface-card */
  /* Borders — hairline only, no shadows */
  --bd:#242728;      /* hairline */
  --bd2:rgba(255,255,255,.16); /* hairline-strong */
  /* Text hierarchy */
  --t:#f4f4f6;       /* ink */
  --t2:#cdcdcd;      /* body */
  --t3:#9c9c9d;      /* mute */
  --t4:#6a6b6c;      /* ash */
  /* docpilot brand accent (purple) */
  --ac:#a78bfa;
  --ac-d:rgba(167,139,250,.14);
  --ac-g:rgba(167,139,250,.26);
  /* Blue — interactive highlight */
  --cy:#57c1ff;
  --cy-d:rgba(87,193,255,.15);
  --cy-g:rgba(87,193,255,.28);
  /* Green — success */
  --gn:#59d499;
  --gn-d:rgba(89,212,153,.13);
  /* Red — destructive */
  --rd:#ff6161;
  --rd-d:rgba(255,97,97,.14);
  /* Amber — pin/warning */
  --am:#ffc533;
  --am-d:rgba(255,197,51,.14);
  --cl:#ff9f43;
  --cl-d:rgba(255,159,67,.14);
  --cx:#57c1ff;
  --cx-d:rgba(87,193,255,.15);
  --hi:#dfff00;
  --hi-d:rgba(223,255,0,.24);
  --hi-g:rgba(223,255,0,.45);
  --cursor-default:url("assets/cursor-default.png?v=2") 4 2, default;
  --cursor-click:url("assets/cursor-click.png?v=2") 12 4, pointer;
  --mono:'JetBrains Mono','Cascadia Code','Fira Code',ui-monospace,Consolas,monospace;
  --ui:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--g);color:var(--t);
  font-family:var(--ui);font-size:15px;-webkit-font-smoothing:antialiased;
  font-feature-settings:"calt","kern","liga","ss03";cursor:var(--cursor-default)}
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#hdr{display:flex;align-items:center;height:48px;padding:0 16px;background:var(--s);
  border-bottom:1px solid var(--bd);gap:12px;flex-shrink:0;z-index:20}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pip{width:8px;height:8px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac)}
.vsep{width:1px;height:20px;background:var(--bd2)}
#crumb{flex:1;display:flex;align-items:center;gap:3px;font-family:var(--mono);
  font-size:12px;color:var(--t3);overflow:hidden;white-space:nowrap}
.cs{color:var(--t2)}.csl{color:var(--t3);margin:0 2px}
.hright{display:flex;align-items:center;gap:10px}
.bridge-status{display:flex;align-items:center;justify-content:center;gap:6px;
  width:auto;min-width:96px;height:24px;padding:0 9px;border:1px solid var(--bd);
  border-radius:999px;background:rgba(255,255,255,.035);flex-shrink:0}
.tool-status{display:flex;align-items:center;justify-content:center;gap:7px;
  width:132px;height:28px;padding:0 11px;border:1px solid var(--bd);
  border-radius:999px;background:var(--s2);flex-shrink:0}
.bridge-status.on{border-color:rgba(89,212,153,.24);background:rgba(89,212,153,.08)}
.bridge-status.off{border-color:rgba(255,97,97,.24);background:rgba(255,97,97,.07)}
.bridge-status.pending{border-color:rgba(255,197,51,.22);background:rgba(255,197,51,.07)}
.bridge-status.on #blbl{color:var(--gn)}
.bridge-status.off #blbl{color:var(--rd)}
.bridge-status.pending #blbl{color:var(--am)}
.bdot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;
  transition:background .3s,box-shadow .3s}
.bdot.on{background:var(--gn);box-shadow:0 0 5px rgba(89,212,153,.55)}
.bdot.off{background:var(--rd)}
.bdot.pending{background:var(--am);box-shadow:0 0 5px rgba(255,197,51,.50)}
#blbl{font-size:11px;color:var(--t2);font-weight:700;white-space:nowrap}
.tdot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s,box-shadow .3s}
.tdot.on.claude{background:var(--cl);box-shadow:0 0 7px var(--cl)}
.tdot.on.codex{background:var(--cx);box-shadow:0 0 7px var(--cx)}
.tdot.off{background:var(--rd);box-shadow:0 0 6px rgba(255,97,97,.35)}
.tdot.pending{background:var(--am);box-shadow:0 0 6px var(--am)}
.tool-main{font-size:11.5px;color:var(--t);font-family:var(--mono);font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.tool-state{font-size:11px;color:var(--t3);font-family:var(--ui);font-weight:700;white-space:nowrap}
.tool-status.on{border-color:rgba(89,212,153,.30);background:var(--s2)}
.tool-status.off{border-color:rgba(255,97,97,.30);background:var(--rd-d)}
.tool-status.pending{border-color:rgba(255,197,51,.28);background:var(--am-d)}
.tool-status.on .tool-state{color:var(--gn)}
.tool-status.off .tool-state{color:var(--rd)}
.tool-status.pending .tool-state{color:var(--am)}
.tool-status.on#claude-status{border-color:rgba(255,159,67,.34);background:var(--cl-d)}
.tool-status.on#claude-status .tool-main,
.tool-status.on#claude-status .tool-state{color:var(--cl)}
.tool-status.on#codex-status{border-color:rgba(87,193,255,.34);background:var(--cx-d)}
.tool-status.on#codex-status .tool-main,
.tool-status.on#codex-status .tool-state{color:var(--cx)}
.tlbl{font-size:11px;color:var(--t3);font-family:var(--mono)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;
  border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;
  font-family:var(--ui);transition:background .12s,color .12s}
.btn-ghost{background:transparent;color:var(--t2)}.btn-ghost:hover{background:var(--s2);color:var(--t)}
.btn-ac{background:#ffffff;color:#000000;border:none;letter-spacing:.01em;font-weight:600}
.btn-ac:hover{background:#e8e8e8}
.mtog{display:flex;background:var(--s2);border-radius:8px;padding:2px}
.mbtn{padding:4px 13px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
  border:none;background:transparent;color:var(--t3);font-family:var(--ui);
  transition:background .1s,color .1s;text-transform:uppercase;letter-spacing:.06em}
.mbtn.active{
  background:var(--cy-d);color:var(--cy);
  box-shadow:inset 0 0 0 1px rgba(87,193,255,.28);
}
.badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;border-radius:9999px;font-size:10px;font-weight:700;
  background:var(--cy-d);color:var(--cy)}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* PANEL SHARED */
.panel-hd{display:flex;align-items:center;padding:6px 10px 4px;gap:4px;flex-shrink:0}
.panel-hd .tlbl{flex:1;margin:0;padding:0;line-height:1}
.pcol{width:20px;height:20px;flex-shrink:0;border:none;background:transparent;
  cursor:pointer;color:var(--t3);border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  transition:background .12s,color .12s,transform .2s}
.pcol:hover{background:var(--s2);color:var(--t)}
/* resizer */
.rsz{width:8px;flex-shrink:0;cursor:col-resize;background:transparent;
  transition:background .15s;z-index:30;position:relative}
.rsz::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:1px;
  transform:translateX(-50%);background:rgba(255,255,255,.08);
  transition:background .15s,box-shadow .15s,width .15s}
.rsz:hover{background:rgba(87,193,255,.04)}
.rsz:hover::before,.rsz.dragging::before{width:2px;background:rgba(87,193,255,.72);
  box-shadow:0 0 10px rgba(87,193,255,.26)}
.rsz.dragging{background:rgba(87,193,255,.08)}
body.resizing-panels,body.resizing-panels *{user-select:none!important}

/* LEFT SIDEBAR */
#tree{width:320px;min-width:48px;background:var(--s);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .18s ease}
#tree-body{padding:0 0 8px}
#tree.collapsed{width:28px!important;min-width:28px!important}
#tree.collapsed .left-pane,
#tree.collapsed .left-tabs,
#tree.collapsed .panel-hd .tlbl{opacity:0;pointer-events:none}
#tree.collapsed .pcol{transform:rotate(180deg)}
.left-tabs{display:flex;gap:4px;padding:7px 8px;border-bottom:1px solid var(--bd);flex-shrink:0}
.left-tab-btn{flex:1;height:28px;border:1px solid transparent;border-radius:7px;background:transparent;
  color:var(--t3);font-family:var(--ui);font-size:11.5px;font-weight:600;cursor:pointer}
.left-tab-btn:hover{background:var(--s2);color:var(--t)}
.left-tab-btn.active{
  background:var(--cy-d);border-color:rgba(87,193,255,.34);color:var(--cy);
  box-shadow:inset 0 0 0 1px rgba(87,193,255,.10);
}
.left-tab-count{font-family:var(--mono);font-size:10px;color:var(--cy);margin-left:4px}
.left-pane{display:none!important;overflow-y:auto;flex:1;min-height:0}
.left-pane.active{display:flex!important;flex-direction:column}
.left-pane-note{padding:14px 12px;font-size:11px;color:var(--t3);line-height:1.55}

/* TOC */
#toc-rail{position:absolute;top:14px;left:12px;z-index:35;width:168px;max-height:calc(100% - 28px);
  overflow-y:auto;padding:2px 0 8px;display:flex;flex-direction:column;gap:1px;pointer-events:auto}
#toc-rail.hidden{display:none}
#toc-list{display:flex;flex-direction:column;gap:1px;width:100%}
.toc-item{display:block;width:100%;padding:4px 10px 4px 12px;font-size:11px;color:var(--t3);
  cursor:pointer;border-left:2px solid transparent;border-top:none;border-right:none;border-bottom:none;background:none;text-align:left;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.45;
  transition:color .1s,background .1s;font-family:var(--ui)}
.toc-h1{font-size:11.5px;font-weight:600;color:var(--t2);padding-left:12px}
.toc-h2{padding-left:24px}
.toc-h3{padding-left:36px;font-size:10.5px}
.toc-item:hover{background:rgba(255,255,255,.04);color:var(--t)}
.toc-item.toc-active{color:var(--cy);background:transparent;border-left-color:var(--cy)}

/* INSTRUCTIONS */
#inst{width:260px;min-width:48px;background:var(--s);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .18s ease}
#inst.collapsed{width:28px!important;min-width:28px!important}
#inst.collapsed #inst-body,
#inst.collapsed .panel-hd .tlbl,
#inst.collapsed .inst-count{opacity:0;pointer-events:none}
#inst.collapsed .pcol{transform:rotate(180deg)}
#inst-body{padding:8px;gap:8px}
.inst-count{font-family:var(--mono);font-size:10px;color:var(--cy);padding-right:4px}
.inst-card{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 10px}
.inst-card.off{opacity:.48}
.inst-top{display:flex;gap:6px;align-items:flex-start;margin-bottom:6px}
.inst-title{flex:1;font-size:12px;font-weight:600;color:var(--t);line-height:1.35}
.inst-src{font-size:9.5px;color:var(--t4);font-family:var(--mono);margin-top:5px}
.inst-body{font-size:11.5px;color:var(--t2);line-height:1.55;white-space:pre-wrap;max-height:92px;overflow:hidden}
.inst-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.inst-mini{height:24px;padding:0 8px;border-radius:6px;border:1px solid var(--bd);
  background:transparent;color:var(--t3);font-family:var(--ui);font-size:10.5px;cursor:pointer}
.inst-mini:hover{border-color:var(--bd2);color:var(--t)}
.inst-mini.danger:hover{border-color:var(--rd);color:var(--rd)}
.inst-mini.on{background:var(--gn-d);border-color:rgba(89,212,153,.35);color:var(--gn)}
.inst-form{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px;display:flex;flex-direction:column;gap:8px}
.inst-input,.inst-ta,.inst-select{width:100%;background:var(--s3);border:1px solid var(--bd);
  color:var(--t);font-family:var(--ui);font-size:11.5px;border-radius:7px;outline:none}
.inst-input,.inst-select{height:30px;padding:0 9px}
.inst-ta{min-height:86px;max-height:180px;resize:vertical;padding:8px 9px;line-height:1.55}
.inst-input:focus,.inst-ta:focus,.inst-select:focus{border-color:var(--cy)}
.inst-note{font-size:10.5px;color:var(--t4);line-height:1.45}
.inst-empty{font-size:11px;color:var(--t3);line-height:1.6;text-align:center;padding:14px 10px;border:1px dashed var(--bd);border-radius:8px}
.inst-section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t4);margin:2px 0 -2px}
.tlbl{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--t4);padding:10px 14px 5px}
.tf{user-select:none}
.tfhd{display:flex;align-items:center;gap:6px;padding:5px 14px;cursor:pointer;
  font-size:12px;color:var(--t2);transition:background .1s;border-radius:6px;margin:0 5px}
.tfhd:hover{background:var(--s2);color:var(--t)}
.tarr{width:12px;height:12px;flex-shrink:0;color:var(--t3);transition:transform .14s}
.tf.open .tarr{transform:rotate(90deg)}
.tfnm{flex:1;font-weight:500}
.tchl{display:none;padding-left:12px}.tf.open .tchl{display:block}
.tfi{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;
  font-size:11.5px;color:var(--t2);transition:background .1s,color .1s;
  border-radius:6px;margin:1px 5px;font-family:var(--mono)}
.tfi:hover{background:var(--s2);color:var(--t)}
.tfi.active{background:var(--cy-d);color:var(--cy);border-left:2px solid var(--cy);padding-left:8px}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--t3);flex-shrink:0}
.tfi.active .tdot{background:var(--cy)}
.tfnme{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* file icon */
.ficon{width:12px;height:14px;flex-shrink:0;
  background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 14'><path d='M1,0 L8,0 L11,3 L11,14 L1,14 Z M8,0 L8,3 L11,3 Z' fill='%236a6b6c' fill-rule='evenodd'/><path d='M8,0 L8,3 L11,3 Z' fill='%23888'/><rect x='2' y='10' width='7' height='3.5' rx='.8' fill='%23a78bfa'/><text x='5.5' y='12.8' text-anchor='middle' font-size='3.2' font-weight='800' font-family='monospace' fill='%23000'>MD</text></svg>")
  center/contain no-repeat}
.tfi.active .ficon{
  background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 14'><path d='M1,0 L8,0 L11,3 L11,14 L1,14 Z M8,0 L8,3 L11,3 Z' fill='%23a78bfa' fill-rule='evenodd'/><path d='M8,0 L8,3 L11,3 Z' fill='%23c4adfc'/><rect x='2' y='10' width='7' height='3.5' rx='.8' fill='%23fff'/><text x='5.5' y='12.8' text-anchor='middle' font-size='3.2' font-weight='800' font-family='monospace' fill='%23a78bfa'>MD</text></svg>")
  center/contain no-repeat}

/* EDITOR */
#editor{flex:1 0 360px;display:flex;flex-direction:column;overflow:hidden;background:var(--g);min-width:360px}
#etbar{display:none;align-items:center;padding:0 14px;height:36px;border-bottom:1px solid var(--bd);
  gap:8px;flex-shrink:0;background:var(--s)}
.tsep{width:1px;height:14px;background:var(--bd2)}
#tpath{font-size:11px;color:var(--t3);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ebody{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* PREVIEW */
#prev-wrap{flex:1;overflow-y:auto;display:none;position:relative}
#preview{padding:20px 28px;max-width:820px;margin:0 auto;line-height:1.75;cursor:var(--cursor-default)}
@media(min-width:901px){
  #prev-wrap.has-toc #preview{margin-left:200px;margin-right:28px}
}
#preview h1, #pmodal-body h1{font-size:21px;font-weight:700;color:var(--t);margin-bottom:8px;letter-spacing:-.02em;
  border-bottom:1px solid var(--bd);padding-bottom:11px}
#preview h2, #pmodal-body h2{font-size:16px;font-weight:600;color:var(--t);margin:26px 0 9px}
#preview h3, #pmodal-body h3{font-size:14px;font-weight:600;color:var(--t2);margin:18px 0 7px}
#preview p, #pmodal-body p{font-size:14px;color:var(--t2);margin-bottom:10px}
#preview blockquote, #pmodal-body blockquote{border-left:2px solid var(--ac);padding:8px 14px;margin:10px 0;
  background:var(--ac-d);border-radius:0 5px 5px 0}
#preview blockquote p, #pmodal-body blockquote p{color:var(--t2);margin:0;font-size:13px}
#preview code, #pmodal-body code{font-family:var(--mono);font-size:12px;background:var(--s3);padding:2px 5px;border-radius:4px;color:#B8A4F5}
#preview pre, #pmodal-body pre{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:14px 16px;overflow-x:auto;margin:10px 0}
#preview pre code, #pmodal-body pre code{background:none;padding:0;color:var(--t2);font-size:12.5px;line-height:1.65}
#preview table, #pmodal-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
#preview th, #pmodal-body th{text-align:left;padding:7px 11px;border-bottom:1px solid var(--bd2);
  color:var(--t3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
#preview td, #pmodal-body td{padding:7px 11px;border-bottom:1px solid var(--bd);color:var(--t2);vertical-align:top}
#preview li, #pmodal-body li{margin-bottom:3px;color:var(--t2);font-size:14px}
#preview ul,#preview ol, #pmodal-body ol{padding-left:19px;margin-bottom:10px}
#preview a, #pmodal-body a{color:var(--ac);text-decoration:none}#preview a:hover{text-decoration:underline}
#preview hr, #pmodal-body hr{border:none;border-top:1px solid var(--bd);margin:18px 0}
#preview strong, #pmodal-body strong{color:var(--t);font-weight:600}

/* hover/selection highlight on clickable document blocks */
#preview ::selection{background:var(--hi);color:#050608}
#preview p,#preview li,#preview td,#preview th,#preview pre,#preview blockquote,
#preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6{
  transition:background .12s,box-shadow .12s,color .12s;
  cursor:var(--cursor-click);
  -webkit-box-decoration-break:clone;
  box-decoration-break:clone;
}
#preview p *,#preview li *,#preview td *,#preview th *,#preview pre *,#preview blockquote *,
#preview h1 *,#preview h2 *,#preview h3 *,#preview h4 *,#preview h5 *,#preview h6 *{
  cursor:var(--cursor-click);
}
#preview p:hover,#preview li:hover,#preview td:hover,#preview th:hover,#preview blockquote:hover,
#preview h1:hover,#preview h2:hover,#preview h3:hover,#preview h4:hover,#preview h5:hover,#preview h6:hover,
#preview :is(p,li,td,th,blockquote,h1,h2,h3,h4,h5,h6).preview-picked,
#preview :is(p,li,td,th,blockquote,h1,h2,h3,h4,h5,h6).chip-focus-block,
#preview :is(p,li,td,th,blockquote,h1,h2,h3,h4,h5,h6).draw-hit{
  background:linear-gradient(90deg,rgba(223,255,0,.34),rgba(0,229,255,.16)) !important;
  box-shadow:0 0 0 1px rgba(223,255,0,.46),0 0 18px rgba(223,255,0,.18) !important;
  border-radius:6px;
  outline:1px solid rgba(223,255,0,.36);
  outline-offset:1px;
}
#preview pre:hover,
#preview pre.preview-picked,
#preview pre.chip-focus-block,
#preview pre.draw-hit{
  background:linear-gradient(90deg,rgba(223,255,0,.10),rgba(0,229,255,.055)),rgba(12,14,12,.86) !important;
  box-shadow:inset 4px 0 0 var(--hi),0 0 0 1px rgba(223,255,0,.62),0 0 18px rgba(223,255,0,.20) !important;
  border-radius:6px;
  outline:none;
}
#preview :is(p,h1,h2,h3,h4,h5,h6):hover,
#preview :is(p,h1,h2,h3,h4,h5,h6).preview-picked,
#preview :is(p,h1,h2,h3,h4,h5,h6).chip-focus-block,
#preview :is(p,h1,h2,h3,h4,h5,h6).draw-hit{
  margin-left:-8px;
  padding-left:8px;
}
#preview .preview-picked code,
#preview .chip-focus-block code,
#preview .draw-hit code,
#preview :is(p,li,td,th,pre,blockquote,h1,h2,h3,h4,h5,h6):hover code{
  background:rgba(223,255,0,.18);
  color:#f4ff9a;
}
#preview .chip-focus-fragment{
  background:linear-gradient(90deg,rgba(223,255,0,.18),rgba(0,229,255,.08)),rgba(12,14,12,.88);
  box-shadow:0 0 0 1px rgba(223,255,0,.62),0 0 14px rgba(223,255,0,.18);
  border-radius:5px;
  padding:0 2px;
  color:#f4ff9a;
  -webkit-box-decoration-break:clone;
  box-decoration-break:clone;
}
#preview .chip-focus-fragment code,
#preview code .chip-focus-fragment{
  background:rgba(223,255,0,.22);
  color:#f4ff9a;
}
/* draw mode */
#draw-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:200;pointer-events:none;display:none;touch-action:none}
#draw-canvas.active{pointer-events:auto;cursor:none}
.draw-hit{
  transition:none !important;
}
/* draw button */
#draw-btn{
  display:none;align-items:center;gap:5px;height:24px;padding:0 10px;
  font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  border-radius:6px;border:1px solid var(--bd);background:transparent;
  color:var(--t3);cursor:pointer;font-family:var(--ui);
  transition:background .12s,color .12s,border-color .12s;
}
#draw-btn:hover{background:var(--s2);color:var(--t);border-color:var(--bd2)}
#draw-btn.active{background:rgba(255,70,70,.18);color:#ff8080;border-color:rgba(255,70,70,.45)}

/* EDIT SPLIT */
#edit-area{flex:1;display:none}
#edit-area.split{display:flex;flex-direction:row}
#etxt{flex:1;min-width:0;background:var(--g);color:var(--t);font-family:var(--mono);
  font-size:13px;line-height:1.75;border:none;outline:none;resize:none;
  padding:28px 32px;tab-size:2;border-right:1px solid var(--bd)}
#live-frame{flex:1;min-width:0;border:none;background:var(--g)}

/* NOFILE */
#nofile{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:12px;color:var(--t3);padding:40px;text-align:center}
.nfg{font-size:38px;opacity:.2}.nfh{font-size:15px;font-weight:600;color:var(--t2)}
.nfp{font-size:13px;line-height:1.6;max-width:220px}

/* CHIP FLOAT — 프리뷰 우측 상단 floating */
#chip-float{
  position:sticky;top:18px;right:20px;z-index:50;
  display:none;flex-direction:column;align-items:flex-end;gap:7px;
  pointer-events:none;max-width:260px;margin-left:auto;margin-right:20px;width:max-content;height:0;overflow:visible;
}
#chip-float.has-chips{display:flex}
#chip-list{display:flex;flex-direction:column;align-items:flex-end;gap:6px;pointer-events:auto}
.chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 10px 8px 8px;
  background:rgba(87,193,255,.10);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(87,193,255,.34);
  border-radius:22px;
  box-shadow:0 8px 26px rgba(87,193,255,.10),inset 0 0 0 1px rgba(255,255,255,.03);
  cursor:pointer;font-size:12px;color:var(--t);
  transition:border-color .15s,background .15s,transform .1s,box-shadow .15s;
  pointer-events:auto;max-width:250px;
}
.chip:hover{
  transform:translateY(-1px);
  background:rgba(87,193,255,.14);
  border-color:rgba(87,193,255,.50);
  box-shadow:0 10px 30px rgba(87,193,255,.14),inset 0 0 0 1px rgba(255,255,255,.05);
}
.chip.active{
  background:rgba(87,193,255,.16);
  border-color:rgba(87,193,255,.62);
  color:var(--t);
  box-shadow:0 4px 22px rgba(87,193,255,.18),inset 0 0 0 1px rgba(255,255,255,.05);
}
.chip.active:hover{border-color:rgba(87,193,255,.7)}
.chip-num{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  background:rgba(87,193,255,.22);
  font-size:10px;font-weight:800;color:var(--cy);
  display:flex;align-items:center;justify-content:center;line-height:1;
}
.chip.active .chip-num{background:rgba(87,193,255,.30)}
.chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:178px;font-size:12px;font-weight:600}
.chip-x{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-style:normal;opacity:.55;color:rgba(205,205,205,.72);
  transition:opacity .1s,background .1s,color .1s;line-height:1;cursor:pointer;
}
.chip-x:hover{opacity:1;background:rgba(255,97,97,.16);color:var(--rd)}
/* 지시 버튼 */
#chip-instruct-btn{
  pointer-events:auto;
  display:none;align-items:center;gap:7px;
  padding:8px 18px;border-radius:24px;border:1px solid rgba(87,193,255,.35);cursor:pointer;
  background:linear-gradient(135deg,rgba(87,193,255,.20),rgba(167,139,250,.22));
  color:#eaf7ff;font-family:var(--ui);font-size:12.5px;font-weight:800;
  letter-spacing:.04em;
  box-shadow:0 8px 24px rgba(87,193,255,.12),inset 0 0 0 1px rgba(255,255,255,.05);
  transition:filter .15s,transform .1s,border-color .15s,box-shadow .15s;
}
#chip-instruct-btn:hover{filter:brightness(1.08);transform:translateY(-1px);border-color:rgba(87,193,255,.55);box-shadow:0 10px 28px rgba(87,193,255,.16),inset 0 0 0 1px rgba(255,255,255,.06)}
#chip-instruct-btn.visible{display:inline-flex}
#chip-instruct-btn .ai-mark{
  display:inline-block;width:28px;height:18px;min-width:28px;padding:0;border:0;border-radius:0;
  background:url("assets/ai-mark-bond.png?v=1") center/contain no-repeat;
  filter:invert(73%) sepia(61%) saturate(951%) hue-rotate(158deg) brightness(104%) contrast(101%);
  color:transparent;font-size:0;line-height:1;box-shadow:none;
}

/* INSTRUCT MODAL (중앙 대화창) */
#imodal{
  position:fixed;inset:0;z-index:600;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
}
#imodal.show{display:flex}
#imodal-box{
  width:min(580px,92vw);
  background:var(--s2);
  border:1px solid var(--bd2);
  border-radius:16px;
  box-shadow:0 28px 72px rgba(0,0,0,.85);
  display:flex;flex-direction:column;overflow:hidden;
}
#imodal-ctx{padding:14px 18px 0;display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto}
.imodal-chip{
  display:inline-flex;align-items:center;gap:6px;padding:5px 12px;
  background:var(--cy-d);border:1px solid rgba(56,189,248,.3);border-radius:20px;
  font-size:11px;font-family:var(--mono);color:var(--cy);align-self:flex-start;
}
#imodal-ta{
  margin:12px 18px 0;
  background:var(--s3);border:1px solid var(--bd);border-radius:10px;
  color:var(--t);font-family:var(--ui);font-size:13.5px;
  padding:12px 14px;outline:none;resize:none;line-height:1.6;
  min-height:90px;max-height:200px;width:calc(100% - 36px);
}
#imodal-ta:focus{border-color:var(--cy)}
#imodal-ta::placeholder{color:var(--t3)}
#imodal-foot{
  display:flex;align-items:center;padding:12px 18px;gap:10px;
}
#imodal-hint{font-size:11px;color:var(--t3);flex:1}
#imodal-cancel{
  height:34px;padding:0 16px;border-radius:20px;
  border:1px solid var(--bd);background:transparent;
  color:var(--t3);font-family:var(--ui);font-size:12px;cursor:pointer;
}
#imodal-cancel:hover{border-color:var(--bd2);color:var(--t)}
#imodal-send{
  height:34px;padding:0 20px;border-radius:20px;border:none;
  background:linear-gradient(135deg,var(--cy),#5B9EF8);
  color:#fff;font-family:var(--ui);font-size:12.5px;font-weight:700;
  cursor:pointer;letter-spacing:.04em;
  box-shadow:0 2px 12px rgba(56,189,248,.3);
}
#imodal-send:hover{filter:brightness(1.1)}
#imodal-send:disabled{opacity:.4;cursor:default}

/* RIGHT PANEL */
#rpanel{width:300px;min-width:48px;background:var(--s);position:relative;z-index:12;
  border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;
  transition:width .18s ease}
#rpanel.collapsed{width:44px!important;min-width:44px!important}
#rpanel.collapsed #rp-body,
#rpanel.collapsed #rphdr>*:not(.pcol){opacity:0;pointer-events:none}
#rpanel.collapsed #rphdr>*:not(.pcol){display:none!important}
#rpanel.collapsed #rphdr{padding:0;justify-content:center}
#rpanel.collapsed .pcol{width:32px;height:32px;border:1px solid var(--bd);
  background:var(--s2);color:var(--t2);transform:rotate(180deg)}
#rpanel.collapsed .pcol:hover{border-color:var(--bd2);color:var(--t);background:var(--s3)}
#rphdr{display:flex;align-items:center;padding:0 14px;height:38px;
  border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px}
#rphdr-title{font-size:12px;font-weight:600;color:var(--cy);flex:1}
#rp-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.pempty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:9px;color:var(--t3)}
.pei{font-size:28px;opacity:.3}.pet{font-size:12px;text-align:center;line-height:1.6}

/* JOB CARD */
.jcard{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;
  transition:border-color .15s}
.jcard.working{border-color:rgba(87,193,255,.25)}
.jcard.done{border-color:rgba(89,212,153,.35)}
.jcard.error{border-color:rgba(255,97,97,.35)}
.jcard.applying{opacity:.6}
.jfile{font-family:var(--mono);font-size:10px;color:var(--t4);margin-bottom:6px}
.jctx{font-family:var(--mono);font-size:11px;color:var(--cy);background:var(--cy-d);
  border-left:2px solid var(--cy);padding:5px 10px;border-radius:0 6px 6px 0;
  line-height:1.5;margin-bottom:8px;max-height:52px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.jinstr{font-size:12.5px;color:var(--t);font-weight:500;line-height:1.5;margin-bottom:8px}
.jstatus{font-size:11.5px;line-height:1.5;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.spin{width:12px;height:12px;border:2px solid rgba(87,193,255,.2);border-top-color:var(--cy);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.jstream{font-family:var(--mono);font-size:10.5px;color:var(--t2);background:var(--s3);
  border:1px solid var(--bd);border-radius:6px;padding:7px 9px;line-height:1.6;
  max-height:100px;overflow-y:auto;white-space:pre-wrap;margin-bottom:7px;word-break:break-word}
.jactions{display:flex;gap:6px;flex-wrap:wrap}
.japply{height:28px;padding:0 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
  border:none;background:var(--gn);color:#000;font-family:var(--ui);letter-spacing:.02em}
.japply:hover{filter:brightness(1.1)}
.jreject{height:28px;padding:0 11px;border-radius:8px;font-size:11px;cursor:pointer;
  border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:var(--ui)}
.jreject:hover{border-color:var(--rd);color:var(--rd)}
.jts{font-size:10px;color:var(--t4);margin-left:auto;align-self:center}
.jprev{height:28px;padding:0 11px;border-radius:8px;font-size:11px;cursor:pointer;
  border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--ui)}
.jprev:hover{border-color:var(--ac);color:var(--ac)}
.jcombine{height:28px;padding:0 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
  background:var(--s3);color:var(--t);font-family:var(--ui);
  border:1px solid var(--bd2)}
.jcombine:hover{background:var(--ac-d);border-color:var(--ac);color:var(--ac)}

/* PARALLEL AGENT COLUMNS */
.jagents{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.jagent{background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:8px 10px}
.jagent-hdr{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:10.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.jagent-hdr .albl-claude{color:var(--ac)}
.jagent-hdr .albl-codex{color:var(--am)}
.jagent-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.jagent-dot.claude{background:var(--ac)}
.jagent-dot.codex{background:var(--am)}
.jagent .jstream{margin-bottom:6px}
.jagent .jactions{flex-wrap:wrap}

/* PREVIEW MODAL */
#pmodal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px)}
#pmodal.show{display:flex}
#pmodal-box{width:min(820px,90vw);max-height:80vh;display:flex;flex-direction:column;
  background:var(--s);border:1px solid var(--bd2);border-radius:12px;
  overflow:hidden}
#pmodal-hdr{display:flex;align-items:center;padding:0 18px;height:44px;
  border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px}
#pmodal-title{flex:1;font-size:13px;font-weight:600;color:var(--t2)}
#pmodal-body{flex:1;overflow-y:auto;padding:20px 28px;line-height:1.75}
#pmodal-foot{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--bd);
  flex-shrink:0;justify-content:flex-end}

::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--t3)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* Cursor normalization */
#app,#app *{cursor:var(--cursor-default)!important}
#app button,
#app [role="button"],
#app [onclick],
#app .btn,#app .mbtn,#app .pcol,#app .left-tab-btn,#app .toc-item,#app .inst-mini,
#app .tfhd,#app .tfi,#app .chip,#app .chip-x,#app #chip-instruct-btn,
#app #imodal-cancel,#app #imodal-send,#app .japply,#app .jreject,#app .jprev,#app .jcombine,
#preview p,#preview li,#preview td,#preview th,#preview pre,#preview blockquote,
#preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6,
#preview p *,#preview li *,#preview td *,#preview th *,#preview pre *,#preview blockquote *,
#preview h1 *,#preview h2 *,#preview h3 *,#preview h4 *,#preview h5 *,#preview h6 *{
  cursor:var(--cursor-click)!important;
}
#app input,#app textarea,#app select,#app option,
#app button:disabled,
#app [aria-disabled="true"],
#app #imodal-send:disabled{
  cursor:var(--cursor-default)!important;
}
#draw-canvas.active{cursor:none!important}
@media(max-width:900px){
  #toc-rail{position:sticky;top:0;left:0;width:auto;max-height:none;overflow-x:auto;overflow-y:hidden;

  #toc-list{flex-direction:row;gap:4px;width:auto}
  .toc-item{width:auto;max-width:130px;flex:0 0 auto;border-left:none;border-bottom:2px solid transparent;padding:4px 8px}
  .toc-h1,.toc-h2,.toc-h3{padding-left:8px;font-size:10.5px}

}

            <button id="chip-instruct-btn" onclick="openInstructModal()" aria-label="지시하기"><span class="ai-mark" aria-hidden="true"></span><span>지시하기</span></button>

          <div id="preview"></div>

          <textarea id="etxt" spellcheck="false" oninput="onEdit()"></textarea>

        </div>
      </div>
    </section>

    <div class="rsz" id="rp-rsz" onpointerdown="initResize('rpanel',event)" title="우측 패널 폭 조절"></div>
    <aside id="rpanel">
      <div id="rphdr">
        <button class="pcol" onclick="togglePanel('rpanel')" title="접기/펼치기">›</button>
        <span id="rphdr-title">작업 히스토리</span>
        <span class="badge" id="ccbadge" style="display:none"></span>
        <button class="btn btn-ghost" style="height:24px;font-size:11px;padding:0 8px"
                id="clrbtn" onclick="clearJobs()">전체 삭제</button>
      </div>
      <div id="rp-body"></div>
    </aside>
  </div>
</div>

<!-- INSTRUCT MODAL -->
<div id="imodal" onclick="if(event.target===this)closeInstructModal()">
  <div id="imodal-box">
    <div id="imodal-ctx"></div>
    <textarea id="imodal-ta" placeholder="어떻게 수정할까요? (⌘↵ 전송)"
              onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter')submitChips()"></textarea>
    <div id="imodal-foot">
      <span id="imodal-hint">⌘↵ 전송 &nbsp;·&nbsp; Esc 닫기</span>
      <button id="imodal-cancel" onclick="closeInstructModal()">취소</button>
      <button id="imodal-send" onclick="submitChips()">지시 ↑</button>

  <div id="pmodal-box">
    <div id="pmodal-hdr">
      <span id="pmodal-title">미리보기</span>
      <button class="btn btn-ghost" onclick="closePreview()">✕ 닫기</button>
    </div>
    <div id="pmodal-body"></div>
    <div id="pmodal-foot">
      <button class="jreject" id="pmodal-reject" onclick="closePreview()">거부</button>
      <button class="japply" id="pmodal-apply">적용</button>
    </div>
  </div>
</div>

<script>

/* ── STATE ── */
const S={file:null,mode:'preview',content:{},
  jobs:[],bridge:false,jc:0,
  chips:[],cc:0,
  files:[],instructions:[],pendingInstructionSource:null,editInstructionId:null,
  leftTab:'docs'};

/* ── IFRAME CSS ── */
const FCSS=`body{margin:0;padding:28px 32px;max-width:800px;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
  font-size:14px;line-height:1.75;background:#0E1118;color:#DDE3EE;-webkit-font-smoothing:antialiased}
h1{font-size:20px;font-weight:700;color:#DDE3EE;margin-bottom:8px;letter-spacing:-.02em;
  border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:11px}
h2{font-size:15px;font-weight:600;color:#DDE3EE;margin:26px 0 9px}
h3{font-size:13px;font-weight:600;color:#8A94A8;margin:18px 0 7px}
p{font-size:13.5px;color:#8A94A8;margin-bottom:10px}
blockquote{border-left:2px solid #7C8CF8;padding:7px 14px;margin:10px 0;
  background:rgba(124,140,248,.12);border-radius:0 5px 5px 0}
blockquote p{color:#8A94A8;margin:0;font-size:12.5px}
code{font-family:'Cascadia Code','Fira Code',ui-monospace,Consolas,monospace;font-size:11.5px;
  background:#262F40;padding:2px 5px;border-radius:4px;color:#B8A4F5}
pre{background:#1E2535;border:1px solid rgba(255,255,255,.07);border-radius:7px;
  padding:14px 16px;overflow-x:auto;margin:10px 0}
pre code{background:none;padding:0;color:#8A94A8;font-size:12px;line-height:1.65}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
th{text-align:left;padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.13);
  color:#4A5268;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
td{padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.07);color:#8A94A8;vertical-align:top}
li{margin-bottom:3px;color:#8A94A8;font-size:13.5px}
ul,ol{padding-left:19px;margin-bottom:10px}
a{color:#7C8CF8;text-decoration:none}a:hover{text-decoration:underline}
hr{border:none;border-top:1px solid rgba(255,255,255,.07);margin:18px 0}
strong{color:#DDE3EE;font-weight:600}`;

/* ── MARKDOWN ── */
function md(src){
  const blks=[];
  let s=src.replace(/```[\s\S]*?```/g,m=>{blks.push(m);return'\x00B'+(blks.length-1)+'\x00';});
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/((?:^&gt;.*\n?)+)/gm,b=>`<blockquote><p>${b.replace(/^&gt; ?/gm,'').trim()}</p></blockquote>`);
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/((?:\|.+\|\n?)+)/gm,blk=>{
    const rows=blk.trim().split('\n');let out='<table>',hd=false;
    rows.forEach(r=>{if(/^\|\s*[-: |]+\|/.test(r)){hd=true;return;}
      const cells=r.replace(/^\||\|$/g,'').split('|');const tag=hd?'td':'th';
      out+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';if(!hd)hd=true;});
    return out+'</table>';
  });
  s=s.replace(/^---$/gm,'<hr>');
  s=s.replace(/((?:^- .+\n?)+)/gm,b=>'<ul>'+b.trim().split('\n').map(l=>`<li>${l.slice(2)}</li>`).join('')+'</ul>');
  s=s.replace(/((?:^\d+\. .+\n?)+)/gm,b=>'<ol>'+b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  const blockTags='h[1-6]|ul|ol|pre|blockquote|table';
  s=s
    .replace(new RegExp(`(<(?:${blockTags})\\b[^>]*>|<hr>)`,'g'),'\n\n$1')
    .replace(new RegExp(`(</(?:${blockTags})>|<hr>)`,'g'),'$1\n\n');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.split('\n\n').map(p=>{p=p.trim();if(!p)return'';
    if(/^<(h[1-6]|ul|ol|pre|blockquote|table|hr)/.test(p))return p;
    return'<p>'+p.replace(/\n/g,' ')+'</p>';}).join('\n');
  s=s.replace(/\x00B(\d+)\x00/g,(_,i)=>{const raw=blks[+i];const m=raw.match(/```(\w*)\n([\s\S]*?)```/);if(!m)return'';
    return`<pre><code>${m[2].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;});
  return s;
}

/* ── LIVE FRAME ── */
let fTimer=null;
function schedFrame(){clearTimeout(fTimer);fTimer=setTimeout(updateFrame,150);}
function updateFrame(){
  const id=S.file;if(!id)return;
  const src=S.mode==='edit'?document.getElementById('etxt').value:(S.content[id]||'');
  document.getElementById('live-frame').srcdoc=
    `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${FCSS}</style></head><body>${md(src)}</body></html>`;
}

/* ── TREE ── */
function buildTree(nodes,wrap){
  wrap.innerHTML='';
  nodes.forEach(n=>{
    if(n.t==='folder'){
      const div=document.createElement('div');
      div.className='tf'+(n.open?' open':'');
      div.innerHTML=`<div class="tfhd" onclick="this.parentElement.classList.toggle('open')">
        <svg class="tarr" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 3 8 6 4 9"/></svg>
        <span class="tfnm">${n.name}</span></div><div class="tchl"></div>`;
      n.children.forEach(c=>div.querySelector('.tchl').appendChild(mkF(c)));
      wrap.appendChild(div);
    } else wrap.appendChild(mkF(n));
  });
}
function mkF(n){
  const el=document.createElement('div');
  el.className='tfi'+(S.file===n.id?' active':'');
  el.innerHTML=`<span class="ficon"></span><span class="tfnme">${n.name}</span>`;
  el.onclick=()=>openFile(n.id);
  return el;
}

/* ── PANEL COLLAPSE / RESIZE ── */
function togglePanel(id){
  document.getElementById(id).classList.toggle('collapsed');
}

function setLeftTab(tab){
  if(tab==='toc')tab='docs';
  S.leftTab=tab;
  document.querySelectorAll('.left-tab-btn').forEach(btn=>btn.classList.remove('active'));
  document.querySelectorAll('.left-pane').forEach(pane=>pane.classList.remove('active'));
  document.getElementById('lt-'+tab)?.classList.add('active');
  const paneId=tab==='docs'?'tree-body':'inst-body';
  document.getElementById(paneId)?.classList.add('active');
}

let _rszEl=null,_rszX=0,_rszW=0,_rszRight=false;
function initResize(id,e){
  e.preventDefault();
  _rszEl=document.getElementById(id);
  _rszEl.classList.remove('collapsed');
  _rszX=e.clientX;
  _rszW=_rszEl.offsetWidth;
  _rszRight=(id==='rpanel');
  document.body.classList.add('resizing-panels');
  document.getElementById(id==='rpanel'?'rp-rsz':'tree-rsz').classList.add('dragging');
  document.addEventListener('pointermove',_doRsz);
  document.addEventListener('pointerup',_endRsz);
  document.addEventListener('pointercancel',_endRsz);
}
function _doRsz(e){
  if(!_rszEl)return;
  const dx=_rszRight?(_rszX-e.clientX):(e.clientX-_rszX);
  const w=Math.max(72,Math.min(520,_rszW+dx));
  _rszEl.style.width=w+'px';
  _rszEl.style.minWidth=w+'px';
}
function _endRsz(){
  if(_rszEl){
    document.querySelectorAll('.rsz.dragging').forEach(r=>r.classList.remove('dragging'));
    _rszEl=null;
  }
  document.body.classList.remove('resizing-panels');
  document.removeEventListener('pointermove',_doRsz);
  document.removeEventListener('pointerup',_endRsz);
  document.removeEventListener('pointercancel',_endRsz);
}

/* ── FILE ── */
async function openFile(id){
  S.file=id;
  const pts=id.split('/');
  document.getElementById('crumb').innerHTML=pts.map((p,i)=>
    i<pts.length-1?`<span class="cs">${p}</span><span class="csl">/</span>`
    :`<span style="color:var(--t)">${p}</span>`).join('');
  document.getElementById('etbar').style.display='flex';
  document.getElementById('tpath').textContent=id;
  if(!S.content[id]){
    if(S.bridge){
      try{
        const r=await fetch(`${BRIDGE}/file?id=${encodeURIComponent(id)}`);
        if(r.ok){const d=await r.json();S.content[id]=d.content;}
        else S.content[id]=`# ${id}\n\n(파일을 불러올 수 없습니다)`;
      }catch{S.content[id]=`# ${id}\n\n(문서 연결 오류)`;}
    } else {
      S.content[id]=`# ${id}\n\n(문서 연결이 꺼져 있습니다)`;
    }
  }
  renderEditor();refreshTree();renderToc();
}

/* ── EDITOR ── */
function renderEditor(){
  const id=S.file;if(!id)return;
  document.getElementById('nofile').style.display='none';
  const pw=document.getElementById('prev-wrap');
  const ea=document.getElementById('edit-area');
  const drawBtn=document.getElementById('draw-btn');
  if(S.mode==='preview'){
    pw.style.display='block';ea.className='';
    document.getElementById('svbtn').style.display='none';
    document.getElementById('preview').innerHTML=md(S.content[id]||'');
    drawBtn.style.display='flex';
  } else {
    pw.style.display='none';ea.className='split';
    document.getElementById('svbtn').style.display='flex';
    document.getElementById('etxt').value=S.content[id]||'';
    updateFrame();
    drawBtn.style.display='none';
    if(S.drawMode){S.drawMode=false;setDrawActive(false);}
  }
}
function setMode(m){
  S.mode=m;
  document.getElementById('mp').classList.toggle('active',m==='preview');
  document.getElementById('me').classList.toggle('active',m==='edit');
  renderEditor();renderToc();
}
function onEdit(){if(S.file)S.content[S.file]=document.getElementById('etxt').value;schedFrame();}
async function doSave(){
  if(S.file&&S.bridge){
    try{await fetch(`${BRIDGE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:S.file,content:S.content[S.file]||''})});}catch{}
  }
  setMode('preview');
}

/* ── BRIDGE ── */
const BRIDGE=location.protocol.startsWith('http')?location.origin:'http://localhost:7474';
let bridgeCheckInFlight=false;
async function checkBridge(){
  if(bridgeCheckInFlight)return;
  bridgeCheckInFlight=true;
  try{
    const r=await fetch(BRIDGE+'/ping',{signal:AbortSignal.timeout(800)});
    S.bridge=r.ok;
    if(r.ok){
      const d=await r.json();
      setRootBadge(d.root);
    }
  }
  catch{S.bridge=false;}
  setBridgeState(S.bridge?'on':'off');
  setInstructHint();
  if(S.bridge){
    try{
      const r=await fetch(BRIDGE+'/status',{signal:AbortSignal.timeout(800)});
      if(r.ok){
        const d=await r.json();
        setToolState('claude',d.claude?'on':'off');
        setToolState('codex',d.codex?'on':'off');
      } else {
        setToolState('claude','unknown');
        setToolState('codex','unknown');
      }
    }catch{
      setToolState('claude','unknown');
      setToolState('codex','unknown');
    }
  } else {
    setToolState('claude','unknown');
    setToolState('codex','unknown');
  }
  bridgeCheckInFlight=false;
}
function setRootBadge(root){
  const badge=document.getElementById('root-badge');
  if(!badge||!root)return;
  const parts=String(root).split(/[\\/]+/).filter(Boolean);
  const name=parts[parts.length-1]||root;
  badge.textContent='root: '+name;
  badge.title=root;
}
function setBridgeState(state){
  const box=document.getElementById('bridge-status');
  const dot=document.getElementById('bdot');
  const lbl=document.getElementById('blbl');
  const connected=state==='on';
  const text=state==='pending'?'확인 중':connected?'문서 연결됨':'문서 끊김';
  box.className='bridge-status '+state;
  dot.className='bdot '+state;
  lbl.textContent=text;
  box.title=connected?'로컬 문서와 AI 작업을 사용할 수 있습니다.':
    state==='pending'?'로컬 문서 연결을 확인하는 중입니다.':
    '로컬 문서에 연결되지 않았습니다. docpilot 서버를 확인하세요.';
}
function setToolState(tool,state){
  const box=document.getElementById(tool+'-status');
  const dot=document.getElementById(tool+'-dot');
  const stateEl=document.getElementById(tool+'-state');
  const name=tool==='claude'?'Claude':'Codex';
  const cls=state==='on'?'on':state==='off'?'off':'pending';
  const text=state==='on'?'사용 가능':state==='off'?'없음':state==='unknown'?'확인 불가':'확인 중';
  box.className='tool-status '+cls;
  dot.className='tdot '+cls+' '+tool;
  stateEl.textContent=text;
  box.title=state==='on'?`${name} CLI가 PATH에서 감지되었습니다.`:
    state==='off'?`${name} CLI가 PATH에서 감지되지 않았습니다.`:
    state==='unknown'?`문서 연결 상태 때문에 ${name} CLI를 확인할 수 없습니다.`:
    `${name} CLI 상태 확인 중입니다.`;
}
setInterval(checkBridge,3000);

/* ── INSTRUCTIONS ── */
function activeInstructionCount(){
  return S.instructions.filter(i=>i.active).length;
}

function setInstructHint(){
  const n=activeInstructionCount();
  document.getElementById('imodal-hint').textContent=S.bridge
    ?`⌘↵ 전송  ·  활성 지침 ${n}개 적용`
    :'⚠ 문서 연결 필요 — 지시 불가';
}

async function loadInstructions(){
  if(!S.bridge){renderInstructions();return;}
  try{
    const r=await fetch(BRIDGE+'/instructions');
    if(r.ok){
      const d=await r.json();
      S.instructions=Array.isArray(d.instructions)?d.instructions:[];
    }
  }catch{}
  renderInstructions();
}

function renderInstructions(){
  const list=document.getElementById('inst-list');
  const active=activeInstructionCount();
  document.getElementById('inst-count').textContent=String(active);
  if(!S.instructions.length){
    list.innerHTML='<div class="inst-empty">아직 등록된 지침이 없습니다.<br>아래에서 추가하세요.</div>';
  }else{
    list.innerHTML=S.instructions.map(item=>`
      <div class="inst-card${item.active?'':' off'}">
        <div class="inst-top">
          <div class="inst-title">${esc(item.title)}</div>
          <button class="inst-mini ${item.active?'on':''}" onclick="toggleInstruction('${item.id}')">${item.active?'ON':'OFF'}</button>
        </div>
        <div class="inst-body">${esc(item.body)}</div>
        ${item.sourceRef?`<div class="inst-src">${esc(item.sourceType||'source')}: ${esc(item.sourceRef)}</div>`:''}
        <div class="inst-actions">
          <button class="inst-mini" onclick="editInstruction('${item.id}')">편집</button>
          <button class="inst-mini danger" onclick="deleteInstruction('${item.id}')">삭제</button>
        </div>
      </div>`).join('');
  }
  setInstructHint();
}

function renderInstructionFiles(){
  const sel=document.getElementById('inst-file');
  if(!sel)return;
  sel.innerHTML='<option value="">불러올 문서 선택</option>'+
    S.files.map(id=>`<option value="${escA(id)}">${esc(id)}</option>`).join('');
}

async function saveInstruction(payload){
  const r=await fetch(BRIDGE+'/instructions',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload),
  });
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  const d=await r.json();
  S.instructions=d.instructions||S.instructions;
  renderInstructions();
}

async function addInstruction(){
  if(!S.bridge)return;
  const title=document.getElementById('inst-title').value.trim();
  const body=document.getElementById('inst-text').value.trim();
  if(!body)return;
  const source=S.pendingInstructionSource||{sourceType:'manual',sourceRef:''};
  const current=S.editInstructionId?S.instructions.find(i=>i.id===S.editInstructionId):null;
  try{
    await saveInstruction({...(current||{}),title:title||'문서 작성 지침',body,active:current?current.active:true,...source});
    document.getElementById('inst-title').value='';
    document.getElementById('inst-text').value='';
    document.getElementById('inst-note').textContent='.docpilot/instructions.json에 저장했습니다.';
    S.pendingInstructionSource=null;
    S.editInstructionId=null;
    document.getElementById('inst-save-btn').textContent='지침 저장';
  }catch(err){
    document.getElementById('inst-note').textContent='저장 실패: '+err.message;
  }
}

async function toggleInstruction(id){
  const item=S.instructions.find(i=>i.id===id);if(!item)return;
  try{await saveInstruction({...item,active:!item.active});}
  catch(err){document.getElementById('inst-note').textContent='변경 실패: '+err.message;}
}

function editInstruction(id){
  const item=S.instructions.find(i=>i.id===id);if(!item)return;
  document.getElementById('inst-title').value=item.title||'';
  document.getElementById('inst-text').value=item.body||'';
  S.pendingInstructionSource={sourceType:item.sourceType||'manual',sourceRef:item.sourceRef||''};
  S.editInstructionId=item.id;
  document.getElementById('inst-save-btn').textContent='수정';
  document.getElementById('inst-note').textContent='내용을 수정한 뒤 저장하세요.';
}

async function deleteInstruction(id){
  if(!S.bridge)return;
  try{
    const r=await fetch(BRIDGE+'/instructions/delete',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id}),
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    S.instructions=d.instructions||[];
    if(S.editInstructionId===id){
      S.editInstructionId=null;
      S.pendingInstructionSource=null;
      document.getElementById('inst-save-btn').textContent='지침 저장';
      document.getElementById('inst-title').value='';
      document.getElementById('inst-text').value='';
    }
    renderInstructions();
  }catch(err){
    document.getElementById('inst-note').textContent='삭제 실패: '+err.message;

/* ── SELECTION (drag) ── */
let hadSel=false;
const CLICKABLE_BLOCKS=new Set(['P','LI','H1','H2','H3','H4','H5','H6','TD','TH','PRE','BLOCKQUOTE']);
const CLICKABLE_BLOCK_SELECTOR='#preview p,#preview li,#preview pre,#preview blockquote,#preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6,#preview td,#preview th';
let _chipFocusTimer=null;

function previewBlockForNode(node){
  const preview=document.getElementById('preview');
  let el=node&&node.nodeType===1?node:node?.parentElement;
  while(el&&el!==preview&&!CLICKABLE_BLOCKS.has(el.tagName))el=el.parentElement;
  return el&&el!==preview?el:null;
}

function previewBlockFromPoint(x,y){
  const direct=previewBlockForNode(document.elementFromPoint(x,y));
  if(direct)return direct;
  let best=null,bestDist=Infinity;
  document.querySelectorAll(CLICKABLE_BLOCK_SELECTOR).forEach(el=>{
    const r=el.getBoundingClientRect();
    if(y<r.top-6||y>r.bottom+6)return;
    const dx=x<r.left?r.left-x:x>r.right?x-r.right:0;
    const dy=y<r.top?r.top-y:y>r.bottom?y-r.bottom:0;
    const dist=dx+dy;
    if(dist<bestDist){best=el;bestDist=dist;}
  });
  return best;
}

function markPreviewSelection(el){
  if(!el)return;
  document.querySelectorAll('#preview .preview-picked').forEach(x=>x.classList.remove('preview-picked'));
  el.classList.add('preview-picked');
}

function clearPreviewPicked(){
  document.querySelectorAll('#preview .preview-picked').forEach(x=>x.classList.remove('preview-picked'));
}

function normChipText(txt){
  return (txt||'').replace(/\s+/g,' ').trim();
}

function selectionBlocks(range){
  if(!range)return[];
  return [...document.querySelectorAll(CLICKABLE_BLOCK_SELECTOR)]
    .filter(el=>{
      try{return range.intersectsNode(el);}
      catch{return false;}
    })
    .map(el=>normChipText(el.textContent))
    .filter(Boolean);
}

function clearChipFocus(){
  if(_chipFocusTimer){clearTimeout(_chipFocusTimer);_chipFocusTimer=null;}
  document.querySelectorAll('#preview .chip-focus-block').forEach(x=>x.classList.remove('chip-focus-block'));
}

function showChipFocus(id){
  const chip=S.chips.find(x=>x.id===id);
  if(!chip||chip.fileId!==S.file)return;
  clearChipFocus();
  clearPreviewPicked();
  const preview=document.getElementById('preview');
  const target=normChipText(chip.sel);
  if(!target)return;
  let first=null;
  const parts=Array.isArray(chip.selectedBlocks)&&chip.selectedBlocks.length
    ?chip.selectedBlocks.map(normChipText).filter(Boolean)
    :chip.sel.split('\n').map(normChipText).filter(Boolean);
  if(!parts.length)parts.push(target);
  preview.querySelectorAll(CLICKABLE_BLOCK_SELECTOR).forEach(el=>{
    const txt=normChipText(el.textContent);
    if(!txt)return;
    const hit=Array.isArray(chip.selectedBlocks)&&chip.selectedBlocks.length
      ?parts.includes(txt)
      :parts.some(part=>part===txt||part.includes(txt)||txt.includes(part))||target.includes(txt)||txt.includes(target);
    if(hit){
      el.classList.add('chip-focus-block');
      if(!first)first=el;
    }
  });
  if(first)first.scrollIntoView({block:'center',behavior:'smooth'});
  _chipFocusTimer=setTimeout(clearChipFocus,5000);
}

document.addEventListener('mouseup',e=>{
  if(e.target.closest('#chip-area'))return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){hadSel=false;return;}
  const txt=sel.toString().trim();
  if(!txt||txt.length<2){hadSel=false;return;}
  if(!document.getElementById('preview').contains(sel.anchorNode)){hadSel=false;return;}
  const range=sel.rangeCount?sel.getRangeAt(0):null;
  const selectedBlocks=selectionBlocks(range);
  hadSel=true;
  markPreviewSelection(previewBlockForNode(sel.anchorNode));
  window.getSelection().removeAllRanges();
  addChip(txt,{source:'selection',selectedBlocks});
});

document.addEventListener('click',e=>{
  if(e.target.closest('#chip-area'))return;
  if(hadSel){hadSel=false;return;}
  if(S.mode!=='preview')return;
  const preview=document.getElementById('preview');
  if(!preview.contains(e.target))return;
  const sel=window.getSelection();
  if(sel&&!sel.isCollapsed)return;
  const el=previewBlockForNode(e.target)||previewBlockFromPoint(e.clientX,e.clientY);
  if(!el)return;
  const txt=el.textContent.trim();
  if(!txt||txt.length<3)return;
  markPreviewSelection(el);
  addChip(txt,{source:'block'});
});

  };

/* ── JOB EXECUTION ── */
async function executeJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const res=await fetch(BRIDGE+'/instruct',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({fileId:job.fileId,context:job.sel,instruction:job.instr,content:S.content[job.fileId]||''}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.parallel!==undefined){job.parallel=ev.parallel;}
          if(job.parallel){
            // 병렬 모드
            const src=ev.source;
            if(src&&job.agents[src]){
              if(ev.chunk!==undefined){job.agents[src].stream+=ev.chunk;}
              if(ev.done){job.agents[src].done=true;job.agents[src].proposed=ev.proposed;}
              if(ev.error){job.agents[src].error=ev.error;}
            }
            // 둘 다 끝났으면 done
            const ag=job.agents;
            if((ag.claude.done||ag.claude.error)&&(ag.codex.done||ag.codex.error)){
              job.state='done';
            }
          } else {
            // 단일 모드 (codex 없음)
            if(ev.chunk){job.stream+=ev.chunk;}
            if(ev.done){job.state='done';job.proposed=ev.proposed;}
            if(ev.error){job.state='error';job.stream=ev.error;}
          }
          renderJobs();
        }catch{}
      }
    }
    if(job.state==='working'){
      if(job.parallel){job.state='done';}
      else{job.state='done';job.proposed=job.stream;}
    }
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

async function applyJob(id,source){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  const content=job.parallel
    ?(source&&job.agents[source]?job.agents[source].proposed:null)
    :job.proposed;
  if(!content)return;
  S.content[job.fileId]=content;
  if(S.bridge){
    try{await fetch(`${BRIDGE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:job.fileId,content})});}catch{}
  }
  S.jobs=S.jobs.filter(j=>j.id!==id);
  if(S.file===job.fileId)renderEditor();
  renderJobs();syncB();
}
function rejectJob(id){S.jobs=S.jobs.filter(j=>j.id!==id);renderJobs();syncB();}
function clearJobs(){S.jobs=[];renderJobs();syncB();}

async function combineJob(id){
  const src=S.jobs.find(j=>j.id===id);if(!src)return;
  const cp=src.agents.claude.proposed;const xp=src.agents.codex.proposed;
  if(!cp||!xp)return;
  const ctrl=new AbortController();
  const job={
    id:'j'+(++S.jc),fileId:src.fileId,sel:src.sel,instr:'[조합] '+src.instr,
    ts:ts(),state:'working',startedAt:Date.now(),ctrl,
    stream:'',proposed:null,parallel:false,
    agents:{claude:{stream:'',proposed:null,done:false,error:null},codex:{stream:'',proposed:null,done:false,error:null}},
  };
  S.jobs.unshift(job);renderJobs();syncB();
  try{
    const res=await fetch(BRIDGE+'/instruct',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({fileId:job.fileId,context:src.sel,instruction:src.instr,
        content:S.content[job.fileId]||'',combine:true,claudeProposed:cp,codexProposed:xp}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.chunk&&!ev.source){job.stream+=ev.chunk;}
          if(ev.done&&!ev.source){job.state='done';job.proposed=ev.proposed;}
          if(ev.error&&!ev.source){job.state='error';job.stream=ev.error;}
          renderJobs();
        }catch{}
      }
    }
    if(job.state==='working'){job.state='done';job.proposed=job.stream;}
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

function agentColHtml(j,src){
  const ag=j.agents[src];
  const label=src==='claude'?'Claude':'Codex';

  let inner='';
  if(ag.error){
    inner=`<div class="jstatus" style="color:var(--rd)">✗ ${esc(ag.error.slice(0,60))}</div>`;
  } else if(ag.done){
    const nl=(ag.proposed||'').split('\n').length;
    inner=`<div class="jstatus" style="color:var(--gn)">✓ ${nl}줄</div>
      <div class="jactions">
        <button class="jprev" onclick="previewJob('${j.id}','${src}')">미리보기</button>
        <button class="japply" onclick="applyJob('${j.id}','${src}')">적용</button>
      </div>`;
  } else {
    inner=`<div class="jstatus"><div class="spin"></div>${sec}s</div>

  }
  return`<div class="jagent">

function renderJobs(){
  const wrap=document.getElementById('rp-body');
  if(!S.jobs.length){
    wrap.innerHTML=`<div class="pempty"><div class="pei">🤖</div>
      <div class="pet">텍스트를 드래그하거나 문장을 클릭해<br>우측 상단에 칩으로 수집한 뒤 지시하세요</div></div>`;
    return;
  }
  wrap.innerHTML=S.jobs.map(j=>{
    let body='';
    if(j.parallel){
      // 병렬 모드: 두 컬럼
      const allDone=(j.agents.claude.done||j.agents.claude.error)&&(j.agents.codex.done||j.agents.codex.error);
      const sec=Math.floor((Date.now()-j.startedAt)/1000);
      const bothOk=j.agents.claude.done&&j.agents.codex.done;
      const header=allDone
        ?`<div class="jstatus" style="color:var(--gn)">✓ 완료</div>`
        :`<div class="jstatus"><div class="spin"></div>병렬 작업 중… ${sec}s</div>`;
      const combineBtn=bothOk
        ?`<button class="jcombine" onclick="combineJob('${j.id}')">조합</button>`:'';
      body=header+`<div class="jagents">${agentColHtml(j,'claude')}${agentColHtml(j,'codex')}</div>
        <div class="jactions" style="margin-top:6px">
          ${combineBtn}
          <button class="jreject" onclick="rejectJob('${j.id}')">닫기</button>
          <span class="jts">${j.ts}</span>
        </div>`;
    } else if(j.state==='working'){
      const sec=Math.floor((Date.now()-j.startedAt)/1000);
      body=`<div class="jstatus"><div class="spin"></div>작업 중… ${sec}s</div>
        ${j.stream?`<div class="jstream">${esc(j.stream.slice(-400))}</div>`:''}`;
    } else if(j.state==='done'){
      const ol=(S.content[j.fileId]||'').split('\n').length;
      const nl=(j.proposed||'').split('\n').length;
      body=`<div class="jstatus" style="color:var(--gn)">✓ 완료 — ${ol}줄 → ${nl}줄</div>
        <div class="jactions">
          <button class="jprev" onclick="previewJob('${j.id}')">미리보기</button>
          <button class="japply" onclick="applyJob('${j.id}')">적용</button>
          <button class="jreject" onclick="rejectJob('${j.id}')">거부</button>
          <span class="jts">${j.ts}</span>
        </div>`;
    } else if(j.state==='error'){
      body=`<div class="jstatus" style="color:var(--rd)">✗ ${esc(j.stream.slice(0,80))}</div>
        <div class="jactions"><button class="jreject" onclick="rejectJob('${j.id}')">닫기</button></div>`;
    }
    return`<div class="jcard ${j.state}">
      <div class="jfile">${j.fileId}</div>
      <div class="jctx">${esc(j.sel)}</div>
      <div class="jinstr">${esc(j.instr)}</div>
      ${body}
    </div>`;
  }).join('');
}

function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}
function ts(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

/* ── TOC ── */
function parseTocHeadings(){
  const src=S.content[S.file]||'';
  const headings=[];
  src.split('\n').forEach((line,i)=>{
    const m=line.match(/^(#{1,3})\s+(.+)$/);
    if(m)headings.push({level:m[1].length,text:m[2].trim(),lineIdx:i});
  });
  return headings;
}

function renderToc(){
  const rail=document.getElementById('toc-rail');
  const list=document.getElementById('toc-list');
  if(!rail||!list)return;
  if(!S.file||S.mode!=='preview'){
    rail.classList.add('hidden');
    document.getElementById('prev-wrap')?.classList.remove('has-toc');
    list.innerHTML='';
    return;
  }
  const headings=parseTocHeadings();
  if(!headings.length){
    rail.classList.add('hidden');
    document.getElementById('prev-wrap')?.classList.remove('has-toc');
    list.innerHTML='';
    return;
  }
  rail.classList.remove('hidden');
  document.getElementById('prev-wrap')?.classList.add('has-toc');
  list.innerHTML=headings.map((h,i)=>
    `<button class="toc-item toc-h${h.level}" onclick="tocItemClick(${i},event)"
      title="${esc(h.text)}">${esc(h.text)}</button>`
  ).join('');
  updateTocActive();
}

function tocItemClick(idx,e){
  e.preventDefault();
  tocScroll(idx);
}

function tocScroll(idx){
  const headings=parseTocHeadings();
  if(!headings[idx])return;
  const text=headings[idx].text;
  const preview=document.getElementById('preview');
  const els=preview.querySelectorAll('h1,h2,h3,h4,h5,h6');
  for(const el of els){
    if(el.textContent.trim()===text){
      el.scrollIntoView({behavior:'smooth',block:'start'});
      break;
    }
  }
}

/* ── DRAW MODE ── */
let _drawPath=[];
let _drawIsDrawing=false;
let _drawCmdHeld=false;
let _drawFadeTimer=null;

function effectiveDrawMode(){return S.drawMode||_drawCmdHeld;}

function setDrawActive(on){
  const canvas=document.getElementById('draw-canvas');
  const btn=document.getElementById('draw-btn');
  if(on){
    canvas.style.display='block';
    canvas.style.opacity='1';
    sizeDrawCanvas();
    canvas.classList.add('active');
  }else{
    _drawIsDrawing=false;
    _drawPath=[];
    clearDrawHighlights();
    canvas.classList.remove('active');
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    canvas.style.display='none';
  }
  btn.classList.toggle('active',on);
}

function sizeDrawCanvas(){
  const canvas=document.getElementById('draw-canvas');
  canvas.width=canvas.clientWidth;
  canvas.height=canvas.clientHeight;
}

function toggleDrawMode(){
  if(S.mode!=='preview'||!S.file)return;
  S.drawMode=!S.drawMode;
  setDrawActive(effectiveDrawMode());
}

document.addEventListener('keydown',e=>{
  if(e.key==='d'&&(e.metaKey||e.ctrlKey)&&!e.shiftKey&&!e.altKey){
    if(S.mode!=='preview'||!S.file)return;
    e.preventDefault();
    if(!_drawCmdHeld){_drawCmdHeld=true;if(!S.drawMode)setDrawActive(true);}
  }
});
document.addEventListener('keyup',e=>{
  if(e.key==='d'&&(e.metaKey||e.ctrlKey)){
    if(_drawCmdHeld){_drawCmdHeld=false;if(!S.drawMode)setDrawActive(false);}
  }
});

(function initDrawCanvas(){
  const canvas=document.getElementById('draw-canvas');
  const point=e=>({x:e.offsetX,y:e.offsetY,cx:e.clientX,cy:e.clientY});
  canvas.addEventListener('mousedown',e=>{
    if(_drawFadeTimer){clearTimeout(_drawFadeTimer);_drawFadeTimer=null;}
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    canvas.style.opacity='1';
    _drawIsDrawing=true;
    _drawPath=[point(e)];
  });
  canvas.addEventListener('mousemove',e=>{
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(_drawIsDrawing){
      _drawPath.push(point(e));
      _drawLaserPath(ctx);
      _highlightDrawHits();
    }
    _drawDot(ctx,e.offsetX,e.offsetY);
  });
  canvas.addEventListener('mouseup',()=>{
    if(!_drawIsDrawing)return;
    _drawIsDrawing=false;
    _finalizeDrawSel();
    _drawFadeOut();
  });
  canvas.addEventListener('mouseleave',()=>{
    if(_drawIsDrawing){_drawIsDrawing=false;_finalizeDrawSel();_drawFadeOut();}
    else{const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);}
  });
  window.addEventListener('resize',()=>{
    if(effectiveDrawMode())sizeDrawCanvas();
  });
})();

function _drawDot(ctx,x,y){
  ctx.save();
  ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);
  ctx.fillStyle='rgba(255,40,40,.18)';ctx.shadowBlur=24;ctx.shadowColor='#ff0000';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
  ctx.fillStyle='#ff7070';ctx.shadowBlur=10;ctx.shadowColor='#ff3333';ctx.fill();
  ctx.beginPath();ctx.arc(x,y,0.8,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.shadowBlur=0;ctx.fill();
  ctx.restore();
}

function _drawLaserPath(ctx){
  if(_drawPath.length<2)return;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(_drawPath[0].x,_drawPath[0].y);
  for(let i=1;i<_drawPath.length;i++)ctx.lineTo(_drawPath[i].x,_drawPath[i].y);
  ctx.strokeStyle='rgba(255,60,60,.35)';ctx.lineWidth=8;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowBlur=22;ctx.shadowColor='#ff0000';ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(_drawPath[0].x,_drawPath[0].y);
  for(let i=1;i<_drawPath.length;i++)ctx.lineTo(_drawPath[i].x,_drawPath[i].y);
  ctx.strokeStyle='rgba(255,140,140,.9)';ctx.lineWidth=1.5;
  ctx.shadowBlur=5;ctx.shadowColor='#ff8080';ctx.stroke();
  ctx.restore();
}

function _highlightDrawHits(){
  document.querySelectorAll(CLICKABLE_BLOCK_SELECTOR).forEach(el=>{
    el.classList.toggle('draw-hit',_pathHitsRect(_drawPath,el.getBoundingClientRect()));
  });
}

function clearDrawHighlights(){
  document.querySelectorAll('.draw-hit').forEach(el=>el.classList.remove('draw-hit'));
}

function _pathHitsRect(path,r){
  for(const p of path)if(p.cx>=r.left&&p.cx<=r.right&&p.cy>=r.top&&p.cy<=r.bottom)return true;
  for(let i=0;i<path.length-1;i++)if(_segHitsRect(path[i],path[i+1],r))return true;
  return false;
}

function _segHitsRect(a,b,r){
  return [[r.left,r.top,r.right,r.top],[r.right,r.top,r.right,r.bottom],
          [r.left,r.bottom,r.right,r.bottom],[r.left,r.top,r.left,r.bottom]]
    .some(([x1,y1,x2,y2])=>_segsX(a.cx,a.cy,b.cx,b.cy,x1,y1,x2,y2));
}

function _segsX(ax,ay,bx,by,cx,cy,dx,dy){
  const dx1=bx-ax,dy1=by-ay,dx2=dx-cx,dy2=dy-cy;
  const d=dx1*dy2-dy1*dx2;
  if(Math.abs(d)<1e-10)return false;
  const t=((cx-ax)*dy2-(cy-ay)*dx2)/d;
  const u=((cx-ax)*dy1-(cy-ay)*dx1)/d;
  return t>=0&&t<=1&&u>=0&&u<=1;
}

function _finalizeDrawSel(){
  const hits=[...document.querySelectorAll('.draw-hit')];
  clearDrawHighlights();
  if(!hits.length)return;
  const texts=hits.map(el=>el.textContent.trim()).filter(t=>t.length>1);
  if(texts.length)addChip(texts.join('\n'),{source:'draw'});
}

function _drawFadeOut(){
  const canvas=document.getElementById('draw-canvas');
  let op=1;
  const step=()=>{
    op-=0.07;
    if(op>0){canvas.style.opacity=String(op);_drawFadeTimer=setTimeout(()=>requestAnimationFrame(step),14);}
    else{canvas.style.opacity='1';const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);_drawFadeTimer=null;}
  };
  _drawFadeTimer=setTimeout(()=>requestAnimationFrame(step),180);
}

function updateTocActive(){
  if(!S.file)return;
  const wrap=document.getElementById('prev-wrap');
  const preview=document.getElementById('preview');
  const items=document.querySelectorAll('.toc-item');
  if(!items.length)return;
  const headings=parseTocHeadings();
  const scrollTop=wrap.scrollTop;
  const els=[...preview.querySelectorAll('h1,h2,h3,h4,h5,h6')];
  let activeIdx=0;
  for(let i=0;i<els.length;i++){
    if(els[i].offsetTop-wrap.offsetTop<=scrollTop+60)activeIdx=i;
  }
  items.forEach((it,i)=>it.classList.toggle('toc-active',i===activeIdx));
}

document.getElementById('prev-wrap').addEventListener('scroll',()=>updateTocActive());

/* ── TREE FROM PATHS ── */
let _tree=[];
function buildTreeFromPaths(paths){
  const root=[];const folders={};
  for(const id of paths){
    const parts=id.split('/');
    if(parts.length===1){
      root.push({t:'file',id,name:parts[0]});
    } else {
      const fn=parts[0];
      if(!folders[fn]){folders[fn]={t:'folder',name:fn,open:true,children:[]};root.push(folders[fn]);}
      folders[fn].children.push({t:'file',id,name:parts[parts.length-1]});
    }
  }
  return root;
}
function refreshTree(){buildTree(_tree,document.getElementById('troot'));}

/* ── INIT ── */
async function init(){
  await checkBridge();
  try{
    const r=await fetch(`${BRIDGE}/files`);
    if(r.ok){
      const d=await r.json();
      S.files=d.files||[];
      _tree=buildTreeFromPaths(S.files);
      renderInstructionFiles();
    }
  }catch{
    if(!S.bridge){refreshTree();renderInstructions();return;}
  }
  await loadInstructions();
  refreshTree();
  if(_tree.length>0){
    const first=_tree[0].t==='file'?_tree[0].id:(_tree[0].children&&_tree[0].children[0]?.id);
    if(first)openFile(first);
  }
}
init();
