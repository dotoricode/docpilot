strong{color:#DDE3EE;font-weight:600}`;

/* ── MARKDOWN ── */
function md(src){
  const blks=[];
  let s=src.replace(/```[\s\S]*?```/g,m=>{blks.push(m);return'\x00B'+(blks.length-1)+'\x00';});
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const inlineCodes=[];
  s=s.replace(/`([^`\n]+)`/g,(_,code)=>{inlineCodes.push(`<code>${code}</code>`);return'\x00I'+(inlineCodes.length-1)+'\x00';});
  s=s.replace(/((?:^&gt;.*\n?)+)/gm,b=>`<blockquote><p>${b.replace(/^&gt; ?/gm,'').trim()}</p></blockquote>`);
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/((?:\|.+\|\n?)+)/gm,blk=>{
    const rows=blk.trim().split('\n');let out='<table>',hd=false;
    rows.forEach(r=>{if(/^\|\s*[-: |]+\|/.test(r)){hd=true;return;}
      const cells=r.replace(/^\||\|$/g,'').split('|');const tag=hd?'td':'th';
      out+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';if(!hd)hd=true;});
    return out+'</table>';
  });
  s=s.replace(/^---$/gm,'<hr>');
  s=s.replace(/((?:^- .+\n?)+)/gm,b=>'<ul>'+b.trim().split('\n').map(l=>`<li>${l.slice(2)}</li>`).join('')+'</ul>');
  s=s.replace(/((?:^\d+\. .+\n?)+)/gm,b=>'<ol>'+b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  const blockTags='h[1-6]|ul|ol|pre|blockquote|table';
  s=s
    .replace(new RegExp(`(<(?:${blockTags})\\b[^>]*>|<hr>)`,'g'),'\n\n$1')
    .replace(new RegExp(`(</(?:${blockTags})>|<hr>)`,'g'),'$1\n\n');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(?<!!)\[([^\]\n]+)\]\(([^)\s]+)(?:\s+&quot;[^&]*&quot;)?\)/g,(_,label,href)=>{
      const safeHref=/^\s*javascript:/i.test(href)?'#':href.replace(/"/g,'&quot;');
      return `<a href="${safeHref}" title="${safeHref}">${label}</a>`;
    });
  s=s.split('\n\n').map(p=>{p=p.trim();if(!p)return'';
    if(/^<(h[1-6]|ul|ol|pre|blockquote|table|hr)/.test(p))return p;
    return'<p>'+p.replace(/\n/g,' ')+'</p>';}).join('\n');
  s=s.replace(/\x00I(\d+)\x00/g,(_,i)=>inlineCodes[+i]||'');
  s=s.replace(/\x00B(\d+)\x00/g,(_,i)=>{const raw=blks[+i];const m=raw.match(/```(\w*)\n([\s\S]*?)```/);if(!m)return'';
    return`<pre><code>${m[2].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;});
  return s;
}

/* ── LIVE FRAME ── */
let fTimer=null;
function schedFrame(){clearTimeout(fTimer);fTimer=setTimeout(updateFrame,150);}
function updateFrame(){
  const id=S.file;if(!id)return;
  const src=S.mode==='edit'?document.getElementById('etxt').value:(S.content[id]||'');
  document.getElementById('live-frame').srcdoc=
    `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${FCSS}</style></head><body>${md(src)}</body></html>`;
}

/* ── TREE ── */
function buildTree(nodes,wrap){
  wrap.innerHTML='';
  const frag=document.createDocumentFragment();
  nodes.forEach(n=>frag.appendChild(mkTreeNode(n,0)));
  wrap.appendChild(frag);
}
function mkTreeNode(n,depth=0){
  if(n.t==='folder'){
    const div=document.createElement('div');
    div.className='tf'+(n.open?' open':'')+(n.workspaceRoot?' workspace-root':'');
    div.innerHTML=`<div class="tfhd" style="--depth:${depth}" data-tree-id="${escA(n.id)}" data-tree-type="folder" data-workspace-root="${n.workspaceRoot?'true':'false'}" data-folder-id="${escA(n.id)}" onclick="toggleTreeFolder(this.dataset.folderId)" oncontextmenu="openTreeContextMenu(event,this.dataset.treeId,this.dataset.treeType)">
      <svg class="tarr" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 3 8 6 4 9"/></svg>
      <span class="tfnm">${n.name}</span></div><div class="tchl"></div>`;
    const children=div.querySelector('.tchl');
    if(n.open){
      const frag=document.createDocumentFragment();
      n.children.forEach(c=>frag.appendChild(mkTreeNode(c,depth+1)));
      children.appendChild(frag);
    }
    return div;
  }
  return mkF(n,depth);
}
function mkF(n,depth=0){
  const el=document.createElement('div');
  const status=S.localNewFiles.has(n.id)?'new':(S.fileStatus[n.id]||'');
  el.className='tfi'+(S.file===n.id?' active':'')+(status?` ${status}`:'');
  el.style.setProperty('--depth',depth);
  el.dataset.treeId=n.id;
  el.dataset.treeType='file';
  el.innerHTML=`<span class="ficon"></span><span class="tfnme">${n.name}</span>${status?'<span class="tstatus-dot"></span>':''}`;
  el.onclick=()=>openFile(n.id);
  el.oncontextmenu=e=>openTreeContextMenu(e,n.id,'file');
  return el;
}

function setLeftTab(tab){

  S.leftTab=tab;
  document.querySelectorAll('.left-tab-btn').forEach(btn=>btn.classList.remove('active'));
  document.querySelectorAll('.left-pane').forEach(pane=>pane.classList.remove('active'));

let _rszEl=null,_rszX=0,_rszW=0,_rszRight=false;
function initResize(id,e){
  e.preventDefault();
  _rszEl=document.getElementById(id);
  _rszEl.classList.remove('collapsed');
  _rszX=e.clientX;
  _rszW=_rszEl.offsetWidth;
  _rszRight=(id==='rpanel');
  document.body.classList.add('resizing-panels');
  document.getElementById(id==='rpanel'?'rp-rsz':'tree-rsz').classList.add('dragging');
  document.addEventListener('pointermove',_doRsz);
  document.addEventListener('pointerup',_endRsz);
  document.addEventListener('pointercancel',_endRsz);
}
function _doRsz(e){
  if(!_rszEl)return;
  const dx=_rszRight?(_rszX-e.clientX):(e.clientX-_rszX);
  const w=Math.max(72,Math.min(520,_rszW+dx));
  _rszEl.style.width=w+'px';
  _rszEl.style.minWidth=w+'px';
}
function _endRsz(){
  if(_rszEl){
    document.querySelectorAll('.rsz.dragging').forEach(r=>r.classList.remove('dragging'));
    _rszEl=null;
  }
  document.body.classList.remove('resizing-panels');
  document.removeEventListener('pointermove',_doRsz);
  document.removeEventListener('pointerup',_endRsz);
  document.removeEventListener('pointercancel',_endRsz);
}

(function(){

const BRIDGE=location.protocol.startsWith('http')&&!location.protocol.startsWith('file')
  ?location.origin
  :`http://localhost:${window.BRIDGE_PORT||7474}`;
let bridgeCheckInFlight=false;
const BRIDGE_PING_TIMEOUT_MS=2000;
const BRIDGE_OFF_GRACE_MS=30000;
const BRIDGE_FAILS_BEFORE_OFF=5;
const TOOL_STATUS_CHECK_MS=15000;
let lastToolStatusCheck=0;
let bridgeFailureCount=0;
let bridgeLastOkAt=0;
let projectWatchSource=null;
let projectWatchRetryTimer=null;
let projectFilesRefreshTimer=null;
async function checkBridge(){
  if(bridgeCheckInFlight)return;
  bridgeCheckInFlight=true;
  const wasBridgeOn=S.bridge;
  let pingOk=false;
  try{
    const r=await fetch(BRIDGE+'/ping',{signal:AbortSignal.timeout(BRIDGE_PING_TIMEOUT_MS)});
    pingOk=r.ok;
    if(r.ok){
      const d=await r.json();
      setRootBadge(d.root);
      S.root=d.root||S.root;
    }
  }
  catch{pingOk=false;}
  if(pingOk){
    S.bridge=true;
    bridgeFailureCount=0;
    bridgeLastOkAt=Date.now();
  }else{
    bridgeFailureCount+=1;
    const stale=!bridgeLastOkAt||Date.now()-bridgeLastOkAt>BRIDGE_OFF_GRACE_MS;
    const hardDown=bridgeFailureCount>=BRIDGE_FAILS_BEFORE_OFF&&stale;
    if(!wasBridgeOn&&!bridgeLastOkAt||hardDown)S.bridge=false;
  }
  const bridgeState=S.bridge?'on':bridgeRecentlyAvailable()?'pending':'off';
  setBridgeState(bridgeState);
  setInstructHint();
  if(S.bridge)connectProjectWatch();
  else disconnectProjectWatch();
  const now=Date.now();
  const shouldCheckTools=S.bridge&&(now-lastToolStatusCheck>TOOL_STATUS_CHECK_MS||S.toolStates.claude==='pending'||S.toolStates.codex==='pending');
  if(shouldCheckTools){
    lastToolStatusCheck=now;
    try{
      const r=await fetch(BRIDGE+'/status',{signal:AbortSignal.timeout(800)});
      if(r.ok){
        const d=await r.json();
        setToolState('claude',d.claude?'on':'off');
        setToolState('codex',d.codex?'on':'off');
      } else {
        setToolState('claude','unknown');
        setToolState('codex','unknown');
      }
    }catch{
      setToolState('claude','unknown');
      setToolState('codex','unknown');
    }
  } else if(!S.bridge) {
    setToolState('claude','unknown');
    setToolState('codex','unknown');
  }
  bridgeCheckInFlight=false;
}

function hasWorkingJobs(){
  return S.jobs.some(j=>j.state==='working');

function bridgeRecentlyAvailable(){
  return S.bridge||bridgeLastOkAt&&Date.now()-bridgeLastOkAt<=BRIDGE_OFF_GRACE_MS;
}
function disconnectProjectWatch(){
  clearTimeout(projectWatchRetryTimer);
  projectWatchRetryTimer=null;
  if(projectWatchSource){
    try{projectWatchSource.close();}catch{}
    projectWatchSource=null;
  }
}
function scheduleProjectFilesRefresh(reason='watch'){
  if(!S.bridge)return;
  clearTimeout(projectFilesRefreshTimer);
  const busyDelay=isInstructModalOpen()?1500:hasWorkingJobs()?1000:0;
  const baseDelay=reason==='focus'?120:350;
  projectFilesRefreshTimer=setTimeout(async()=>{
    await reloadProjectFiles();
    await loadFileStatus();
  },baseDelay+busyDelay);
}
function connectProjectWatch(){
  if(projectWatchSource||typeof EventSource==='undefined')return;
  try{
    const source=new EventSource(`${BRIDGE}/watch`);
    projectWatchSource=source;
    source.onmessage=event=>{
      try{
        const ev=JSON.parse(event.data||'{}');
        if(ev.type==='watch.ready'||ev.type==='watch.ping'){
          S.bridge=true;
          bridgeFailureCount=0;
          bridgeLastOkAt=Date.now();
          setBridgeState('on');
          setInstructHint();
        }
        if(ev.type==='files.changed')scheduleProjectFilesRefresh('watch');
      }catch{}
    };
    source.onerror=()=>{
      disconnectProjectWatch();
      if(S.bridge)projectWatchRetryTimer=setTimeout(()=>connectProjectWatch(),3000);
    };
  }catch{}
}

function confidenceStats(a,b){
  const left=String(a||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const right=String(b||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const rs=new Set(right);
  const ls=new Set(left);
  const agree=left.filter(line=>rs.has(line)).length;
  const leftOnly=left.filter(line=>!rs.has(line)).length;
  const rightOnly=right.filter(line=>!ls.has(line)).length;
  return {agree,leftOnly,rightOnly};
}

  const stats=confidenceStats(j.agents.claude.proposed||j.agents.claude.response,j.agents.codex.proposed||j.agents.codex.response);
  return `<div class="confidence-box">
    <div class="confidence-title">Confidence Diff</div>
    <div class="confidence-grid">
      <div class="confidence-cell"><div class="confidence-num">${stats.agree}</div><div class="confidence-label">합의 라인</div></div>
      <div class="confidence-cell"><div class="confidence-num">${stats.leftOnly}</div><div class="confidence-label">Claude only</div></div>
      <div class="confidence-cell"><div class="confidence-num">${stats.rightOnly}</div><div class="confidence-label">Codex only</div></div>
    </div>

}

async function removeWorkspaceFolder(){
  const id=treeMenuTarget?.id||'';
  const root=(S.workspaceRoots||[]).find(item=>item.id===id);
  if(!root)return;
  closeTreeContextMenu();
  try{
    const r=await fetch(`${BRIDGE}/workspace-roots`,{
      method:'DELETE',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id}),
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    S.workspaceRoots=Array.isArray(d.roots)?d.roots:[];
    S.files=Array.isArray(d.files)?d.files:S.files.filter(file=>!file.startsWith(id+'/'));
    if(S.file&&S.file.startsWith(id+'/')){S.file=null;setEmptyState('empty',`${root.name} 폴더가 workspace에서 제거되었습니다`);}
    _tree=buildTreeFromPaths(S.files,S.workspaceRoots);
    refreshTree();
    renderInstructionFiles();
  }catch(err){
    setEmptyState('empty','workspace 폴더를 제거하지 못했습니다');
  }
}
async function copyText(text){
  const value=String(text||'');
  if(!value)return;
  if(window.docpilot?.copyText){await window.docpilot.copyText(value);return;}
  await navigator.clipboard?.writeText(value);
}

  if(!preview||!sel||sel.isCollapsed||!sel.rangeCount)return '';
  const range=sel.getRangeAt(0);
  if(!preview.contains(range.commonAncestorContainer))return '';
  return sel.toString().trim();
}

async function readAgentStatusRows(tool){
  const endpoint=tool==='claude'?'/claude-status':'/codex-status';
  const timeoutMs=tool==='codex'?45000:15000;
  const r=await fetch(BRIDGE+endpoint,{signal:AbortSignal.timeout(timeoutMs)});
  if(!r.ok)throw new Error('bridge error');
  const d=await r.json();
  const rows=[];
  if(tool==='claude'){
    if(d.version)rows.push(['Version',d.version.split('\n')[0]]);
    if(d.auth){
      if(d.auth.email)rows.push(['Email',d.auth.email]);
      if(d.auth.orgName)rows.push(['Organization',d.auth.orgName]);
      if(d.auth.authMethod)rows.push(['Login method',d.auth.authMethod]);
      if(d.auth.subscriptionType)rows.push(['Subscription',d.auth.subscriptionType]);
    }
    rows.push(['5h limit',d.limits?.fiveHour||'확인 불가']);
    rows.push(['Weekly limit',d.limits?.weekly||'확인 불가']);
  }else{
    if(d.version)rows.push(['Version',d.version.split('\n')[0]]);
    if(d.model)rows.push(['Model',d.model]);
    if(d.permissions)rows.push(['Permissions',d.permissions]);
    if(d.email)rows.push(['Account',d.email+(d.plan?` (${d.plan})`:'')]);
    if(d.org)rows.push(['Organization',d.org]);
    rows.push(['5h limit',d.limits?.fiveHour||'확인 불가']);
    rows.push(['Weekly limit',d.limits?.weekly||'확인 불가']);
  }
  return rows;
}

async function showAgentStatusInMenu(tool){
  const menu=document.getElementById('agent-menu');
  if(!agentMenuOpen||menu.dataset.tool!==tool)return;
  let panel=menu.querySelector('.agent-status-panel');
  if(!panel){
    panel=document.createElement('div');
    panel.className='agent-status-panel';
    menu.appendChild(panel);
  }
  panel.innerHTML='<div class="agent-status-loading">상태 불러오는 중…</div>';
  try{
    const rows=await readAgentStatusRows(tool);
    panel.innerHTML=rows.map(([label,val])=>`
      <div class="agent-status-line">
        <div class="agent-status-key">${esc(label)}</div>
        <div class="agent-status-val">${esc(val)}</div>
      </div>`).join('')||'<div class="agent-status-loading">정보 없음</div>';
  }catch{
    panel.innerHTML='<div class="agent-status-loading">bridge 응답 없음</div>';
  }
}

/* ── INSTRUCTIONS ── */
function activeInstructionCount(){
  return S.instructions.filter(i=>i.active).length;
}

function instructHintText(){
  if(!S.bridge)return '⚠ 문서 연결 필요 — 지시 불가';
  const n=activeInstructionCount();
  if(S.modalMode==='project'){
    if(S.modalScope)return `⌘↵ 전송  ·  선택 범위 지시  ·  활성 지침 ${n}개 적용`;
    if(S.modalAgent){
      const label=S.modalAgent==='claude'?'Claude':'Codex';
      return `⌘↵ 전송  ·  ${label} 지시  ·  활성 지침 ${n}개 적용`;
    }
	    return `⌘↵ 전송  ·  ${aiModeLabel()} 지시  ·  활성 지침 ${n}개 적용`;
  }
  return `⌘↵ 전송  ·  ${aiModeLabel()} · 활성 지침 ${n}개 적용`;
}

function setInstructHint(){
  const hint=document.getElementById('imodal-hint');
  if(hint)hint.textContent=instructHintText();
}

async function loadInstructions(){
  if(!S.bridge){renderInstructions();return;}
  try{
    const r=await fetch(BRIDGE+'/instructions');
    if(r.ok){
      const d=await r.json();
      S.instructions=Array.isArray(d.instructions)?d.instructions:[];
      S.projectSets=Array.isArray(d.projectSets)?d.projectSets:(Array.isArray(d.sets)?d.sets:[]);
      S.globalSets=Array.isArray(d.globalSets)?d.globalSets:[];
      S.activeSetKey=d.activeSetId?String(d.activeSetId):(d.globalActiveSetId?String(d.globalActiveSetId):'');
    }
  }catch{}
  renderInstructions();
}

function renderInstructions(){
  const list=document.getElementById('inst-list');
  const active=activeInstructionCount();
  document.getElementById('inst-count').textContent=String(active);
  renderInstructionSets();
  renderInstructionSummary();
  syncInstructionManager();
  if(!S.instructions.length){
    list.innerHTML='<div class="inst-empty">아직 등록된 지침이 없습니다.<br>아래에서 추가하세요.</div>';
  }else{
    list.innerHTML=S.instructions.map(item=>`
      <div class="inst-card${item.active?'':' off'}">
        <div class="inst-top">
          <div class="inst-title">${esc(item.title)}</div>
          <button class="inst-mini ${item.active?'on':''}" onclick="toggleInstruction('${item.id}')">${item.active?'적용 중':'꺼짐'}</button>
        </div>
        <div class="inst-meta-row">
          <span class="inst-meta ${item.active?'active':''}">${item.active?'AI 요청에 포함':'포함 안 됨'}</span>
          <span class="inst-meta">${esc(item.sourceType||'manual')}</span>
        </div>
        <div class="inst-body">${esc(item.body)}</div>
        ${item.sourceRef?`<div class="inst-src">${esc(item.sourceType||'source')}: ${esc(item.sourceRef)}</div>`:''}
        <div class="inst-actions">
          <button class="inst-mini" onclick="editInstruction('${item.id}')">편집</button>
          <button class="inst-mini danger" onclick="deleteInstruction('${item.id}')">삭제</button>
        </div>
      </div>`).join('');

function syncInstructionManager(){
  const panel=document.getElementById('inst-manage-panel');
  const toggle=document.getElementById('inst-manage-toggle');
  const label=document.getElementById('inst-manage-label');
  if(!panel||!toggle)return;
  panel.classList.toggle('collapsed',!S.instManageOpen);
  toggle.classList.toggle('open',S.instManageOpen);
  toggle.setAttribute('aria-expanded',S.instManageOpen?'true':'false');
  if(label)label.textContent=S.instManageOpen?'지침 관리 접기':'지침 관리 펼치기';
}

function toggleInstructionManager(force){
  S.instManageOpen=typeof force==='boolean'?force:!S.instManageOpen;
  syncInstructionManager();
}

function renderInstructionSummary(){
  const countEl=document.getElementById('inst-summary-count');
  const listEl=document.getElementById('inst-summary-list');
  if(!countEl||!listEl)return;
  const active=S.instructions.filter(item=>item.active);
  countEl.textContent=`${active.length} active`;
  if(!active.length){
    listEl.innerHTML='<span class="inst-token empty">활성 지침 없음</span>';
    return;
  }
  listEl.innerHTML=active.slice(0,6).map(item=>`<span class="inst-token" title="${escA(item.title||'지침')}">${esc(item.title||'지침')}</span>`).join('')+
    (active.length>6?`<span class="inst-token">+${active.length-6}</span>`:'');
}

function renderInstructionSets(){
  const sel=document.getElementById('inst-set-select');
  if(!sel)return;
  const current=S.activeSetKey||'';
  const globalOptions=S.globalSets.map(set=>
    `<option value="global:${escA(set.id)}">전역: ${esc(set.name)}</option>`).join('');
  const projectOptions=S.projectSets.map(set=>
    `<option value="project:${escA(set.id)}">프로젝트: ${esc(set.name)}</option>`).join('');
  sel.innerHTML=`<option value="">프리셋 선택</option>${globalOptions}${projectOptions}`;
  let activeSet=null;
  if(current){
    const key=current.startsWith('global:')?current:
      S.projectSets.some(set=>set.id===current)?`project:${current}`:
      S.globalSets.some(set=>set.id===current)?`global:${current}`:current;
    sel.value=key;
    const picked=key.includes(':')?key.split(':'):null;
    if(picked){
      const [scope,id]=picked;
      const list=scope==='global'?S.globalSets:S.projectSets;
      const set=list.find(item=>item.id===id);
      if(set)activeSet={scope,name:set.name,count:Array.isArray(set.instructions)?set.instructions.length:0};
    }
  }
  const applied=document.getElementById('inst-applied');
  if(applied){
    if(activeSet){
      applied.className='inst-applied';
      applied.textContent=`프리셋 적용 중: ${activeSet.scope==='global'?'전역':'프로젝트'} / ${activeSet.name} · 지침 ${activeSet.count}개`;
    }else{
      applied.className='inst-applied empty';
      applied.textContent=`적용된 프리셋 없음 · 활성 지침 ${activeInstructionCount()}개`;
    }
  }
}

function selectedInstructionSet(){
  const value=document.getElementById('inst-set-select')?.value||'';
  if(!value.includes(':'))return null;
  const [scope,id]=value.split(':');
  return {scope,id};
}

async function saveInstructionSet(){
  if(!S.bridge)return;
  const active=S.instructions.filter(i=>i.active);
  if(!active.length){
    document.getElementById('inst-note').textContent='저장할 활성 지침이 없습니다.';
    return;
  }
  const nameEl=document.getElementById('inst-set-name');
  const scopeEl=document.getElementById('inst-set-scope');
  const name=(nameEl?.value||'').trim();
  if(!name){
    document.getElementById('inst-note').textContent='프리셋 이름을 입력하세요.';
    nameEl?.focus();
    return;
  }
  const scope=scopeEl?.value==='project'?'project':'global';
  try{
    const r=await fetch(BRIDGE+'/instruction-sets/save',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,scope,instructionIds:active.map(i=>i.id)}),
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    updateInstructionSetState(d);
    if(nameEl)nameEl.value='';
    document.getElementById('inst-note').textContent=`${scope==='global'?'전역':'프로젝트'} 프리셋으로 저장했습니다.`;
  }catch(err){
    document.getElementById('inst-note').textContent='프리셋 저장 실패: '+err.message;
  }
}

async function applyInstructionSetFromSelect(){
  const picked=selectedInstructionSet();
  if(!picked)return;
  try{
    const r=await fetch(BRIDGE+'/instruction-sets/apply',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(picked),
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    updateInstructionSetState(d);
    document.getElementById('inst-note').textContent='프리셋을 적용했습니다.';
  }catch(err){
    document.getElementById('inst-note').textContent='프리셋 적용 실패: '+err.message;
  }
}

async function deleteInstructionSet(){
  const picked=selectedInstructionSet();
  if(!picked)return;
  const label=picked.scope==='global'?'전역 프리셋':'프로젝트 프리셋';
  if(!confirm(`${label}을 제거할까요? 지침 본문은 삭제하지 않습니다.`))return;
  try{
    const r=await fetch(BRIDGE+'/instruction-sets/delete',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(picked),
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    updateInstructionSetState(d);
    document.getElementById('inst-note').textContent='프리셋을 제거했습니다.';
  }catch(err){
    document.getElementById('inst-note').textContent='프리셋 제거 실패: '+err.message;
  }
}

function updateInstructionSetState(d){
  S.instructions=Array.isArray(d.instructions)?d.instructions:S.instructions;
  S.projectSets=Array.isArray(d.projectSets)?d.projectSets:S.projectSets;
  S.globalSets=Array.isArray(d.globalSets)?d.globalSets:S.globalSets;
  S.activeSetKey=d.activeSetId?String(d.activeSetId):(d.globalActiveSetId?String(d.globalActiveSetId):'');
  renderInstructions();
}

/* ── CHIPS ── */
function chipKeyFor(meta, sel) {
  if(meta.source==='all')return 'all';
  if(meta.blockKey)return `block:${meta.blockKey}`;
  if(Array.isArray(meta.selectedBlockKeys)&&meta.selectedBlockKeys.length){
    return `${meta.source||'selection'}:${meta.selectedBlockKeys.join('|')}`;
  }
  return `${meta.source||'block'}:${normChipText(sel)}`;
}

function addChip(sel,meta={}){
  if(!S.file||S.diffOn)return;
  const source=meta.source||'block';
  const key=chipKeyFor({...meta,source},sel);
  const dup=S.chips.find(c=>c.fileId===S.file&&c.key===key);
  if(dup){
    dup.active=true;
    renderChips();
    showChipFocus(dup.id);
    return dup;
  }
  const chip={id:'c'+(S.cc++),fileId:S.file,sel,...meta,source,key,active:true};
  S.chips.push(chip);
  renderChips();
  showChipFocus(chip.id);
  setTimeout(()=>document.getElementById('chip-ta')?.focus(),30);
  return chip;
}

function handleChipClick(id,e){
  if(e?.ctrlKey||e?.metaKey){
    e.preventDefault();
    e.stopPropagation();
    showChipFocus(id);
    return;
  }
  toggleChip(id);
}

function toggleChip(id){
  const c=S.chips.find(x=>x.id===id);if(!c)return;
  c.active=!c.active;
  document.querySelector(`.chip[data-chip-id="${CSS.escape(id)}"]`)?.classList.toggle('active',c.active);
  syncPreviewAllPicked();
  if(document.getElementById('imodal').classList.contains('show'))renderModalCtx();
}

function removeChip(id,e){
  e?.preventDefault();
  e?.stopPropagation();
  S.chips=S.chips.filter(x=>x.id!==id);
  renderChips();
}

function clearChips(e){
  e?.preventDefault();
  e?.stopPropagation();
  S.chips=[];
  clearChipFocus();
  clearPreviewPicked();
  syncPreviewAllPicked();
  renderChips();
}

function uniqueChipTexts(chips=S.chips){
  const seen=new Set();
  const out=[];
  chips.forEach(chip=>{
    const text=String(chip?.sel||'').trim();
    if(!text)return;
    const key=text.replace(/\s+/g,' ').trim().toLowerCase();
    if(seen.has(key))return;
    seen.add(key);
    out.push(text);
  });
  return out;
}

async function copyChipsUnique(e){
  e?.preventDefault();
  e?.stopPropagation();
  const texts=uniqueChipTexts(S.chips);
  if(!texts.length)return;
  await copyText(texts.join('\n\n'));
  const btn=document.getElementById('chip-copy');
  if(btn){
    btn.textContent=`복사됨 ${texts.length}`;
    clearTimeout(copyChipsUnique._timer);
    copyChipsUnique._timer=setTimeout(()=>{
      const next=document.getElementById('chip-copy');
      if(next)next.textContent='복사';
    },1200);
  }
}

/* ── SELECTION (drag) ── */
let hadSel=false;
const CLICKABLE_BLOCKS=new Set(['P','LI','H1','H2','H3','H4','H5','H6','TABLE','PRE','BLOCKQUOTE']);
const CLICKABLE_BLOCK_SELECTOR='#preview p,#preview li,#preview table,#preview pre,#preview blockquote,#preview h1,#preview h2,#preview h3,#preview h4,#preview h5,#preview h6';
let _chipFocusTimer=null;
let _previewBlockCache=null;
let _previewBlockKeyMap=new WeakMap();
let _previewPickedEl=null;
let _chipFocusEls=[];

function invalidatePreviewBlockCache(){
  _previewBlockCache=null;
  _previewBlockKeyMap=new WeakMap();
  _previewPickedEl=null;
  _chipFocusEls=[];
}

function previewBlocks(){
  if(_previewBlockCache)return _previewBlockCache;
  const blocks=[...document.querySelectorAll(CLICKABLE_BLOCK_SELECTOR)];
  blocks.forEach((el,idx)=>_previewBlockKeyMap.set(el,`${el.tagName}:${idx}`));
  _previewBlockCache=blocks;
  return blocks;
}

function previewBlockForNode(node){
  const preview=document.getElementById('preview');
  let el=node&&node.nodeType===1?node:node?.parentElement;
  while(el&&el!==preview&&!CLICKABLE_BLOCKS.has(el.tagName))el=el.parentElement;
  return el&&el!==preview?el:null;
}

function previewBlockFromPoint(x,y){
  const direct=previewBlockForNode(document.elementFromPoint(x,y));
  if(direct)return direct;
  let best=null,bestDist=Infinity;
  previewBlocks().forEach(el=>{
    const r=el.getBoundingClientRect();
    if(y<r.top-6||y>r.bottom+6)return;
    const dx=x<r.left?r.left-x:x>r.right?x-r.right:0;
    const dy=y<r.top?r.top-y:y>r.bottom?y-r.bottom:0;
    const dist=dx+dy;
    if(dist<bestDist){best=el;bestDist=dist;}
  });
  return best;
}

function markPreviewSelection(el){
  if(!el)return;
  if(_previewPickedEl&&_previewPickedEl!==el)_previewPickedEl.classList.remove('preview-picked');
  el.classList.add('preview-picked');
  _previewPickedEl=el;
}

function clearPreviewPicked(){
  if(_previewPickedEl){
    _previewPickedEl.classList.remove('preview-picked');
    _previewPickedEl=null;
    return;
  }
  document.querySelectorAll('#preview .preview-picked').forEach(x=>x.classList.remove('preview-picked'));
}

function normChipText(txt){
  return (txt||'').replace(/\s+/g,' ').trim();
}

function selectionBlocks(range){
  if(!range)return[];
  return selectionBlockElements(range)
    .map(el=>normChipText(el.textContent))
    .filter(Boolean);
}

function selectionBlockElements(range){
  if(!range)return[];
  return previewBlocks()
    .filter(el=>{
      try{return range.intersectsNode(el);}
      catch{return false;}
    });
}

function blockKeyForElement(el){
  if(!el)return '';
  let key=_previewBlockKeyMap.get(el);
  if(key)return key;
  previewBlocks();
  return _previewBlockKeyMap.get(el)||'';
}

function clearChipFocus(){
  if(_chipFocusTimer){clearTimeout(_chipFocusTimer);_chipFocusTimer=null;}
  if(_chipFocusEls.length){
    _chipFocusEls.forEach(x=>x.classList.remove('chip-focus-block'));
    _chipFocusEls=[];
    return;
  }
  document.querySelectorAll('#preview .chip-focus-block').forEach(x=>x.classList.remove('chip-focus-block'));
}

function showChipFocus(id){
  const chip=S.chips.find(x=>x.id===id);
  if(!chip||chip.fileId!==S.file)return;
  clearChipFocus();
  clearPreviewPicked();
  const preview=document.getElementById('preview');
  if(chip.source==='all'){
    syncPreviewAllPicked();
    preview.scrollIntoView({block:'nearest',behavior:'smooth'});
    return;
  }
  const target=normChipText(chip.sel);
  if(!target)return;
  let first=null;
  const parts=Array.isArray(chip.selectedBlocks)&&chip.selectedBlocks.length
    ?chip.selectedBlocks.map(normChipText).filter(Boolean)
    :chip.sel.split('\n').map(normChipText).filter(Boolean);
  if(!parts.length)parts.push(target);
  const keySet=Array.isArray(chip.selectedBlockKeys)&&chip.selectedBlockKeys.length
    ?new Set(chip.selectedBlockKeys)
    :null;
  previewBlocks().forEach(el=>{
    if(keySet&&!keySet.has(blockKeyForElement(el)))return;
    const txt=normChipText(el.textContent);
    if(!txt)return;
    const hit=keySet
      ?true
      :Array.isArray(chip.selectedBlocks)&&chip.selectedBlocks.length
        ?parts.includes(txt)
        :parts.some(part=>part===txt||part.includes(txt)||txt.includes(part))||target.includes(txt)||txt.includes(target);
    if(hit){
      el.classList.add('chip-focus-block');
      _chipFocusEls.push(el);
      if(!first)first=el;
    }
  });
  if(first)first.scrollIntoView({block:'center',behavior:'smooth'});
  _chipFocusTimer=setTimeout(clearChipFocus,5000);
}

document.addEventListener('mouseup',e=>{
  if(S.diffOn)return;
  if(e.target.closest('#chip-area'))return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){hadSel=false;return;}
  const txt=sel.toString().trim();
  if(!txt||txt.length<2){hadSel=false;return;}
  if(!document.getElementById('preview').contains(sel.anchorNode)){hadSel=false;return;}
  const range=sel.rangeCount?sel.getRangeAt(0):null;
  const anchorBlock=previewBlockForNode(sel.anchorNode);
  const tableBlock=anchorBlock?.tagName==='TABLE'?anchorBlock:null;
  const selectedBlockEls=tableBlock?[tableBlock]:selectionBlockElements(range);
  const selectedBlocks=selectedBlockEls.map(el=>normChipText(el.textContent)).filter(Boolean);
  const selectedBlockKeys=selectedBlockEls.map(blockKeyForElement).filter(Boolean);
  hadSel=true;
  markPreviewSelection(tableBlock||anchorBlock);
  window.getSelection().removeAllRanges();
  addChip(tableBlock?tableBlock.textContent.trim():txt,{source:tableBlock?'block':'selection',selectedBlocks,selectedBlockKeys,blockKey:tableBlock?blockKeyForElement(tableBlock):undefined});
});

document.addEventListener('click',e=>{
  if(e.target.closest('#chip-area'))return;
  if(hadSel){hadSel=false;return;}
  if(S.mode!=='preview'||S.diffOn)return;
  const preview=document.getElementById('preview');
  if(!preview.contains(e.target))return;
  const sel=window.getSelection();
  if(sel&&!sel.isCollapsed)return;
  const el=previewBlockForNode(e.target)||previewBlockFromPoint(e.clientX,e.clientY);
  if(!el)return;
  const txt=el.textContent.trim();
  if(!txt||txt.length<3)return;
  markPreviewSelection(el);
  addChip(txt,{source:'block',blockKey:blockKeyForElement(el)});
});

/* ── SUBMIT INSTRUCTION ── */
function dedupeInstructionChips(chips){
  const active=Array.isArray(chips)?chips:[];
  return active.filter((chip,idx)=>{
    const text=normChipText(chip?.sel);
    if(!text)return false;
    return !active.some((other,otherIdx)=>{
      if(otherIdx===idx)return false;
      const otherText=normChipText(other?.sel);
      return otherText.includes(text)&&(otherText.length>text.length||otherIdx<idx);
    });
  });
}

function submitChips(){
  const instr=document.getElementById('imodal-ta').value.trim();
  if(!instr)return;
  const active=S.chips.filter(c=>c.active);
  if(!active.length)return;
  const contextChips=dedupeInstructionChips(active);
  const sel=contextChips.map(c=>c.sel).join('\n\n---\n\n');
  if(!sel.trim())return;
  const fileId=active[0].fileId;
  const ctrl=new AbortController();
  const job=attachRunMeta({
    id:'j'+(++S.jc),fileId,sel,instr,
    ts:ts(),state:'working',startedAt:Date.now(),ctrl,
    stream:'',proposed:null,parallel:false,
    agents:{claude:{stream:'',proposed:null,done:false,error:null},codex:{stream:'',proposed:null,done:false,error:null}},
  });
  S.jobs.unshift(job);
  // 지시에 사용한 활성 칩은 처리 후 목록에서 제거한다.
  S.chips=S.chips.filter(c=>!c.active);
  closeInstructModal();
  renderChips();renderJobs();syncB();
	  if(bridgeRecentlyAvailable())executeSessionEditJob(job.id,contextChips);
  else{job.state='error';job.stream='문서 연결이 필요합니다.';renderJobs();}

async function executeSessionEditJob(id,contextChips){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const session=await ensureEditSession(job.fileId);
    job.sourceSessionId=session.id;
    job.sessionAgent=session.agent;
    job.stream=`${session.agent==='claude'?'Claude':'Codex'} 편집 세션 준비 중…\n`;
    renderJobs();syncB();
    const attachments=editAttachmentsFromChips(contextChips,job.fileId);
    const message=editSessionMessage(job);
    S.sessionMessages[session.id]=[...(S.sessionMessages[session.id]||[]),{
      id:'local-'+Date.now(),
      role:'user',
      text:message,
      attachments,
      createdAt:new Date().toISOString(),
    }];
    const res=await fetch(`${BRIDGE}/sessions/${encodeURIComponent(session.id)}/turn`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({
        message,
        attachments,
        outputHints:{
          editMode:true,
          targetFileId:job.fileId,
          targetContent:S.content[job.fileId]||'',
          preferArtifacts:['patch','diff'],
        },
      }),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.type==='turn.started'&&ev.session){
            const idx=S.sessions.findIndex(s=>s.id===ev.session.id);if(idx!==-1)S.sessions[idx]=ev.session;
          }
          if(ev.type==='turn.delta'){
            job.stream+=ev.text;
            S.sessionStreams[session.id]=(S.sessionStreams[session.id]||'')+ev.text;
          }
          if(ev.type==='artifact.created'&&ev.artifact){
            job.proposed=ev.artifact.proposedContent||'';
            job.artifactId=ev.artifact.id;
            S.sessionArtifacts[session.id]=[...(S.sessionArtifacts[session.id]||[]),ev.artifact];
          }
          if(ev.type==='turn.done'){
            job.state=job.proposed?'done':'error';
            if(!job.proposed)job.stream+='\n수정 가능한 산출물을 만들지 못했습니다. 지시를 더 구체화해 다시 시도해 주세요.';
            S.sessionStreams[session.id]='';
            if(ev.session){const idx=S.sessions.findIndex(s=>s.id===ev.session.id);if(idx!==-1)S.sessions[idx]=ev.session;}
            await loadSessionDetail(session.id,false);
          }
          if(ev.type==='turn.error'){
            job.state='error';
            job.stream=ev.error||'세션 편집 오류';
          }
          scheduleJobsRender();
          if(S.rightTab==='sessions')scheduleSessionRender();
        }catch{}
      }
    }
    if(job.state==='working'){
      job.state=job.proposed?'done':'error';
      if(!job.proposed)job.stream+='\n수정 가능한 산출물을 만들지 못했습니다.';
    }
    renderJobs();syncB();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

    id:'j'+(++S.jc),kind:'project-chat',fileId:scope?`${typeLabel}: ${scopeLabel}`:'프로젝트',
    sel:scope?`${typeLabel}: ${scopeLabel}`:'현재 프로젝트',
    instr,scopedInstr,targetAgent,promptMode,projectScope:scope||null,clarifierOnly:promptMode==='grill',
    ts:ts(),state:'working',startedAt:Date.now(),ctrl,
    stream:'',proposed:null,parallel:false,
    agents:{claude:{stream:'',response:null,done:false,error:null,artifacts:[]},codex:{stream:'',response:null,done:false,error:null,artifacts:[]}},
  });
}

async function executeProjectSessionJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const agent=job.targetAgent||selectedRunAgent();
    const scopeType=job.projectScope?.type==='folder'?'folder':job.projectScope?.type==='file'?'file':'project';
    const scopeId=scopeType==='project'?'':String(job.projectScope?.id||'');
    let session=job.sourceSessionId?(S.sessions.find(s=>s.id===job.sourceSessionId)||null):null;
    if(!session&&job.sourceSessionId){
      await loadSessionDetail(job.sourceSessionId,false);
      session=S.sessions.find(s=>s.id===job.sourceSessionId)||null;
    }
    if(!session)session=await ensureProjectSession(agent,{type:scopeType,id:scopeId});
    job.targetAgent=session.agent;
    job.sourceSessionId=session.id;
    job.parallel=false;
    const ag=job.agents[session.agent];
    ag.stream=`${session.agent==='claude'?'Claude':'Codex'} 세션 준비 중…\n`;
    job.phase='세션 준비';
    S.activeSessionId=session.id;
    renderJobs();syncB();
    const message=job.clarifierOnly
      ?clarificationInstruction(job.instr,job.projectScope)
      :(job.scopedInstr||job.instr);
    S.sessionMessages[session.id]=[...(S.sessionMessages[session.id]||[]),{
      id:'local-'+Date.now(),
      role:'user',
      text:message,
      attachments:[],
      createdAt:new Date().toISOString(),
    }];
    S.sessionStreams[session.id]='';
    S.sessionTurnStartedAt[session.id]=Date.now();
    S.sessionProgress[session.id]='프로젝트 프롬프트 준비 중';
    job.phase='프롬프트 구성';
    const res=await fetch(`${BRIDGE}/sessions/${encodeURIComponent(session.id)}/turn`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({
        message,
        attachments:[],
        outputHints:{
          turnType:job.clarifierOnly?'review':'project',
          promptMode:job.clarifierOnly?'clarify':(job.promptMode||'refine'),
          preferArtifacts:job.clarifierOnly?[]:['file-ops','patch'],
          targetFileId:scopeType==='file'?scopeId:'',
        },
      }),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;job.phase='요청 실패';renderJobs();return;}
    job.phase='CLI 실행';
    scheduleJobsRender();
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.type==='turn.started'&&ev.session){
            if(ev.promptPackage){
              S.sessionPromptPackages[session.id]=ev.promptPackage;
              job.promptPackage=ev.promptPackage;
            }
            const idx=S.sessions.findIndex(s=>s.id===ev.session.id);if(idx!==-1)S.sessions[idx]=ev.session;
            ag.stream='';S.sessionProgress[session.id]='응답 대기 중';job.phase='응답 대기';
          }
          if(ev.type==='turn.delta'){
            ag.stream+=ev.text;
            S.sessionStreams[session.id]=(S.sessionStreams[session.id]||'')+ev.text;
            S.sessionProgress[session.id]='응답 수신 중';job.phase='응답 수신';
            if(!document.querySelector(`.jstream[data-stream-id="${CSS.escape(`${job.id}:${session.agent}`)}"]`))scheduleJobsRender();
            updateJobStreamDom(job.id,session.agent,ag.stream);
          }
          if(ev.type==='turn.progress'){
            const elapsed=Math.floor(Number(ev.elapsedMs||0)/1000);
            job.phase=ev.phase==='streaming'?`스트리밍 중 · ${elapsed}초`:`CLI 응답 대기 · ${elapsed}초`;
            S.sessionProgress[session.id]=job.phase;
            scheduleJobsRender();
          }
          if(ev.type==='artifact.created'&&ev.artifact){
            ag.artifacts=[...(ag.artifacts||[]),ev.artifact];
            S.sessionArtifacts[session.id]=[...(S.sessionArtifacts[session.id]||[]),ev.artifact];
            S.sessionProgress[session.id]='작업 후보 정리 중';job.phase='작업 후보 정리';
          }
          if(ev.type==='turn.done'){
            ag.done=true;
            ag.response=ev.message?.text||ag.stream;
            job.state=job.clarifierOnly?'needs-input':(ag.error?'error':'done');
            job.phase=job.clarifierOnly?'답변 대기':'완료';
            S.sessionStreams[session.id]='';
            delete S.sessionTurnStartedAt[session.id];delete S.sessionProgress[session.id];delete S.sessionPromptPackages[session.id];
            if(ev.session){const idx=S.sessions.findIndex(s=>s.id===ev.session.id);if(idx!==-1)S.sessions[idx]=ev.session;}
            await loadSessionDetail(session.id,false);
          }
          if(ev.type==='turn.error'){
            ag.error=ev.error||'세션 오류';
            job.state='error';
            job.stream=ag.error;
            job.phase='오류';
            delete S.sessionTurnStartedAt[session.id];delete S.sessionProgress[session.id];delete S.sessionPromptPackages[session.id];
          }
          if(ev.type!=='turn.delta')scheduleJobsRender();
          if(S.rightTab==='sessions')scheduleSessionRender();
        }catch{}
      }
    }
    if(job.state==='working'){
      ag.done=true;
      ag.response=ag.stream;
      job.state='done';
      job.phase='완료';
    }
    renderJobs();syncB();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

async function executeJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const res=await fetch(BRIDGE+'/instruct',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({fileId:job.fileId,context:job.sel,instruction:job.instr,content:S.content[job.fileId]||''}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.parallel!==undefined){job.parallel=ev.parallel;}
          if(job.parallel){
            // 병렬 모드
            const src=ev.source;
            if(src&&job.agents[src]){
              if(ev.chunk!==undefined){job.agents[src].stream+=ev.chunk;}
              if(ev.done){job.agents[src].done=true;job.agents[src].proposed=ev.proposed;}
              if(ev.error){job.agents[src].error=ev.error;}
            }
            // 둘 다 끝났으면 done
            const ag=job.agents;
            if((ag.claude.done||ag.claude.error)&&(ag.codex.done||ag.codex.error)){
              job.state='done';
            }
          } else {
            // 단일 모드 (codex 없음)
            if(ev.chunk){job.stream+=ev.chunk;}
            if(ev.done){job.state='done';job.proposed=ev.proposed;}
            if(ev.error){job.state='error';job.stream=ev.error;}
          }
          scheduleJobsRender();
        }catch{}
      }
    }
    if(job.state==='working'){
      if(job.parallel){job.state='done';}
      else{job.state='done';job.proposed=job.stream;}
    }
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

async function executeProjectChat(id){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const targets=job.targetAgent?[job.targetAgent]:['claude','codex'];
    targets.forEach(src=>{
      if(job.agents[src]&&!job.agents[src].stream){
        job.agents[src].stream=`${src==='claude'?'Claude':'Codex'} 응답 대기 중…\n`;
      }
    });
    renderJobs();
    const res=await fetch(BRIDGE+'/project-chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({instruction:job.instr,agent:job.targetAgent||''}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.parallel!==undefined){job.parallel=ev.parallel;}
          if(ev.agent&&!job.parallel){
            const target=ev.agent;
            if(job.agents[target]&&!job.agents[target].stream){
              job.agents[target].stream=`${target==='claude'?'Claude':'Codex'} 실행 중…\n`;
            }
          }
          const src=ev.source;
          if(src&&job.agents[src]){
            if(ev.chunk!==undefined){
              if(job.agents[src].stream.endsWith('응답 대기 중…\n')||job.agents[src].stream.endsWith('실행 중…\n'))job.agents[src].stream='';
              job.agents[src].stream+=ev.chunk;
            }
            if(ev.artifact)job.agents[src].artifacts=[...(job.agents[src].artifacts||[]),ev.artifact];
            if(Array.isArray(ev.artifacts)&&ev.artifacts.length)job.agents[src].artifacts=[...(job.agents[src].artifacts||[]),...ev.artifacts];
            if(ev.done){job.agents[src].done=true;job.agents[src].response=ev.response;}
            if(ev.error){job.agents[src].error=ev.error;}
          }
          if(ev.error&&!src){job.state='error';job.stream=ev.error;}
          const ag=job.agents;
          if(job.parallel&&(ag.claude.done||ag.claude.error)&&(ag.codex.done||ag.codex.error))job.state='done';
          if(!job.parallel){
            const target=job.targetAgent||'claude';
            if(ag[target].done||ag[target].error)job.state=ag[target].error?'error':'done';
          }
          scheduleJobsRender();
        }catch{}
      }
    }
    if(job.state==='working')job.state='done';
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

function projectFileOpsArtifacts(agent){
  return (agent?.artifacts||[]).filter(item=>item&&item.kind==='file-ops');
}

function projectFileOpsOperations(agent){
  return projectFileOpsArtifacts(agent).flatMap(item=>Array.isArray(item.operations)?item.operations:[]);
}

function stripDocpilotArtifacts(text){
  return String(text||'').replace(/<docpilot-artifact\b[^>]*>[\s\S]*?<\/docpilot-artifact>/g,'').trim();
}

function fileOpsPreviewHtml(j,src){
  const ag=j.agents[src];
  const artifacts=projectFileOpsArtifacts(ag);
  if(!artifacts.length)return '';
  const operations=projectFileOpsOperations(ag);
  const errors=artifacts.flatMap(item=>Array.isArray(item.errors)?item.errors:[]).filter(Boolean);
  const summary=artifacts.map(item=>item.summary||'').filter(Boolean).join('\n');
  const applied=artifacts.some(item=>item.applied);
  const list=operations.slice(0,6).map(op=>{
    const type=op.type==='directory'?'디렉토리':op.type==='file'?'파일':'대상';
    const state=op.exists===false?' · 없음':'';
    const reason=op.reason?`<div class="jctx">${esc(op.reason)}</div>`:'';
    return `<div class="jctx">삭제 예정 · ${type}${state}: <code>${esc(op.path)}</code></div>${reason}`;
  }).join('');
  const more=operations.length>6?`<div class="jctx">외 ${operations.length-6}개 더 있음</div>`:'';
  const err=errors.length?`<div class="jstatus" style="color:var(--rd)">무시된 항목 ${errors.length}개</div>`:'';
  const action=operations.length&&!applied
    ?`<button class="japply" onclick="applyProjectOps('${j.id}','${src}')">작업 적용</button>`
    :applied?`<span class="jstatus" style="color:var(--gn)">✓ 적용됨</span>`:'';
  return `<div class="jstream">
    <div class="jstatus" style="color:var(--yl)">삭제 후보 ${operations.length}개</div>
    ${summary?`<div class="jctx">${esc(summary)}</div>`:''}
    ${list||'<div class="jctx">적용 가능한 작업이 없습니다.</div>'}
    ${more}
    ${err}
    <div class="jactions" style="margin-top:6px">${action}</div>
  </div>`;
}

async function applyJob(id,source){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  const returnSessionId=job.sourceSessionId||job.sessionId||'';
  const content=job.parallel
    ?(source&&job.agents[source]?job.agents[source].proposed:null)
    :job.proposed;
  if(!content)return;
  if(job.snapshotContent&&S.content[job.fileId]!==job.snapshotContent){
    const ok=confirm('AI 실행 이후 현재 문서가 바뀌었습니다. 스냅샷 기준 변경안을 그래도 적용할까요?');
    if(!ok)return;
  }
  S.content[job.fileId]=content;
  if(S.bridge){
    try{await fetch(`${BRIDGE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:job.fileId,content})});}catch{}
  }
  S.jobs=S.jobs.filter(j=>j.id!==id);
  if(S.file===job.fileId)renderEditor();
  if(returnSessionId){
    S.activeSessionId=returnSessionId;
    await loadSessionDetail(returnSessionId,false);
    returnToSessions();
  }else{
    renderJobs();syncB();
  }
}
async function reloadProjectFiles(){
  if(!S.bridge)return;
  try{
    const r=await fetch(`${BRIDGE}/files`);
    if(!r.ok)return;
    const d=await r.json();
    S.files=d.files||[];
    S.workspaceRoots=Array.isArray(d.roots)?d.roots:S.workspaceRoots;
    _tree=buildTreeFromPaths(S.files,S.workspaceRoots);
    renderInstructionFiles();
    refreshTree();
  }catch{}
}
async function applyProjectOps(id,source){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  const ag=job.agents[source];if(!ag)return;
  const operations=projectFileOpsOperations(ag);
  if(!operations.length){alert('적용할 파일 작업이 없습니다.');return;}
  const ok=confirm(`${operations.length}개 파일/디렉토리를 .docpilot/trash로 이동합니다. 적용할까요?`);
  if(!ok)return;
  try{
    const res=await fetch(`${BRIDGE}/file-ops/apply`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({operations})});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    projectFileOpsArtifacts(ag).forEach(item=>item.applied=true);
    ag.applyResult=data;
    const applied=data.applied||[];
    const deletedCurrent=S.file&&applied.some(op=>S.file===op.path||S.file.startsWith(op.path+'/'));
    if(deletedCurrent){
      S.file=null;
      setEmptyState('ready','적용된 작업으로 현재 파일이 이동되었습니다');
    }
    await reloadProjectFiles();
    await loadFileStatus();
    renderJobs();syncB();
  }catch(err){
    ag.error=err.message||'파일 작업 적용 실패';
    renderJobs();
  }
}
function rejectJob(id){S.jobs=S.jobs.filter(j=>j.id!==id);renderJobs();syncB();}
function cancelJob(id){
  const job=S.jobs.find(j=>j.id===id);
  try{job?.ctrl?.abort();}catch{}
  rejectJob(id);
}
function clearJobs(){S.jobs=[];renderJobs();syncB();}

async function combineJob(id){
  const src=S.jobs.find(j=>j.id===id);if(!src)return;
  const cp=src.agents.claude.proposed;const xp=src.agents.codex.proposed;
  if(!cp||!xp)return;
  const ctrl=new AbortController();
  const job=attachRunMeta({
    id:'j'+(++S.jc),fileId:src.fileId,sel:src.sel,instr:'[조합] '+src.instr,
    ts:ts(),state:'working',startedAt:Date.now(),ctrl,
    stream:'',proposed:null,parallel:false,
    agents:{claude:{stream:'',proposed:null,done:false,error:null},codex:{stream:'',proposed:null,done:false,error:null}},
  });
  S.jobs.unshift(job);renderJobs();syncB();
  try{
    const res=await fetch(BRIDGE+'/instruct',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({fileId:job.fileId,context:src.sel,instruction:src.instr,
        content:S.content[job.fileId]||'',combine:true,claudeProposed:cp,codexProposed:xp}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.chunk&&!ev.source){job.stream+=ev.chunk;}
          if(ev.done&&!ev.source){job.state='done';job.proposed=ev.proposed;}
          if(ev.error&&!ev.source){job.state='error';job.stream=ev.error;}
          renderJobs();
        }catch{}
      }
    }
    if(job.state==='working'){job.state='done';job.proposed=job.stream;}
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return;
    job.state='error';job.stream=err.message;renderJobs();
  }
}

function renderJobs(){
  const wrap=document.getElementById('rp-body');

  wrap.querySelectorAll('.jstream[data-stream-id]').forEach(el=>{
    const atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<4;
    streamPositions[el.dataset.streamId]={top:el.scrollTop,atBottom};
  });
  if(!S.jobs.length){
    wrap.innerHTML=workbenchEmptyHtml();
    wrap.scrollTop=keepTop;
    return;
  }
  wrap.innerHTML=`<div class="workbench-shell">${S.jobs.map(renderRunCard).join('')}</div>`;
  wrap.scrollTop=Math.min(keepTop, wrap.scrollHeight);
  wrap.querySelectorAll('.jstream[data-stream-id]').forEach(el=>{
    const prev=streamPositions[el.dataset.streamId];
    if(!prev)return;
    el.scrollTop=prev.atBottom?el.scrollHeight:Math.min(prev.top,el.scrollHeight);
  });
}

/* ── SESSIONS ── */
function setRightTab(tab){
  S.rightTab=(tab==='workbench'||tab==='history')?'workbench':'sessions';
  syncB();
  renderRightPanel();
}

function returnToSessions(){
  const panel=document.getElementById('rpanel');
  if(panel?.classList.contains('collapsed'))panel.classList.remove('collapsed');
  S.rightTab='sessions';
  S.activeSessionId='';
  syncB();
  renderSessions();
}

function renderRightPanel(){
  if(S.rightTab==='sessions')renderSessions();
  else renderJobs();
}

function activeSession(){
  return S.sessions.find(s=>s.id===S.activeSessionId)||null;
}

async function loadSessions(){
  if(!S.bridge)return;
  try{
    const r=await fetch(BRIDGE+'/sessions');
    if(!r.ok)return;
    const d=await r.json();
    S.sessions=Array.isArray(d.sessions)?d.sessions:[];
    if(S.activeSessionId&&!S.sessions.some(s=>s.id===S.activeSessionId))S.activeSessionId='';
    if(S.activeSessionId)await loadSessionDetail(S.activeSessionId,false);
    if(S.rightTab==='sessions')renderSessions();
  }catch{}
}

async function loadSessionDetail(id,rerender=true){
  if(!S.bridge||!id)return;
  try{
    const r=await fetch(BRIDGE+'/sessions/'+encodeURIComponent(id));
    if(!r.ok)return;
    const d=await r.json();
    const idx=S.sessions.findIndex(s=>s.id===id);
    if(d.session){
      if(idx===-1)S.sessions.unshift(d.session);
      else S.sessions[idx]=d.session;
    }
    S.sessionMessages[id]=Array.isArray(d.messages)?d.messages:[];
    S.sessionArtifacts[id]=Array.isArray(d.artifacts)?d.artifacts:[];
    if(rerender&&S.rightTab==='sessions')renderSessions();
  }catch{}
}

async function createSession(agent){
  if(!S.bridge)return;
  const label=agent==='codex'?'Codex':'Claude';
  const title=`${label} · ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`;
  try{
    const r=await fetch(BRIDGE+'/sessions',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({agent,title,scope:{currentFileId:S.file||''}})});
    if(!r.ok)return;
    const d=await r.json();
    if(d.session){
      S.sessions.unshift(d.session);
      S.activeSessionId=d.session.id;
      S.aiMode=d.session.agent==='codex'?'codex':'claude';
      S.sessionMessages[d.session.id]=[];
      S.sessionArtifacts[d.session.id]=[];
      syncAiModeUi();
      renderSessions();
    }
  }catch{}
}

async function selectSession(id){
  S.activeSessionId=id;
  const session=S.sessions.find(s=>s.id===id);
  if(session?.agent)S.aiMode=session.agent==='codex'?'codex':'claude';
  syncAiModeUi();
  await loadSessionDetail(id);
}

async function deleteSession(id,e){
  e?.preventDefault();
  e?.stopPropagation();
  const session=S.sessions.find(s=>s.id===id);
  if(!session||!S.bridge)return;
  if(!confirm(`"${session.title||session.agent}" 세션을 삭제할까요? 대화와 산출물이 함께 삭제됩니다.`))return;
  try{
    const r=await fetch(BRIDGE+'/sessions/'+encodeURIComponent(id),{method:'DELETE'});
    if(!r.ok)return;
    S.sessions=S.sessions.filter(s=>s.id!==id);
    delete S.sessionMessages[id];
    delete S.sessionArtifacts[id];
    delete S.sessionStreams[id];
    delete S.sessionTurnStartedAt[id];
    delete S.sessionProgress[id];
    delete S.sessionPromptPackages[id];
    delete S.sessionAbortControllers[id];
    if(S.activeSessionId===id)S.activeSessionId='';
    renderSessions();
  }catch{}
}

async function clearSessions(){
  if(!S.bridge||!S.sessions.length)return;
  if(!confirm('모든 숨겨진 세션 대화와 산출물을 삭제할까요? 현재 Workbench 항목은 유지됩니다.'))return;
  try{
    const r=await fetch(BRIDGE+'/sessions',{method:'DELETE'});
    if(!r.ok)return;
    S.sessions=[];
    S.activeSessionId='';
    S.sessionMessages={};
    S.sessionArtifacts={};
    S.sessionStreams={};
    S.sessionTurnStartedAt={};
    S.sessionProgress={};
    S.sessionPromptPackages={};
    S.sessionAbortControllers={};
    renderSessions();
  }catch{}
}

function sessionAttachmentChips(){
  if(Array.isArray(S.pendingSessionAttachments))return S.pendingSessionAttachments;
  const active=S.chips.filter(c=>c.active).slice(0,8);
  return active.map(c=>({
    kind:'selection',
    fileId:c.fileId,
    label:c.fileId||'selection',
    text:c.sel,
    source:c.source||'chip',
    range:c.lineStart||c.lineEnd?{startLine:c.lineStart,endLine:c.lineEnd}:undefined,
  }));
}

function attachmentsFromChips(chips){
  return (Array.isArray(chips)?chips:[]).slice(0,8).map(c=>({
    kind:'selection',
    fileId:c.fileId,
    label:c.fileId||'selection',
    text:c.sel,
    source:c.source||'chip',
    range:c.lineStart||c.lineEnd?{startLine:c.lineStart,endLine:c.lineEnd}:undefined,
  }));
}

async function sendChipsToSessionCompose(){
  const selected=S.chips.filter(c=>c.active);
  const chips=(selected.length?selected:S.chips).slice(0,8);
  if(!chips.length)return;
  const attachments=attachmentsFromChips(chips);
  await focusConsoleSession({attachments,text:''});
}

function renderSessionThread(session){
  const agent=session.agent==='codex'?'codex':'claude';
  const agentLabel=aiModeLabel(agent);
  const messages=S.sessionMessages[session.id]||[];
  const artifacts=S.sessionArtifacts[session.id]||[];
  const stream=S.sessionStreams[session.id]||'';
  const attachments=sessionAttachmentChips();
  const promptPackage=S.sessionPromptPackages[session.id]||null;
  const running=session.status==='running'||!!S.sessionTurnStartedAt[session.id];
  const started=S.sessionTurnStartedAt[session.id]||Date.now();
  const elapsed=Math.max(0,Math.floor((Date.now()-started)/1000));
  const stage=S.sessionProgress[session.id]||(stream?'응답 수신 중':'요청 처리 중');
  const msgHtml=messages.map(m=>{
    const rendered=m.role==='assistant';
    const body=rendered?md(m.text||''):esc(m.text||'');
    const roleLabel=m.role==='user'?'사용자':agentLabel;
    return `<div class="sess-msg ${m.role==='user'?'user':'assistant'}">
      <div class="sess-msg-role"><span>${esc(roleLabel)}</span></div>
      ${Array.isArray(m.attachments)&&m.attachments.length?`<div class="sess-attach">${m.attachments.map(a=>`<span class="sess-chip">${esc(a.fileId||a.label||a.kind)}</span>`).join('')}</div>`:''}
      <div class="sess-msg-text ${rendered?'rendered':''}">${body}</div>
    </div>`;
  }).join('');
  const streamHtml=stream?`<div class="sess-msg assistant"><div class="sess-msg-role"><span>${esc(agentLabel)} 응답 중</span></div><div class="sess-msg-text rendered">${md(stream)}</div></div>`:'';
  const progressHtml=running?`<div class="sess-progress">
    <div class="sess-progress-top"><span class="spin"></span><span id="sess-progress-label">${esc(stage)} · ${elapsed}s</span></div>
    ${promptPackage?sessionBudgetHtml(promptPackage):''}
    <div class="sess-progress-bar"><div class="sess-progress-fill"></div></div>
  </div>`:'';
  const artifactHtml=artifacts.slice(-4).map(a=>`
    <div class="sess-artifact">
      <div class="sess-artifact-title">${esc(a.kind)} · ${esc(a.fileId||'artifact')}</div>
      <button class="jprev" onclick="promoteSessionArtifact('${session.id}','${a.id}')">검토 작업으로 보내기</button>
    </div>`).join('');
  return `<div class="sess-thread agent-${agent}">
    <div class="sess-head agent-${agent}">
      <button class="sess-back to-list" onclick="S.activeSessionId='';renderSessions()">‹ 세션 목록</button>
      <img class="sess-agent-logo" src="${aiAgentIcon(agent)}" alt="">
      <div class="sess-title"><strong>${esc(displaySessionTitle(session))}</strong><span>${esc(agentStatusText(session.status||'idle'))}</span></div>
    </div>
    ${progressHtml}
    <div class="sess-messages" id="sess-messages">${msgHtml}${streamHtml}${artifactHtml||''}</div>
    <div class="sess-compose">
      ${attachments.length?`<div class="sess-attach">${attachments.map(a=>`<span class="sess-chip">${esc(a.fileId||a.label)}</span>`).join('')}</div>`:''}
      <textarea class="sess-ta" id="sess-ta" placeholder="메시지를 입력하세요" onkeydown="handleSessionKeydown(event)">${''}</textarea>
      <div class="sess-actions">
        <div class="sess-note" id="sess-note">${sessionComposeNote(running,elapsed)}</div>
        <button class="sess-send secondary" onclick="sendSessionFullFileJob()" ${running||!S.file?'disabled':''}>현재 문서 전체 작업</button>
        ${running
          ?`<button class="sess-send secondary" onclick="stopSessionTurn('${session.id}')">중지</button>`
          :`<button class="sess-send" onclick="sendSessionTurn()">전송</button>`}
      </div>
    </div>
  </div>`;
}

function sessionBudgetHtml(pkg){
  const total=Number(pkg.totalPromptChars||0).toLocaleString();
  const mode=pkg.contextMode||'minimal';
  const attach=Number(pkg.included?.attachments||0);
  const turns=Number(pkg.included?.transcriptMessages||0);
  const omitted=Number(pkg.omitted?.transcriptMessages||0)+Number(pkg.omitted?.attachments||0);
  const sectionLabel=name=>{
    const key=String(name||'');
    if(key==='activeInstructions')return '지침';
    if(key==='sessionIntro')return '세션 규칙';
    if(key==='outputContract')return '출력 규칙';
    if(key==='sessionSummary')return '세션 요약';
    if(key==='recentTranscript')return '최근 대화';
    if(key==='selectedContext')return '첨부 문맥';
    if(key==='userTurn')return '사용자 입력';
    return key||'항목';
  };
  const userChars=Array.isArray(pkg.sections)
    ?Number((pkg.sections.find(s=>s?.name==='userTurn')||{}).chars||0)
    :0;
  const sections=Array.isArray(pkg.sections)
    ?pkg.sections
      .filter(s=>s?.included&&Number(s.chars||0)>0)
      .map(s=>`${sectionLabel(s.name||s.label)} ${Number(s.chars||0).toLocaleString()}자`)
      .join(' · ')
    :'';
  return `<div class="sess-budget">
    <span class="sess-budget-chip">범위 ${esc(contextModeLabel(mode))}</span>
    <span class="sess-budget-chip" title="${escA(sections||'실제 전송되는 전체 패키지 크기')}">전체 ${esc(total)}자</span>
    <span class="sess-budget-chip">입력 ${userChars.toLocaleString()}자</span>
    <span class="sess-budget-chip">대화 ${turns}개</span>
    <span class="sess-budget-chip">문맥 ${attach}개</span>
    ${omitted?`<span class="sess-budget-chip">제외 ${omitted}개</span>`:''}
    ${sections?`<span class="sess-budget-detail">${esc(sections)}</span>`:''}
  </div>`;
}

let _sessionRenderTimer=null;
function scheduleSessionRender(){
  if(S.rightTab!=='sessions')return;
  if(_sessionRenderTimer)return;
  _sessionRenderTimer=setTimeout(()=>{
    _sessionRenderTimer=null;
    const activeTag=document.activeElement?.tagName;
    if(activeTag==='TEXTAREA'||activeTag==='INPUT')return;
    renderSessions();
  },220);
}

function updateSessionProgressDom(sessionId){
  if(S.activeSessionId!==sessionId||S.rightTab!=='sessions')return;
  const running=!!S.sessionTurnStartedAt[sessionId];
  if(!running)return;
  const started=S.sessionTurnStartedAt[sessionId]||Date.now();
  const elapsed=Math.max(0,Math.floor((Date.now()-started)/1000));
  const stage=S.sessionProgress[sessionId]||'요청 처리 중';
  const label=document.getElementById('sess-progress-label');
  const note=document.getElementById('sess-note');
  if(label)label.textContent=`${stage} · ${elapsed}s`;
  if(note)note.textContent=sessionComposeNote(true,elapsed);
}

function renderSessions(){
  if(S.rightTab!=='sessions')return;
  const wrap=document.getElementById('rp-body');
  const keepTop=wrap.scrollTop;
  const oldMsgs=document.getElementById('sess-messages');
  const msgTop=oldMsgs?oldMsgs.scrollTop:0;
  const msgNearBottom=oldMsgs?oldMsgs.scrollTop+oldMsgs.clientHeight>=oldMsgs.scrollHeight-24:true;
  const session=activeSession();
  wrap.innerHTML=`<div class="sess-shell">${session?renderSessionThread(session):renderSessionList()}</div>`;
  wrap.scrollTop=keepTop;
  const msgs=document.getElementById('sess-messages');
  if(msgs)msgs.scrollTop=msgNearBottom?msgs.scrollHeight:msgTop;
}

function handleSessionKeydown(e){
  if(e.key!=='Enter'||e.shiftKey||e.isComposing)return;
  e.preventDefault();
  sendSessionTurn();
}

function stopSessionTurn(sessionId){
  const ctrl=S.sessionAbortControllers[sessionId];
  if(ctrl)ctrl.abort();
  S.sessionProgress[sessionId]='중지 요청 중';
  updateSessionProgressDom(sessionId);
}

async function sendSessionFullFileJob(){
  const session=activeSession();if(!session||!S.bridge||!S.file)return;
  if(session.status==='running'||S.sessionTurnStartedAt[session.id])return;
  const ta=document.getElementById('sess-ta');
  const instr=(ta?.value||'').trim();
  if(!instr)return;
  const content=S.content[S.file]||'';
  if(!content.trim())return;
  const ctrl=new AbortController();
  const job={
    id:'j'+(++S.jc),fileId:S.file,sel:content,instr:`[세션 전체 문서] ${instr}`,
    ts:ts(),state:'working',startedAt:Date.now(),ctrl,
    stream:'',proposed:null,parallel:false,
    agents:{claude:{stream:'',proposed:null,done:false,error:null},codex:{stream:'',proposed:null,done:false,error:null}},
    sourceSessionId:session.id,
  };
  S.jobs.unshift(job);
  ta.value='';
  setRightTab('history');
  renderJobs();syncB();
  await executeJob(job.id);
}

async function sendSessionTurn(){
  const session=activeSession();if(!session||!S.bridge)return;
  if(session.status==='running'||S.sessionTurnStartedAt[session.id])return;
  const ta=document.getElementById('sess-ta');
  const message=(ta?.value||'').trim();
  if(!message)return;
  const attachments=sessionAttachmentChips();
  const contextMode=sessionContextMode(message,attachments);
  if(ta)ta.value='';
  S.sessionMessages[session.id]=[...(S.sessionMessages[session.id]||[]),{
    id:'local-'+Date.now(),
    role:'user',
    text:message,
    attachments,
    createdAt:new Date().toISOString(),
  }];
  const idx=S.sessions.findIndex(s=>s.id===session.id);
  if(idx!==-1)S.sessions[idx]={...S.sessions[idx],status:'running'};
  S.sessionStreams[session.id]='';
  S.sessionTurnStartedAt[session.id]=Date.now();
  S.sessionProgress[session.id]='요청 전송 중';
  renderSessions();
  try{
    const ctrl=new AbortController();
    S.sessionAbortControllers[session.id]=ctrl;
    const res=await fetch(`${BRIDGE}/sessions/${encodeURIComponent(session.id)}/turn`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:ctrl.signal,
      body:JSON.stringify({message,attachments,outputHints:{contextMode,targetFileId:attachments[0]?.fileId||S.file||'',preferArtifacts:['patch','diff']}}),
    });
    if(!res.ok){
      S.sessionStreams[session.id]=`HTTP ${res.status}`;
      delete S.sessionTurnStartedAt[session.id];delete S.sessionProgress[session.id];
      delete S.sessionAbortControllers[session.id];
      const idx=S.sessions.findIndex(s=>s.id===session.id);if(idx!==-1)S.sessions[idx]={...S.sessions[idx],status:'errored'};
      renderSessions();return;
    }
    if(Array.isArray(S.pendingSessionAttachments))S.pendingSessionAttachments=null;
    S.chips=S.chips.filter(c=>!c.active);
    renderChips();
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.type==='turn.started'&&ev.session){
            S.sessionTurnStartedAt[session.id]=S.sessionTurnStartedAt[session.id]||Date.now();
            S.sessionProgress[session.id]='프롬프트 패키지 준비됨';
            if(ev.promptPackage)S.sessionPromptPackages[session.id]=ev.promptPackage;
            const idx=S.sessions.findIndex(s=>s.id===ev.session.id);if(idx!==-1)S.sessions[idx]=ev.session;
            updateSessionProgressDom(session.id);
          }
          if(ev.type==='turn.delta'){
            S.sessionProgress[session.id]='응답 수신 중';
            S.sessionStreams[session.id]=(S.sessionStreams[session.id]||'')+ev.text;
            updateSessionProgressDom(session.id);
          }
          if(ev.type==='turn.progress'){
            const elapsed=Math.floor(Number(ev.elapsedMs||0)/1000);
            S.sessionProgress[session.id]=ev.phase==='streaming'?`스트리밍 중 · ${elapsed}초`:`CLI 응답 대기 · ${elapsed}초`;
            updateSessionProgressDom(session.id);
          }
          if(ev.type==='artifact.created'){
            S.sessionProgress[session.id]='변경안 정리 중';
            S.sessionArtifacts[session.id]=[...(S.sessionArtifacts[session.id]||[]),ev.artifact];
            updateSessionProgressDom(session.id);
          }
          if(ev.type==='turn.done'){
            S.sessionStreams[session.id]='';
            delete S.sessionTurnStartedAt[session.id];delete S.sessionProgress[session.id];
            delete S.sessionPromptPackages[session.id];
            delete S.sessionAbortControllers[session.id];
            if(ev.session){const idx=S.sessions.findIndex(s=>s.id===ev.session.id);if(idx!==-1)S.sessions[idx]=ev.session;}
            await loadSessionDetail(session.id,false);
          }
          if(ev.type==='turn.error'){
            S.sessionStreams[session.id]=ev.error||'세션 오류';
            delete S.sessionTurnStartedAt[session.id];delete S.sessionProgress[session.id];
            delete S.sessionPromptPackages[session.id];
            delete S.sessionAbortControllers[session.id];
            const idx=S.sessions.findIndex(s=>s.id===session.id);if(idx!==-1)S.sessions[idx]={...S.sessions[idx],status:'errored'};
          }
          scheduleSessionRender();
        }catch{}
      }
    }
  }catch(err){
    S.sessionStreams[session.id]=err.name==='AbortError'?'사용자가 실행을 중지했습니다.':err.message;
    delete S.sessionTurnStartedAt[session.id];delete S.sessionProgress[session.id];
    delete S.sessionAbortControllers[session.id];
    const idx=S.sessions.findIndex(s=>s.id===session.id);if(idx!==-1)S.sessions[idx]={...S.sessions[idx],status:'errored'};
    renderSessions();
  }
}

async function promoteSessionArtifact(sessionId,artifactId){
  try{
    const r=await fetch(`${BRIDGE}/sessions/${encodeURIComponent(sessionId)}/artifacts/${encodeURIComponent(artifactId)}/promote-job`,{method:'POST'});
    if(!r.ok)return;
    const d=await r.json();
    if(!d.job)return;
    S.jobs.unshift({
      ...d.job,
      id:'j'+(++S.jc),
      ts:ts(),startedAt:Date.now(),ctrl:new AbortController(),
      stream:'',parallel:false,
      sourceSessionId:sessionId,
      agents:{claude:{stream:'',proposed:null,done:false,error:null},codex:{stream:'',proposed:null,done:false,error:null}},
    });
    setRightTab('history');
    renderJobs();syncB();
  }catch{}
}

/* ── PREVIEW MODAL ── */
let _previewJobId=null;
function markDiffGroups(rows){
  let lastType='';
  return rows.map(row=>{
    const grouped=(row.type==='add'||row.type==='del')&&row.type===lastType;
    lastType=row.type==='add'||row.type==='del'?row.type:'';
    return {...row,grouped};
  });
}
function lineDiffRows(oldText,newText){
  const oldLines=String(oldText||'').split('\n');
  const newLines=String(newText||'').split('\n');
  const n=oldLines.length,m=newLines.length;
  if(n*m>180000){
    const max=Math.max(n,m);
    const rows=[];
    for(let idx=0;idx<max;idx++){
      const hasOld=idx<n,hasNew=idx<m;
      const oldText=hasOld?oldLines[idx]:'';
      const newText=hasNew?newLines[idx]:'';
      const type=hasOld&&hasNew&&oldText===newText?'same':hasOld&&hasNew?'del':hasNew?'add':'del';
      rows.push({type,oldNo:hasOld?idx+1:'',newNo:hasNew?idx+1:'',oldText,newText});
    }
    return markDiffGroups(rows);
  }
  const dp=Array.from({length:n+1},()=>Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      dp[i][j]=oldLines[i]===newLines[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
    }
  }
  const rows=[];let i=0,j=0,oldNo=1,newNo=1;
  while(i<n||j<m){
    if(i<n&&j<m&&oldLines[i]===newLines[j]){
      rows.push({type:'same',oldNo:oldNo++,newNo:newNo++,oldText:oldLines[i++],newText:newLines[j++]});
    }else if(j<m&&(i===n||dp[i][j+1]>dp[i+1]?.[j])){
      rows.push({type:'add',oldNo:'',newNo:newNo++,oldText:'',newText:newLines[j++]});
    }else if(i<n){
      rows.push({type:'del',oldNo:oldNo++,newNo:'',oldText:oldLines[i++],newText:''});
    }
  }
  return markDiffGroups(rows);
}

function markdownPreviewBlocks(src){
  const lines=String(src||'').split('\n');
  const blocks=[];let i=0;
  const push=items=>{const raw=items.join('\n').trim();if(raw)blocks.push(raw);};
  while(i<lines.length){
    if(!lines[i].trim()){i++;continue;}
    if(/^```/.test(lines[i])){
      const part=[lines[i++]];
      while(i<lines.length){part.push(lines[i]);if(/^```/.test(lines[i++]))break;}
      push(part);continue;
    }
    if(/^#{1,6}\s+/.test(lines[i])||/^---\s*$/.test(lines[i])){push([lines[i++]]);continue;}
    if(/^>\s?/.test(lines[i])){
      const part=[];while(i<lines.length&&/^>\s?/.test(lines[i]))part.push(lines[i++]);
      push(part);continue;
    }
    if(/^\s*[-*]\s+/.test(lines[i])){
      const part=[];while(i<lines.length&&/^\s*[-*]\s+/.test(lines[i]))part.push(lines[i++]);
      push(part);continue;
    }
    if(/^\s*\d+\.\s+/.test(lines[i])){
      const part=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i]))part.push(lines[i++]);
      push(part);continue;
    }
    if(/^\|.+\|\s*$/.test(lines[i])){
      const part=[];while(i<lines.length&&/^\|.+\|\s*$/.test(lines[i]))part.push(lines[i++]);
      push(part);continue;
    }
    const part=[];
    while(i<lines.length&&lines[i].trim()&&!/^```/.test(lines[i])&&!/^#{1,6}\s+/.test(lines[i])&&!/^---\s*$/.test(lines[i])&&!/^>\s?/.test(lines[i])&&!/^\s*[-*]\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])&&!/^\|.+\|\s*$/.test(lines[i])){
      part.push(lines[i++]);
    }
    push(part);
  }
  return blocks;
}
function sequenceDiffRows(oldItems,newItems){
  const n=oldItems.length,m=newItems.length;
  const dp=Array.from({length:n+1},()=>Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--){
    for(let j=m-1;j>=0;j--){
      dp[i][j]=oldItems[i]===newItems[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
    }
  }
  const rows=[];let i=0,j=0;
  while(i<n||j<m){
    if(i<n&&j<m&&oldItems[i]===newItems[j]){
      rows.push({type:'same',oldBlock:oldItems[i++],newBlock:newItems[j++]});
    }else if(j<m&&(i===n||dp[i][j+1]>dp[i+1]?.[j])){
      rows.push({type:'add',oldBlock:'',newBlock:newItems[j++]});
    }else if(i<n){
      rows.push({type:'del',oldBlock:oldItems[i++],newBlock:''});
    }
  }

}
function markdownLineSig(line){
  if(/^```/.test(line))return 'fence';
  if(/^#{1,6}\s+/.test(line))return 'heading:'+line.match(/^#{1,6}/)[0].length;
  if(/^>\s?/.test(line))return 'quote';
  if(/^\s*[-*]\s+/.test(line))return 'ul';
  if(/^\s*\d+\.\s+/.test(line))return 'ol';
  if(/^\|.+\|\s*$/.test(line))return 'table';
  return 'text';
}
function textSimilarity(a,b){
  a=String(a||'');b=String(b||'');
  const max=Math.max(a.length,b.length);
  if(!max)return 1;
  let pre=0;while(pre<a.length&&pre<b.length&&a[pre]===b[pre])pre++;
  let suf=0;while(suf+pre<a.length&&suf+pre<b.length&&a[a.length-1-suf]===b[b.length-1-suf])suf++;
  return (pre+suf)/max;
}
function changedBlocksComparable(oldBlock,newBlock){
  const oldLines=String(oldBlock||'').split('\n');
  const newLines=String(newBlock||'').split('\n');
  if(oldLines.length!==newLines.length||oldLines.length>80)return false;
  if(oldLines.some(line=>markdownLineSig(line)==='fence')||newLines.some(line=>markdownLineSig(line)==='fence'))return false;
  for(let i=0;i<oldLines.length;i++){
    if(markdownLineSig(oldLines[i])!==markdownLineSig(newLines[i]))return false;
  }
  return textSimilarity(oldBlock,newBlock)>=0.25;
}
function pairChangedPreviewRows(rows){
  const paired=[];
  for(let i=0;i<rows.length;i++){
    const row=rows[i],next=rows[i+1];
    if(next&&row.type==='del'&&next.type==='add'&&changedBlocksComparable(row.oldBlock,next.newBlock)){
      paired.push({type:'change',oldBlock:row.oldBlock,newBlock:next.newBlock});
      i++;continue;
    }
    if(next&&row.type==='add'&&next.type==='del'&&changedBlocksComparable(next.oldBlock,row.newBlock)){
      paired.push({type:'change',oldBlock:next.oldBlock,newBlock:row.newBlock});
      i++;continue;
    }
    paired.push(row);
  }
  return markDiffGroups(paired);
}
function markInlineText(oldText,newText,side){
  oldText=String(oldText||'');newText=String(newText||'');
  if(oldText===newText)return side==='old'?oldText:newText;
  let pre=0;while(pre<oldText.length&&pre<newText.length&&oldText[pre]===newText[pre])pre++;
  let oldEnd=oldText.length,newEnd=newText.length;
  while(oldEnd>pre&&newEnd>pre&&oldText[oldEnd-1]===newText[newEnd-1]){oldEnd--;newEnd--;}
  const src=side==='old'?oldText:newText;
  const end=side==='old'?oldEnd:newEnd;
  const cls=side==='old'?'del':'add';
  if(pre===end)return src;
  return `${src.slice(0,pre)}\x02${cls.toUpperCase()}0\x02${src.slice(pre,end)}\x02${cls.toUpperCase()}1\x02${src.slice(end)}`;
}

function renderInlineChangedBlock(row,side){
