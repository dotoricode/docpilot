'requirements/overview.md':`# 개요 — Eversafe Cordova 플러그인의 역할

## 문제

Eversafe 네이티브 SDK는 모바일 앱의 런타임 보안을 책임진다. 위변조·루팅/탈옥·디버거·에뮬레이터 같은 위협을 탐지하고, 서버 요청의 정당성을 토큰으로 검증한다.

Cordova 앱은 JavaScript 코드만으로 Android/iOS 네이티브 SDK를 직접 사용할 수 없다. JS 공개 API, Android 브릿지, iOS 브릿지, 플랫폼별 SDK 패키징을 하나의 사용 흐름으로 연결하는 플러그인이 필요하다.

## 이 플러그인이 하는 일

Eversafe Cordova 플러그인은 **Cordova 앱이 Android/iOS Eversafe 네이티브 SDK를 JavaScript 코드로 사용할 수 있게** 한다. \`cordova.plugins.EversafePlugin\` API 하나로 양 플랫폼의 Eversafe 기능을 동일하게 쓴다.

핵심 가치:

1. **단일 JS 코드로 양 플랫폼 보안 적용** — 플랫폼 분기 없이 \`initialize\` · \`setSubscriber\` · \`getToken\` 호출
2. **매뉴얼 재활용** — Partners 매뉴얼의 Android/iOS 예시와 같은 단계
3. **네이티브 동작 보존** — 플러그인은 JS ↔ native 경계를 잇는 역할만 함

## 제공 / 비제공

| 구분 | 항목 |
|---|---|
| 제공 | \`initialize\`, \`getToken\`, \`setSubscriber\` |
| 현재 비제공 | DCDO(\`encrypt\`/\`decrypt\`), DSDO(보안 저장소) |`,

> 제품 관점의 기능 목록. 각 기능이 "무엇을 하는가"를 기술한다.

## 1. 위협 탐지 (Dynamic Environment Protection)

앱이 위험한 런타임 환경에서 실행되는지 탐지하고 알린다. 탐지 항목:

- 앱 위변조
- OS 위변조 (루팅 / 탈옥)
- 디버거 연결, ADB / USB 디버깅
- 프록시 설정
- 에뮬레이터 / 시뮬레이터 환경

탐지 시 앱에 위협 코드와 사용자 안내 메시지를 콜백(\`onEversafeThreatFoundCallback\`)으로 전달한다.

## 2. 서버 요청 검증 (Dynamic Server Request Validation)

서버 요청이 정당한 앱 인스턴스에서 왔는지 토큰으로 검증한다. Android는 Google Play Integrity 연동을 선택적으로 켤 수 있다(\`additionalInfo.playIntegrityApiCloudProjectNumber\`).

## 3. 운영 모드 자동 전환

| 모드 | 서버 통신 | 의미 |
|---|---|---|
| 다이나믹 | 성공 | 완전한 서버 검증 세션 |

## 4. 현재 미제공 기능

| 기능 | 상태 |
|---|---|

| iOS \`encryptToken\` 매핑 | 미완성 |`,

## 2. initialize (L1.5)

\`\`\`javascript
cordova.plugins.EversafePlugin.initialize(
  additionalInfo,
  successCallback,
  errorCallback
);
\`\`\`

| 인자 | 필수 | 설명 |
|---|---|---|
| \`additionalInfo\` | 아니오 | 탐지 정책·timeout 등 native SDK에 전달할 옵션 object |
| \`successCallback\` | 아니오 | 초기화 요청 성공 callback |
| \`errorCallback\` | 아니오 | 초기화 실패 callback. 에러 메시지 문자열 전달 |

## 3. setSubscriber (L1.5 + L2)

\`\`\`javascript
function onThreat(code, localizedDescription) { /* 전역 함수 */ }
function onError(errorCode, errorMessage)      { /* 전역 함수 */ }

cordova.plugins.EversafePlugin.setSubscriber(
  onThreat, onError, successCallback, errorCallback
);
\`\`\`

**전역 스코프 필수 (L2 계약):** callback 함수는 반드시 \`window\` 스코프에서 접근 가능해야 한다.

\`\`\`javascript
// 올바른 예
window.onThreat = function(code, desc) { /* ... */ };
window.onError  = function(code, msg)  { /* ... */ };

// 잘못된 예
const onThreat = (code, desc) => { /* ... */ };
\`\`\`

## 4. getToken (L1.5)

\`\`\`javascript
cordova.plugins.EversafePlugin.getToken(
  timeout,
  function successCallback(tokenBase64) { /* 즉시 서버로 전달, 저장 금지 */ },
  function errorCallback(message) {}
);
\`\`\`

토큰은 단기 수명이므로 저장 없이 즉시 App Server로 전달해야 한다.

## 5. 미구현 — encrypt / decrypt

\`encrypt\` 및 \`decrypt\`는 현재 **미완성** 상태다.`,

'adr/ADR-CORDOVA-0001-callback-by-funcname.md':`# ADR-CORDOVA-0001: 콜백을 함수 참조 대신 함수명 문자열로 전달

## 상태
Accepted

## 맥락
Cordova JS-to-Native 브릿지는 JSON-serializable 값만 인자로 받는다. 함수 참조는 직렬화할 수 없다.

## 결정
callback 함수의 \`.name\`을 문자열로 추출해 native에 전달한다. Native는 \`window[name]()\`로 호출한다.

## 결과
- 앱 개발자는 callback 함수를 반드시 \`window\` 스코프에 노출해야 한다
- 번들러 환경에서 이름 맹글링 주의 필요`,

/* ── MARKDOWN ── */
function md(src){
  const blks=[];
  let s=src.replace(/```[\s\S]*?```/g,m=>{blks.push(m);return'\x00B'+(blks.length-1)+'\x00';});
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/((?:^&gt;.*\n?)+)/gm,b=>`<blockquote><p>${b.replace(/^&gt; ?/gm,'').trim()}</p></blockquote>`);
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/((?:\|.+\|\n?)+)/gm,blk=>{
    const rows=blk.trim().split('\n');let out='<table>',hd=false;
    rows.forEach(r=>{if(/^\|\s*[-: |]+\|/.test(r)){hd=true;return;}
      const cells=r.replace(/^\||\|$/g,'').split('|');const tag=hd?'td':'th';
      out+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';if(!hd)hd=true;});
    return out+'</table>';
  });
  s=s.replace(/^---$/gm,'<hr>');
  s=s.replace(/((?:^- .+\n?)+)/gm,b=>'<ul>'+b.trim().split('\n').map(l=>`<li>${l.slice(2)}</li>`).join('')+'</ul>');
  s=s.replace(/((?:^\d+\. .+\n?)+)/gm,b=>'<ol>'+b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.split('\n\n').map(p=>{p=p.trim();if(!p)return'';
    if(/^<(h[1-6]|ul|ol|pre|blockquote|table|hr)/.test(p))return p;
    return'<p>'+p.replace(/\n/g,' ')+'</p>';}).join('\n');
  s=s.replace(/\x00B(\d+)\x00/g,(_,i)=>{const raw=blks[+i];const m=raw.match(/```(\w*)\n([\s\S]*?)```/);if(!m)return'';
    return`<pre><code>${m[2].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;});
  return s;
}

/* ── LIVE FRAME ── */
let fTimer=null;
function schedFrame(){clearTimeout(fTimer);fTimer=setTimeout(updateFrame,150);}
function updateFrame(){
  const id=S.file;if(!id)return;
  const src=S.mode==='edit'?document.getElementById('etxt').value:(S.content[id]||'');

/* ── TREE ── */
function buildTree(nodes,wrap){
  wrap.innerHTML='';
  nodes.forEach(n=>{
    if(n.t==='folder'){
      const div=document.createElement('div');
      div.className='tf'+(n.open?' open':'');
      div.innerHTML=`<div class="tfhd" onclick="this.parentElement.classList.toggle('open')">
        <svg class="tarr" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 3 8 6 4 9"/></svg>
        <span class="tfnm">${n.name}</span></div><div class="tchl"></div>`;
      n.children.forEach(c=>div.querySelector('.tchl').appendChild(mkF(c)));
      wrap.appendChild(div);
    } else wrap.appendChild(mkF(n));
  });
}
function mkF(n){
  const el=document.createElement('div');
  el.className='tfi'+(S.file===n.id?' active':'');
  el.innerHTML=`<div class="tdot"></div><span class="tfnme">${n.name}</span>`;
  el.onclick=()=>openFile(n.id);
  return el;
}

/* ── FILE ── */

function renderEditor(){

  document.getElementById('mp').classList.toggle('active',m==='preview');

/* ── BRIDGE ── */
const BRIDGE='http://localhost:7474';
async function checkBridge(){
  try{const r=await fetch(BRIDGE+'/ping',{signal:AbortSignal.timeout(800)});S.bridge=r.ok;}
  catch{S.bridge=false;}
  document.getElementById('bdot').className='bdot '+(S.bridge?'on':'off');
  document.getElementById('blbl').textContent=S.bridge?'bridge on':'bridge off';

    S.bridge?'':'⚠ bridge off — node docs-bridge.js 실행 후 사용 가능';
}
setInterval(checkBridge,3000);checkBridge();

/* ── BUBBLE ── */
function showBubble(cx,cy){
  const bub=document.getElementById('ibubble');
  const W=window.innerWidth,H=window.innerHeight;
  const bw=348,bh=100;
  let x=cx-bw/2,y=cy-bh-14;
  if(x<8)x=8;if(x+bw>W-8)x=W-bw-8;
  if(y<8)y=cy+20; // flip below if too close to top
  bub.style.left=x+'px';bub.style.top=y+'px';
  document.getElementById('ib-ctx').textContent=trunc(S.pending.sel,52);
  document.getElementById('ib-input').value='';
  bub.classList.add('show');
  setTimeout(()=>document.getElementById('ib-input').focus(),40);
}
function hideBubble(){
  document.getElementById('ibubble').classList.remove('show');
  S.pending=null;
}

/* ── SELECTION (drag) ── */
let hadSel=false;
document.addEventListener('mouseup',e=>{
  if(e.target.closest('#ibubble'))return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){hadSel=false;return;}
  const txt=sel.toString().trim();
  if(!txt||txt.length<2){hadSel=false;return;}
  if(!document.getElementById('preview').contains(sel.anchorNode)){hadSel=false;return;}
  hadSel=true;
  S.pending={sel:txt};
  const rect=sel.getRangeAt(0).getBoundingClientRect();
  showBubble(rect.left+rect.width/2,rect.top);
});

/* ── CLICK (single sentence) ── */
document.getElementById('preview')&&(function(){
  // will be re-attached after preview renders
})();

document.addEventListener('click',e=>{
  if(e.target.closest('#ibubble'))return;
  if(hadSel){hadSel=false;return;} // just finished a drag
  if(S.mode!=='preview')return;
  const preview=document.getElementById('preview');
  if(!preview.contains(e.target))return;
  const sel=window.getSelection();
  if(sel&&!sel.isCollapsed)return;

  const BLOCK=new Set(['P','LI','H1','H2','H3','H4','H5','H6','TD','TH']);
  let el=e.target;
  while(el&&el!==preview&&!BLOCK.has(el.tagName))el=el.parentElement;
  if(!el||el===preview)return;
  const txt=el.textContent.trim();
  if(!txt||txt.length<3)return;
  S.pending={sel:txt};
  showBubble(e.clientX,e.clientY);
});

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('#ibubble'))hideBubble();
});

/* ── SUBMIT INSTRUCTION ── */
function subInstr(){
  const instr=document.getElementById('ib-input').value.trim();
  if(!instr||!S.pending||!S.file)return;
  const ctrl=new AbortController();
  const job={
    id:'j'+(++S.jc),fileId:S.file,sel:S.pending.sel,instr,
    ts:ts(),state:'working',stream:'',proposed:null,
    startedAt:Date.now(),ctrl,
  };
  S.jobs.unshift(job);
  hideBubble();
  renderJobs();syncB();
  if(S.bridge)executeJob(job.id);
  else{job.state='error';job.stream='bridge가 연결되지 않았습니다.\nnode docs-bridge.js 를 실행하세요.';renderJobs();}
  // 120초 타임아웃
  setTimeout(()=>{
    const j=S.jobs.find(x=>x.id===job.id);
    if(j&&j.state==='working'){j.ctrl.abort();j.state='error';j.stream='타임아웃 (120s)';renderJobs();}
  },120000);
}

/* ── JOB EXECUTION ── */
async function executeJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const res=await fetch(BRIDGE+'/instruct',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({fileId:job.fileId,context:job.sel,instruction:job.instr,content:S.content[job.fileId]||''}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.chunk){job.stream+=ev.chunk;renderJobs();}
          if(ev.done){job.state='done';job.proposed=ev.proposed;renderJobs();}
          if(ev.error){job.state='error';job.stream=ev.error;renderJobs();}
        }catch{}
      }
    }
    if(job.state==='working'){job.state='done';job.proposed=job.stream;}
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return; // timeout already handled
    job.state='error';job.stream=err.message;renderJobs();
  }
}

function applyJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job||!job.proposed)return;
  S.content[job.fileId]=job.proposed;
  S.jobs=S.jobs.filter(j=>j.id!==id);
  if(S.file===job.fileId)renderEditor();
  renderJobs();syncB();
}
function rejectJob(id){S.jobs=S.jobs.filter(j=>j.id!==id);renderJobs();syncB();}
function clearJobs(){S.jobs=[];renderJobs();syncB();}

/* ── RENDER JOBS ── */
function renderJobs(){
  const wrap=document.getElementById('rp-body');
  if(!S.jobs.length){
    wrap.innerHTML=`<div class="pempty"><div class="pei">🤖</div>
      <div class="pet">문서에서 텍스트를 드래그하거나<br>문장을 클릭해 지시를 보내세요</div></div>`;
    return;
  }
  wrap.innerHTML=S.jobs.map(j=>{
    let body='';
    if(j.state==='working'){
      const sec=Math.floor((Date.now()-j.startedAt)/1000);
      body=`<div class="jstatus"><div class="spin"></div>작업 중… ${sec}s</div>
        ${j.stream?`<div class="jstream">${esc(j.stream)}</div>`:''}`;
    } else if(j.state==='done'){
      const ol=(S.content[j.fileId]||'').split('\n').length;
      const nl=(j.proposed||'').split('\n').length;
      body=`<div class="jstatus" style="color:var(--gn)">✓ 완료 — ${ol}줄 → ${nl}줄</div>
        <div class="jactions">
          <button class="japply" onclick="applyJob('${j.id}')">적용</button>
          <button class="jreject" onclick="rejectJob('${j.id}')">거부</button>
          <span class="jts">${j.ts}</span>
        </div>`;
    } else if(j.state==='error'){
      body=`<div class="jstatus" style="color:var(--rd)">✗ ${esc(j.stream.slice(0,80))}</div>
        <div class="jactions"><button class="jreject" onclick="rejectJob('${j.id}')">닫기</button></div>`;
    }
    return`<div class="jcard ${j.state}">
      <div class="jfile">${j.fileId}</div>
      <div class="jctx">${esc(j.sel)}</div>
      <div class="jinstr">${esc(j.instr)}</div>
      ${body}
    </div>`;
  }).join('');
}

/* ── BADGES ── */
function syncB(){
  const n=S.jobs.length;
  const b=document.getElementById('ccbadge');
  b.style.display=n?'inline-flex':'none';b.textContent=n;
  document.getElementById('clrbtn').style.display=n?'inline-flex':'none';
}

/* ── UTILS ── */
function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}
function ts(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── TICK (elapsed time for working jobs) ── */
setInterval(()=>{if(S.jobs.some(j=>j.state==='working'))renderJobs();},1000);

/* ── INIT ── */
buildTree(TREE,document.getElementById('troot'));
openFile('requirements/overview.md');
</script>
