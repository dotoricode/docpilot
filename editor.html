<title>docpilot</title>
<style>
:root{
  --g:#0E1118;--s:#161C28;--s2:#1E2535;--s3:#262F40;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --t:#DDE3EE;--t2:#8A94A8;--t3:#4A5268;
  --ac:#7C8CF8;--ac-d:rgba(124,140,248,.12);--ac-g:rgba(124,140,248,.22);
  --cy:#38BDF8;--cy-d:rgba(56,189,248,.12);--cy-g:rgba(56,189,248,.22);
  --gn:#3ECFA0;--gn-d:rgba(62,207,160,.10);
  --rd:#F07070;--rd-d:rgba(240,112,112,.10);
  --am:#F5A342;--am-d:rgba(245,163,66,.12);
  --mono:'Cascadia Code','Fira Code','JetBrains Mono',ui-monospace,Consolas,monospace;
  --ui:-apple-system,'Segoe UI',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--g);color:var(--t);
  font-family:var(--ui);font-size:15px;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
#hdr{display:flex;align-items:center;height:48px;padding:0 16px;background:var(--s);
  border-bottom:1px solid var(--bd);gap:12px;flex-shrink:0;z-index:20}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.pip{width:8px;height:8px;border-radius:50%;background:var(--ac);box-shadow:0 0 8px var(--ac)}
.vsep{width:1px;height:20px;background:var(--bd2)}
#crumb{flex:1;display:flex;align-items:center;gap:3px;font-family:var(--mono);
  font-size:12px;color:var(--t3);overflow:hidden;white-space:nowrap}
.cs{color:var(--t2)}.csl{color:var(--t3);margin:0 2px}
.hright{display:flex;align-items:center;gap:10px}
.bdot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;
  transition:background .3s,box-shadow .3s}
.bdot.on{background:var(--gn);box-shadow:0 0 7px var(--gn)}
.bdot.off{background:var(--rd)}
#blbl{font-size:11px;color:var(--t3)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 14px;
  border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;
  font-family:var(--ui);transition:background .12s,color .12s}
.btn-ghost{background:transparent;color:var(--t2)}.btn-ghost:hover{background:var(--s3);color:var(--t)}
.btn-ac{background:var(--ac-d);color:var(--ac);border:1px solid rgba(124,140,248,.22)}.btn-ac:hover{background:var(--ac-g)}
.mtog{display:flex;background:var(--s2);border-radius:6px;padding:2px}
.mbtn{padding:4px 13px;border-radius:4px;font-size:13px;font-weight:500;cursor:pointer;
  border:none;background:transparent;color:var(--t3);font-family:var(--ui);transition:background .1s,color .1s}
.mbtn.active{background:var(--s3);color:var(--t)}
.badge{display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;border-radius:9px;font-size:10px;font-weight:700;
  background:var(--cy-d);color:var(--cy)}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* TREE */
#tree{width:214px;min-width:214px;background:var(--s);border-right:1px solid var(--bd);
  overflow-y:auto;padding:8px 0}
.tlbl{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--t3);padding:10px 14px 5px}
.tf{user-select:none}
.tfhd{display:flex;align-items:center;gap:6px;padding:5px 14px;cursor:pointer;
  font-size:12px;color:var(--t2);transition:background .1s;border-radius:5px;margin:0 5px}
.tfhd:hover{background:var(--s2);color:var(--t)}
.tarr{width:12px;height:12px;flex-shrink:0;color:var(--t3);transition:transform .14s}
.tf.open .tarr{transform:rotate(90deg)}
.tfnm{flex:1;font-weight:500}
.tchl{display:none;padding-left:12px}.tf.open .tchl{display:block}
.tfi{display:flex;align-items:center;gap:6px;padding:4px 10px;cursor:pointer;
  font-size:11.5px;color:var(--t2);transition:background .1s,color .1s;
  border-radius:5px;margin:1px 5px;font-family:var(--mono)}
.tfi:hover{background:var(--s2);color:var(--t)}
.tfi.active{background:var(--ac-d);color:var(--ac)}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--t3);flex-shrink:0}
.tfi.active .tdot{background:var(--ac)}
.tfnme{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* EDITOR */
#editor{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--g)}
#etbar{display:none;align-items:center;padding:0 14px;height:36px;border-bottom:1px solid var(--bd);
  gap:8px;flex-shrink:0;background:var(--s)}
.tsep{width:1px;height:14px;background:var(--bd2)}
#tpath{font-size:11px;color:var(--t3);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ebody{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* PREVIEW */
#prev-wrap{flex:1;overflow-y:auto;display:none}
#preview{padding:20px 28px;max-width:820px;margin:0 auto;line-height:1.75;cursor:text}
#preview h1, #pmodal-body h1{font-size:21px;font-weight:700;color:var(--t);margin-bottom:8px;letter-spacing:-.02em;
  border-bottom:1px solid var(--bd);padding-bottom:11px}
#preview h2, #pmodal-body h2{font-size:16px;font-weight:600;color:var(--t);margin:26px 0 9px}
#preview h3, #pmodal-body h3{font-size:14px;font-weight:600;color:var(--t2);margin:18px 0 7px}
#preview p, #pmodal-body p{font-size:14px;color:var(--t2);margin-bottom:10px}
#preview blockquote, #pmodal-body blockquote{border-left:2px solid var(--ac);padding:8px 14px;margin:10px 0;
  background:var(--ac-d);border-radius:0 5px 5px 0}
#preview blockquote p, #pmodal-body blockquote p{color:var(--t2);margin:0;font-size:13px}
#preview code, #pmodal-body code{font-family:var(--mono);font-size:12px;background:var(--s3);padding:2px 5px;border-radius:4px;color:#B8A4F5}
#preview pre, #pmodal-body pre{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:14px 16px;overflow-x:auto;margin:10px 0}
#preview pre code, #pmodal-body pre code{background:none;padding:0;color:var(--t2);font-size:12.5px;line-height:1.65}
#preview table, #pmodal-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
#preview th, #pmodal-body th{text-align:left;padding:7px 11px;border-bottom:1px solid var(--bd2);
  color:var(--t3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
#preview td, #pmodal-body td{padding:7px 11px;border-bottom:1px solid var(--bd);color:var(--t2);vertical-align:top}
#preview li, #pmodal-body li{margin-bottom:3px;color:var(--t2);font-size:14px}
#preview ul,#preview ol, #pmodal-body ol{padding-left:19px;margin-bottom:10px}
#preview a, #pmodal-body a{color:var(--ac);text-decoration:none}#preview a:hover{text-decoration:underline}
#preview hr, #pmodal-body hr{border:none;border-top:1px solid var(--bd);margin:18px 0}
#preview strong, #pmodal-body strong{color:var(--t);font-weight:600}

/* hover highlight on clickable blocks */
#preview p:hover,#preview li:hover,#preview td:hover,#preview th:hover,
#preview h1:hover,#preview h2:hover,#preview h3:hover{
  background:rgba(56,189,248,.04);border-radius:4px;cursor:pointer}

/* EDIT SPLIT */
#edit-area{flex:1;display:none}
#edit-area.split{display:flex;flex-direction:row}
#etxt{flex:1;min-width:0;background:var(--g);color:var(--t);font-family:var(--mono);
  font-size:13px;line-height:1.75;border:none;outline:none;resize:none;
  padding:28px 32px;tab-size:2;border-right:1px solid var(--bd)}
#live-frame{flex:1;min-width:0;border:none;background:var(--g)}

/* NOFILE */
#nofile{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:12px;color:var(--t3);padding:40px;text-align:center}
.nfg{font-size:38px;opacity:.2}.nfh{font-size:15px;font-weight:600;color:var(--t2)}
.nfp{font-size:13px;line-height:1.6;max-width:220px}

/* ── INSTRUCTION BUBBLE ── */
#ibubble{
  position:fixed;display:none;flex-direction:column;gap:8px;
  width:348px;background:var(--s2);border:1px solid var(--bd2);
  border-radius:10px;padding:12px 12px 10px;
  box-shadow:0 14px 44px rgba(0,0,0,.65);z-index:300;
}
#ibubble.show{display:flex}
.ib-ctx{
  font-family:var(--mono);font-size:11px;color:var(--cy);background:var(--cy-d);
  padding:4px 9px;border-radius:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ib-row{display:flex;gap:6px;align-items:center}
#ib-input{
  flex:1;height:36px;background:var(--s3);border:1px solid var(--bd);
  border-radius:7px;color:var(--t);font-family:var(--ui);font-size:13px;
  padding:0 11px;outline:none;
}
#ib-input:focus{border-color:var(--cy)}
#ib-input::placeholder{color:var(--t3)}
#ib-send{
  width:36px;height:36px;border-radius:7px;border:none;
  background:var(--cy);color:var(--g);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#ib-send:hover{filter:brightness(1.1)}
#ib-send:disabled{opacity:.4;cursor:default}
.ib-hint{font-size:10px;color:var(--t3);padding-left:2px}

/* RIGHT PANEL */
#rpanel{width:300px;min-width:300px;background:var(--s);
  border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#rphdr{display:flex;align-items:center;padding:0 14px;height:38px;
  border-bottom:1px solid var(--bd);flex-shrink:0;gap:8px}
#rphdr-title{font-size:12px;font-weight:600;color:var(--t2);flex:1}
#rp-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.pempty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:9px;color:var(--t3)}
.pei{font-size:28px;opacity:.3}.pet{font-size:12px;text-align:center;line-height:1.6}

/* JOB CARD */
.jcard{background:var(--s2);border:1px solid rgba(56,189,248,.18);border-radius:8px;padding:10px 12px;
  transition:border-color .15s}
.jcard.done{border-color:rgba(62,207,160,.3)}
.jcard.error{border-color:rgba(240,112,112,.3)}
.jcard.applying{opacity:.6}
.jfile{font-family:var(--mono);font-size:10px;color:var(--t3);margin-bottom:6px}
.jctx{font-family:var(--mono);font-size:11px;color:var(--cy);background:var(--cy-d);
  border-left:3px solid var(--cy);padding:4px 9px;border-radius:0 4px 4px 0;
  line-height:1.5;margin-bottom:7px;max-height:48px;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.jinstr{font-size:12.5px;color:var(--t);font-weight:500;line-height:1.5;margin-bottom:7px}
.jstatus{font-size:11.5px;line-height:1.5;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.spin{width:12px;height:12px;border:2px solid rgba(56,189,248,.25);border-top-color:var(--cy);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.jstream{font-family:var(--mono);font-size:10.5px;color:var(--t2);background:var(--s3);
  border:1px solid var(--bd);border-radius:5px;padding:7px 9px;line-height:1.6;
  max-height:100px;overflow-y:auto;white-space:pre-wrap;margin-bottom:7px;word-break:break-word}
.jactions{display:flex;gap:6px}
.japply{height:28px;padding:0 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
  border:none;background:var(--gn);color:var(--g);font-family:var(--ui)}
.japply:hover{filter:brightness(1.1)}
.jreject{height:28px;padding:0 11px;border-radius:6px;font-size:12px;cursor:pointer;
  border:1px solid var(--bd);background:transparent;color:var(--t3);font-family:var(--ui)}
.jreject:hover{border-color:var(--rd);color:var(--rd)}
.jts{font-size:10px;color:var(--t3);margin-left:auto;align-self:center}
.jprev{height:28px;padding:0 11px;border-radius:6px;font-size:12px;cursor:pointer;
  border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--ui)}
.jprev:hover{border-color:var(--ac);color:var(--ac)}

/* PREVIEW MODAL */
#pmodal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
#pmodal.show{display:flex}
#pmodal-box{width:min(820px,90vw);max-height:80vh;display:flex;flex-direction:column;
  background:var(--s);border:1px solid var(--bd2);border-radius:12px;
  box-shadow:0 24px 64px rgba(0,0,0,.8);overflow:hidden}
#pmodal-hdr{display:flex;align-items:center;padding:0 18px;height:44px;
  border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px}
#pmodal-title{flex:1;font-size:13px;font-weight:600;color:var(--t2)}
#pmodal-body{flex:1;overflow-y:auto;padding:20px 28px;line-height:1.75}
#pmodal-foot{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--bd);
  flex-shrink:0;justify-content:flex-end}

::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--t3)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* PMODAL BODY inherits preview styles */
#pmodal-body h1{font-size:21px;font-weight:700;color:var(--t);margin-bottom:8px;letter-spacing:-.02em;border-bottom:1px solid var(--bd);padding-bottom:11px}
#pmodal-body h2{font-size:16px;font-weight:600;color:var(--t);margin:26px 0 9px}
#pmodal-body h3{font-size:14px;font-weight:600;color:var(--t2);margin:18px 0 7px}
#pmodal-body p{font-size:14px;color:var(--t2);margin-bottom:10px}
#pmodal-body blockquote{border-left:2px solid var(--ac);padding:8px 14px;margin:10px 0;background:var(--ac-d);border-radius:0 5px 5px 0}
#pmodal-body code{font-family:var(--mono);font-size:12px;background:var(--s3);padding:2px 5px;border-radius:4px;color:#B8A4F5}
#pmodal-body pre{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:14px 16px;overflow-x:auto;margin:10px 0}
#pmodal-body pre code{background:none;padding:0;color:var(--t2);font-size:12.5px;line-height:1.65}
#pmodal-body table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
#pmodal-body th{text-align:left;padding:7px 11px;border-bottom:1px solid var(--bd2);color:var(--t3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
#pmodal-body td{padding:7px 11px;border-bottom:1px solid var(--bd);color:var(--t2);vertical-align:top}
#pmodal-body li{margin-bottom:3px;color:var(--t2);font-size:14px}
#pmodal-body ul,#pmodal-body ol{padding-left:19px;margin-bottom:10px}
#pmodal-body a{color:var(--ac);text-decoration:none}
#pmodal-body strong{color:var(--t);font-weight:600}
#pmodal-body hr{border:none;border-top:1px solid var(--bd);margin:18px 0}
</style>

<div id="app">
  <header id="hdr">
    <div class="logo"><div class="pip"></div>docpilot</div>
    <div class="vsep"></div>
    <div id="crumb"><span style="color:var(--t3)">파일을 선택하세요</span></div>
    <div class="hright">
      <div class="bdot off" id="bdot"></div>
      <span id="blbl">bridge off</span>
      <div class="vsep"></div>
      <div class="mtog">
        <button class="mbtn active" id="mp" onclick="setMode('preview')">보기</button>
        <button class="mbtn" id="me" onclick="setMode('edit')">편집</button>
      </div>
      <button class="btn btn-ac" id="svbtn" onclick="doSave()" style="display:none">저장</button>
    </div>
  </header>

  <div id="main">
    <aside id="tree"><div class="tlbl">docs</div><div id="troot"></div></aside>

    <section id="editor">
      <div id="etbar">
        <div class="tsep"></div>
        <div id="tpath"></div>
      </div>
      <div id="ebody">
        <div id="nofile">
          <div class="nfg">📄</div>
          <div class="nfh">파일을 선택하세요</div>
          <div class="nfp">왼쪽 트리에서 문서를 클릭하면 여기에 표시됩니다</div>
        </div>
        <div id="prev-wrap"><div id="preview"></div></div>
        <div id="edit-area">
          <textarea id="etxt" spellcheck="false" oninput="onEdit()"></textarea>
          <iframe id="live-frame" sandbox="allow-same-origin" title="라이브 프리뷰"></iframe>
        </div>
      </div>
    </section>

    <aside id="rpanel">
      <div id="rphdr">
        <span id="rphdr-title">CC 작업</span>
        <span class="badge" id="ccbadge" style="display:none"></span>
        <button class="btn btn-ghost" style="height:24px;font-size:11px;padding:0 8px"
                id="clrbtn" onclick="clearJobs()" style="display:none">전체 삭제</button>
      </div>
      <div id="rp-body">
        <div class="pempty"><div class="pei">🤖</div>
          <div class="pet">문서에서 텍스트를 드래그하거나<br>문장을 클릭해 지시를 보내세요</div>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- INSTRUCTION BUBBLE -->
<div id="ibubble">
  <div class="ib-ctx" id="ib-ctx"></div>
  <div class="ib-row">
    <input id="ib-input" type="text" placeholder="무엇을 바꿀까요?" autocomplete="off"
           onkeydown="if(event.key==='Enter')subInstr()" />
    <button id="ib-send" onclick="subInstr()">↑</button>
  </div>
  <div class="ib-hint" id="ib-hint"></div>
</div>

<!-- PREVIEW MODAL -->
<div id="pmodal" onclick="if(event.target===this)closePreview()">
  <div id="pmodal-box">
    <div id="pmodal-hdr">
      <span id="pmodal-title">미리보기</span>
      <button class="btn btn-ghost" onclick="closePreview()">✕ 닫기</button>
    </div>
    <div id="pmodal-body"></div>
    <div id="pmodal-foot">
      <button class="jreject" id="pmodal-reject" onclick="closePreview()">거부</button>
      <button class="japply" id="pmodal-apply">적용</button>
    </div>
  </div>
</div>

<script>

/* ── STATE ── */
const S={file:null,mode:'preview',content:{},
  jobs:[],pending:null,bridge:false,jc:0};

/* ── IFRAME CSS ── */
const FCSS=`body{margin:0;padding:28px 32px;max-width:800px;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;
  font-size:14px;line-height:1.75;background:#0E1118;color:#DDE3EE;-webkit-font-smoothing:antialiased}
h1{font-size:20px;font-weight:700;color:#DDE3EE;margin-bottom:8px;letter-spacing:-.02em;
  border-bottom:1px solid rgba(255,255,255,.07);padding-bottom:11px}
h2{font-size:15px;font-weight:600;color:#DDE3EE;margin:26px 0 9px}
h3{font-size:13px;font-weight:600;color:#8A94A8;margin:18px 0 7px}
p{font-size:13.5px;color:#8A94A8;margin-bottom:10px}
blockquote{border-left:2px solid #7C8CF8;padding:7px 14px;margin:10px 0;
  background:rgba(124,140,248,.12);border-radius:0 5px 5px 0}
blockquote p{color:#8A94A8;margin:0;font-size:12.5px}
code{font-family:'Cascadia Code','Fira Code',ui-monospace,Consolas,monospace;font-size:11.5px;
  background:#262F40;padding:2px 5px;border-radius:4px;color:#B8A4F5}
pre{background:#1E2535;border:1px solid rgba(255,255,255,.07);border-radius:7px;
  padding:14px 16px;overflow-x:auto;margin:10px 0}
pre code{background:none;padding:0;color:#8A94A8;font-size:12px;line-height:1.65}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12.5px}
th{text-align:left;padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.13);
  color:#4A5268;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
td{padding:7px 11px;border-bottom:1px solid rgba(255,255,255,.07);color:#8A94A8;vertical-align:top}
li{margin-bottom:3px;color:#8A94A8;font-size:13.5px}
ul,ol{padding-left:19px;margin-bottom:10px}
a{color:#7C8CF8;text-decoration:none}a:hover{text-decoration:underline}
hr{border:none;border-top:1px solid rgba(255,255,255,.07);margin:18px 0}
strong{color:#DDE3EE;font-weight:600}`;

/* ── MARKDOWN ── */
function md(src){
  const blks=[];
  let s=src.replace(/```[\s\S]*?```/g,m=>{blks.push(m);return'\x00B'+(blks.length-1)+'\x00';});
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/((?:^&gt;.*\n?)+)/gm,b=>`<blockquote><p>${b.replace(/^&gt; ?/gm,'').trim()}</p></blockquote>`);
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>');
  s=s.replace(/((?:\|.+\|\n?)+)/gm,blk=>{
    const rows=blk.trim().split('\n');let out='<table>',hd=false;
    rows.forEach(r=>{if(/^\|\s*[-: |]+\|/.test(r)){hd=true;return;}
      const cells=r.replace(/^\||\|$/g,'').split('|');const tag=hd?'td':'th';
      out+='<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';if(!hd)hd=true;});
    return out+'</table>';
  });
  s=s.replace(/^---$/gm,'<hr>');
  s=s.replace(/((?:^- .+\n?)+)/gm,b=>'<ul>'+b.trim().split('\n').map(l=>`<li>${l.slice(2)}</li>`).join('')+'</ul>');
  s=s.replace(/((?:^\d+\. .+\n?)+)/gm,b=>'<ol>'+b.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('')+'</ol>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.split('\n\n').map(p=>{p=p.trim();if(!p)return'';
    if(/^<(h[1-6]|ul|ol|pre|blockquote|table|hr)/.test(p))return p;
    return'<p>'+p.replace(/\n/g,' ')+'</p>';}).join('\n');
  s=s.replace(/\x00B(\d+)\x00/g,(_,i)=>{const raw=blks[+i];const m=raw.match(/```(\w*)\n([\s\S]*?)```/);if(!m)return'';
    return`<pre><code>${m[2].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`;});
  return s;
}

/* ── LIVE FRAME ── */
let fTimer=null;
function schedFrame(){clearTimeout(fTimer);fTimer=setTimeout(updateFrame,150);}
function updateFrame(){
  const id=S.file;if(!id)return;
  const src=S.mode==='edit'?document.getElementById('etxt').value:(S.content[id]||'');
  document.getElementById('live-frame').srcdoc=
    `<!DOCTYPE html><html><head><meta charset="utf-8"><style>${FCSS}</style></head><body>${md(src)}</body></html>`;
}

/* ── TREE ── */
function buildTree(nodes,wrap){
  wrap.innerHTML='';
  nodes.forEach(n=>{
    if(n.t==='folder'){
      const div=document.createElement('div');
      div.className='tf'+(n.open?' open':'');
      div.innerHTML=`<div class="tfhd" onclick="this.parentElement.classList.toggle('open')">
        <svg class="tarr" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 3 8 6 4 9"/></svg>
        <span class="tfnm">${n.name}</span></div><div class="tchl"></div>`;
      n.children.forEach(c=>div.querySelector('.tchl').appendChild(mkF(c)));
      wrap.appendChild(div);
    } else wrap.appendChild(mkF(n));
  });
}
function mkF(n){
  const el=document.createElement('div');
  el.className='tfi'+(S.file===n.id?' active':'');
  el.innerHTML=`<div class="tdot"></div><span class="tfnme">${n.name}</span>`;
  el.onclick=()=>openFile(n.id);
  return el;
}

/* ── FILE ── */
async function openFile(id){
  S.file=id;
  const pts=id.split('/');
  document.getElementById('crumb').innerHTML=pts.map((p,i)=>
    i<pts.length-1?`<span class="cs">${p}</span><span class="csl">/</span>`
    :`<span style="color:var(--t)">${p}</span>`).join('');
  document.getElementById('etbar').style.display='flex';
  document.getElementById('tpath').textContent=id;
  if(!S.content[id]){
    if(S.bridge){
      try{
        const r=await fetch(`${BRIDGE}/file?id=${encodeURIComponent(id)}`);
        if(r.ok){const d=await r.json();S.content[id]=d.content;}
        else S.content[id]=`# ${id}\n\n(파일을 불러올 수 없습니다)`;
      }catch{S.content[id]=`# ${id}\n\n(bridge 연결 오류)`;}
    } else {
      S.content[id]=`# ${id}\n\n(bridge가 꺼져 있습니다)`;
    }
  }
  renderEditor();refreshTree();
}

/* ── EDITOR ── */
function renderEditor(){
  const id=S.file;if(!id)return;
  document.getElementById('nofile').style.display='none';
  const pw=document.getElementById('prev-wrap');
  const ea=document.getElementById('edit-area');
  if(S.mode==='preview'){
    pw.style.display='block';ea.className='';
    document.getElementById('svbtn').style.display='none';
    document.getElementById('preview').innerHTML=md(S.content[id]||'');
  } else {
    pw.style.display='none';ea.className='split';
    document.getElementById('svbtn').style.display='flex';
    document.getElementById('etxt').value=S.content[id]||'';
    updateFrame();
  }
}
function setMode(m){
  S.mode=m;
  document.getElementById('mp').classList.toggle('active',m==='preview');
  document.getElementById('me').classList.toggle('active',m==='edit');
  renderEditor();hideBubble();
}
function onEdit(){if(S.file)S.content[S.file]=document.getElementById('etxt').value;schedFrame();}
async function doSave(){
  if(S.file&&S.bridge){
    try{await fetch(`${BRIDGE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:S.file,content:S.content[S.file]||''})});}catch{}
  }
  setMode('preview');
}

/* ── BRIDGE ── */
const BRIDGE='http://localhost:7474';
async function checkBridge(){
  try{const r=await fetch(BRIDGE+'/ping',{signal:AbortSignal.timeout(800)});S.bridge=r.ok;}
  catch{S.bridge=false;}
  document.getElementById('bdot').className='bdot '+(S.bridge?'on':'off');
  document.getElementById('blbl').textContent=S.bridge?'bridge on':'bridge off';
  document.getElementById('ib-hint').textContent=
    S.bridge?'':'⚠ bridge off — node bridge.js --root /path/to/docs 실행 후 사용 가능';
}
setInterval(checkBridge,3000);checkBridge();

/* ── BUBBLE ── */
function showBubble(cx,cy){
  const bub=document.getElementById('ibubble');
  const W=window.innerWidth,H=window.innerHeight;
  const bw=348,bh=100;
  let x=cx-bw/2,y=cy-bh-14;
  if(x<8)x=8;if(x+bw>W-8)x=W-bw-8;
  if(y<8)y=cy+20; // flip below if too close to top
  bub.style.left=x+'px';bub.style.top=y+'px';
  document.getElementById('ib-ctx').textContent=trunc(S.pending.sel,52);
  document.getElementById('ib-input').value='';
  bub.classList.add('show');
  setTimeout(()=>document.getElementById('ib-input').focus(),40);
}
function hideBubble(){
  document.getElementById('ibubble').classList.remove('show');
  S.pending=null;
}

/* ── SELECTION (drag) ── */
let hadSel=false;
document.addEventListener('mouseup',e=>{
  if(e.target.closest('#ibubble'))return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){hadSel=false;return;}
  const txt=sel.toString().trim();
  if(!txt||txt.length<2){hadSel=false;return;}
  if(!document.getElementById('preview').contains(sel.anchorNode)){hadSel=false;return;}
  hadSel=true;
  S.pending={sel:txt};
  const rect=sel.getRangeAt(0).getBoundingClientRect();
  showBubble(rect.left+rect.width/2,rect.top);
});

/* ── CLICK (single sentence) ── */
document.getElementById('preview')&&(function(){
  // will be re-attached after preview renders
})();

document.addEventListener('click',e=>{
  if(e.target.closest('#ibubble'))return;
  if(hadSel){hadSel=false;return;} // just finished a drag
  if(S.mode!=='preview')return;
  const preview=document.getElementById('preview');
  if(!preview.contains(e.target))return;
  const sel=window.getSelection();
  if(sel&&!sel.isCollapsed)return;

  const BLOCK=new Set(['P','LI','H1','H2','H3','H4','H5','H6','TD','TH']);
  let el=e.target;
  while(el&&el!==preview&&!BLOCK.has(el.tagName))el=el.parentElement;
  if(!el||el===preview)return;
  const txt=el.textContent.trim();
  if(!txt||txt.length<3)return;
  S.pending={sel:txt};
  showBubble(e.clientX,e.clientY);
});

document.addEventListener('mousedown',e=>{
  if(!e.target.closest('#ibubble'))hideBubble();
});

/* ── SUBMIT INSTRUCTION ── */
function subInstr(){
  const instr=document.getElementById('ib-input').value.trim();
  if(!instr||!S.pending||!S.file)return;
  const ctrl=new AbortController();
  const job={
    id:'j'+(++S.jc),fileId:S.file,sel:S.pending.sel,instr,
    ts:ts(),state:'working',stream:'',proposed:null,
    startedAt:Date.now(),ctrl,
  };
  S.jobs.unshift(job);
  hideBubble();
  renderJobs();syncB();
  if(S.bridge)executeJob(job.id);
  else{job.state='error';job.stream='bridge가 연결되지 않았습니다.\nnode docs-bridge.js 를 실행하세요.';renderJobs();}
  // 120초 타임아웃
  setTimeout(()=>{
    const j=S.jobs.find(x=>x.id===job.id);
    if(j&&j.state==='working'){j.ctrl.abort();j.state='error';j.stream='타임아웃 (120s)';renderJobs();}
  },120000);
}

/* ── JOB EXECUTION ── */
async function executeJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job)return;
  try{
    const res=await fetch(BRIDGE+'/instruct',{
      method:'POST',headers:{'Content-Type':'application/json'},
      signal:job.ctrl.signal,
      body:JSON.stringify({fileId:job.fileId,context:job.sel,instruction:job.instr,content:S.content[job.fileId]||''}),
    });
    if(!res.ok){job.state='error';job.stream=`HTTP ${res.status}`;renderJobs();return;}
    const reader=res.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value);
      const lines=buf.split('\n\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const ev=JSON.parse(line.slice(6));
          if(ev.chunk){job.stream+=ev.chunk;renderJobs();}
          if(ev.done){job.state='done';job.proposed=ev.proposed;renderJobs();}
          if(ev.error){job.state='error';job.stream=ev.error;renderJobs();}
        }catch{}
      }
    }
    if(job.state==='working'){job.state='done';job.proposed=job.stream;}
    renderJobs();
  }catch(err){
    if(err.name==='AbortError')return; // timeout already handled
    job.state='error';job.stream=err.message;renderJobs();
  }
}

async function applyJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job||!job.proposed)return;
  S.content[job.fileId]=job.proposed;
  if(S.bridge){
    try{await fetch(`${BRIDGE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:job.fileId,content:job.proposed})});}catch{}
  }
  S.jobs=S.jobs.filter(j=>j.id!==id);
  if(S.file===job.fileId)renderEditor();
  renderJobs();syncB();
}
function rejectJob(id){S.jobs=S.jobs.filter(j=>j.id!==id);renderJobs();syncB();}
function clearJobs(){S.jobs=[];renderJobs();syncB();}

/* ── RENDER JOBS ── */
function renderJobs(){
  const wrap=document.getElementById('rp-body');
  if(!S.jobs.length){
    wrap.innerHTML=`<div class="pempty"><div class="pei">🤖</div>
      <div class="pet">문서에서 텍스트를 드래그하거나<br>문장을 클릭해 지시를 보내세요</div></div>`;
    return;
  }
  wrap.innerHTML=S.jobs.map(j=>{
    let body='';
    if(j.state==='working'){
      const sec=Math.floor((Date.now()-j.startedAt)/1000);
      body=`<div class="jstatus"><div class="spin"></div>작업 중… ${sec}s</div>
        ${j.stream?`<div class="jstream">${esc(j.stream)}</div>`:''}`;
    } else if(j.state==='done'){
      const ol=(S.content[j.fileId]||'').split('\n').length;
      const nl=(j.proposed||'').split('\n').length;
      body=`<div class="jstatus" style="color:var(--gn)">✓ 완료 — ${ol}줄 → ${nl}줄</div>
        <div class="jactions">
          <button class="jprev" onclick="previewJob('${j.id}')">미리보기</button>
          <button class="japply" onclick="applyJob('${j.id}')">적용</button>
          <button class="jreject" onclick="rejectJob('${j.id}')">거부</button>
          <span class="jts">${j.ts}</span>
        </div>`;
    } else if(j.state==='error'){
      body=`<div class="jstatus" style="color:var(--rd)">✗ ${esc(j.stream.slice(0,80))}</div>
        <div class="jactions"><button class="jreject" onclick="rejectJob('${j.id}')">닫기</button></div>`;
    }
    return`<div class="jcard ${j.state}">
      <div class="jfile">${j.fileId}</div>
      <div class="jctx">${esc(j.sel)}</div>
      <div class="jinstr">${esc(j.instr)}</div>
      ${body}
    </div>`;
  }).join('');
}

/* ── BADGES ── */
function syncB(){
  const n=S.jobs.length;
  const b=document.getElementById('ccbadge');
  b.style.display=n?'inline-flex':'none';b.textContent=n;
  document.getElementById('clrbtn').style.display=n?'inline-flex':'none';
}

/* ── PREVIEW MODAL ── */
let _previewJobId=null;
function previewJob(id){
  const job=S.jobs.find(j=>j.id===id);if(!job||!job.proposed)return;
  _previewJobId=id;
  document.getElementById('pmodal-title').textContent=`미리보기 — ${job.fileId}`;
  document.getElementById('pmodal-body').innerHTML=md(job.proposed);
  document.getElementById('pmodal-apply').onclick=()=>{applyJob(id);closePreview();};
  document.getElementById('pmodal-reject').onclick=()=>{rejectJob(id);closePreview();};
  document.getElementById('pmodal').classList.add('show');
}
function closePreview(){
  document.getElementById('pmodal').classList.remove('show');
  _previewJobId=null;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePreview();});

/* ── UTILS ── */
function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}
function ts(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── TICK (elapsed time for working jobs) ── */
setInterval(()=>{if(S.jobs.some(j=>j.state==='working'))renderJobs();},1000);

/* ── TREE FROM PATHS ── */
let _tree=[];
function buildTreeFromPaths(paths){
  const root=[];const folders={};
  for(const id of paths){
    const parts=id.split('/');
    if(parts.length===1){
      root.push({t:'file',id,name:parts[0]});
    } else {
      const fn=parts[0];
      if(!folders[fn]){folders[fn]={t:'folder',name:fn,open:true,children:[]};root.push(folders[fn]);}
      folders[fn].children.push({t:'file',id,name:parts[parts.length-1]});
    }
  }
  return root;
}
function refreshTree(){buildTree(_tree,document.getElementById('troot'));}

/* ── INIT ── */
async function init(){
  await checkBridge();
  if(!S.bridge){refreshTree();return;}
  try{
    const r=await fetch(`${BRIDGE}/files`);
    if(r.ok){const d=await r.json();_tree=buildTreeFromPaths(d.files);}
  }catch{}
  refreshTree();
  if(_tree.length>0){
    const first=_tree[0].t==='file'?_tree[0].id:(_tree[0].children&&_tree[0].children[0]?.id);
    if(first)openFile(first);
  }
}
init();
</script>
