function parseTocHeadings(){
  const src=S.content[S.file]||'';
  const lines=src.split('\n');
  const headings=[];
  let inFence=false;
  lines.forEach((line,i)=>{
    if(/^(```|~~~)/.test(line.trim())){
      inFence=!inFence;
      return;
    }
    if(inFence)return;
    const m=line.match(/^(#{1,3})\s+(.+)$/);
    if(!m)return;
    const text=m[2].trim();
    if(isTemplateTocHeading(text))return;
    headings.push({level:m[1].length,text,lineIdx:i});
  });
  return headings;
}

function isTemplateTocHeading(text){
  return /^(FR|NFR|SPEC|TC)-\{[^}]+\}/i.test(text)||
    /^(FR|NFR)\s*\/\s*(FR|NFR)$/i.test(text)||
    /^[A-Z]{2,6}\s*\/\s*[A-Z]{2,6}$/.test(text);
}

function renderToc(){
  const rail=document.getElementById('toc-rail');
  const list=document.getElementById('toc-list');
  if(!rail||!list)return;
  if(!S.file||S.mode!=='preview'||S.diffOn){
    rail.classList.add('hidden');
    rail.style.transform='';
    rail.style.left='';
    rail.style.top='';
    rail.style.maxHeight='';
    document.getElementById('prev-wrap')?.classList.remove('has-toc');
    list.innerHTML='';
    S._tocHeadings=[];
    return;
  }
  const headings=parseTocHeadings();
  S._tocHeadings=headings;
  if(!headings.length){
    rail.classList.remove('hidden');
    document.getElementById('prev-wrap')?.classList.add('has-toc');
    list.innerHTML='<div class="toc-empty">목차 없음</div>';
    syncTocPosition();
    return;
  }
  rail.classList.remove('hidden');
  document.getElementById('prev-wrap')?.classList.add('has-toc');
  list.innerHTML=headings.map((h,i)=>
    `<button class="toc-item toc-h${h.level}" onclick="tocItemClick(${i},event)"
      title="${escA(h.text)}">
      <span class="toc-title">${esc(h.text)}</span>
    </button>`
  ).join('');
  syncTocPosition();
  updateTocActive();
}

function syncTocPosition(){
  const rail=document.getElementById('toc-rail');
  const wrap=document.getElementById('prev-wrap');
  if(!rail||!wrap||rail.classList.contains('hidden'))return;
  const rect=wrap.getBoundingClientRect();
  rail.style.transform='';
  rail.style.left=`${rect.left+12}px`;
  rail.style.top=`${rect.top+14}px`;
  rail.style.maxHeight=`${Math.max(120,rect.height-28)}px`;
}

function tocItemClick(idx,e){
  e.preventDefault();
  tocScroll(idx);
}

function tocScroll(idx){
  const headings=S._tocHeadings||parseTocHeadings();
  if(!headings[idx])return;
  const wrap=document.getElementById('prev-wrap');
  const preview=document.getElementById('preview');
  if(!wrap||!preview)return;
  const el=tocHeadingElements()[idx];
  if(!el)return;
  const target=el.offsetTop-wrap.offsetTop-tocScrollOffset(wrap);
  wrap.scrollTo({top:Math.max(0,target),behavior:'smooth'});
}

function tocScrollOffset(wrap){
  return Math.max(80,Math.floor((wrap?.clientHeight||0)/3));
}

function tocHeadingElements(){
  const preview=document.getElementById('preview');
  if(!preview)return [];
  return [...preview.querySelectorAll('h1,h2,h3')]
    .filter(el=>!isTemplateTocHeading(el.textContent.trim()));
}

(function initDrawCanvas(){
  const canvas=document.getElementById('draw-canvas');
  const point=e=>({x:e.clientX,y:e.clientY});

  function scheduleRangeUpdate(){
    if(_drawRafId)return;
    _drawRafId=requestAnimationFrame(()=>{
      _drawRafId=null;
      if(!_drawIsDrawing||!_drawStartPoint||!_drawPendingPoint)return;
      updateRangeSelection(_drawStartPoint,_drawPendingPoint);
      _drawPendingPoint=null;
    });
  }

  canvas.addEventListener('mousedown',e=>{
    _drawIsDrawing=true;
    clearDrawHighlights();
    const viewportPad=80;
    _drawCachedRects=previewBlocks()
      .map(el=>({el,r:el.getBoundingClientRect()}))
      .filter(({r})=>r.bottom>=-viewportPad&&r.top<=window.innerHeight+viewportPad);
    _drawStartPoint=point(e);
    _drawPendingPoint=_drawStartPoint;
    updateRangeSelection(_drawStartPoint,_drawStartPoint);
  });
  canvas.addEventListener('mousemove',e=>{
    if(!_drawIsDrawing)return;
    _drawPendingPoint=point(e);
    scheduleRangeUpdate();
  });
  canvas.addEventListener('mouseup',e=>{
    if(!_drawIsDrawing)return;
    if(_drawStartPoint)updateRangeSelection(_drawStartPoint,point(e));
    _drawIsDrawing=false;
    _finalizeDrawSel();
    hideRangeBox();
  });
  canvas.addEventListener('mouseleave',()=>{
    if(_drawIsDrawing){_drawIsDrawing=false;_finalizeDrawSel();hideRangeBox();}
  });
})();

function rangeFromPoints(a,b){
  return {
    left:Math.min(a.x,b.x),
    right:Math.max(a.x,b.x),
    top:Math.min(a.y,b.y),
    bottom:Math.max(a.y,b.y),
  };
}

function rectIntersects(a,b){
  return a.left<=b.right&&a.right>=b.left&&a.top<=b.bottom&&a.bottom>=b.top;
}

function updateRangeBox(range){
  const box=document.getElementById('range-box');
  const host=document.getElementById('ebody').getBoundingClientRect();
  box.style.display='block';
  box.style.left=(range.left-host.left)+'px';
  box.style.top=(range.top-host.top)+'px';
  box.style.width=Math.max(1,range.right-range.left)+'px';
  box.style.height=Math.max(1,range.bottom-range.top)+'px';
}

function hideRangeBox(){
  const box=document.getElementById('range-box');
  box.style.display='none';
  box.style.width='0';
  box.style.height='0';
}

function updateRangeSelection(start,current){
  if(!_drawCachedRects)return;
  const range=rangeFromPoints(start,current);
  updateRangeBox(range);
  const next=new Set();
  for(const {el,r} of _drawCachedRects){
    if(rectIntersects(range,r))next.add(el);
  }
  _drawHitSet.forEach(el=>{
    if(!next.has(el))el.classList.remove('draw-hit');
  });
  next.forEach(el=>{
    if(!_drawHitSet.has(el))el.classList.add('draw-hit');
  });
  _drawHitSet=next;
}

function clearDrawHighlights(){
  if(_drawHitSet.size){
    _drawHitSet.forEach(el=>el.classList.remove('draw-hit'));
    _drawHitSet.clear();
    return;
  }
  document.querySelectorAll('.draw-hit').forEach(el=>el.classList.remove('draw-hit'));
}

function _finalizeDrawSel(){
  if(S.diffOn)return;
  const hits=[..._drawHitSet];
  clearDrawHighlights();
  if(!hits.length)return;
  const texts=hits.map(el=>el.textContent.trim()).filter(t=>t.length>1);
  const selectedBlockKeys=hits.map(blockKeyForElement).filter(Boolean);
  if(texts.length)addChip(texts.join('\n'),{source:'range',selectedBlockKeys});
}

function updateTocActive(){
  if(!S.file)return;
  const wrap=document.getElementById('prev-wrap');
  const items=document.querySelectorAll('.toc-item');
  if(!items.length)return;
  const scrollTop=wrap.scrollTop;
  const headings=S._tocHeadings||[];
  const els=tocHeadingElements();
  const activationLine=scrollTop+60;
  let activeIdx=0;
  for(let i=0;i<els.length;i++){
    if(els[i].offsetTop-wrap.offsetTop<=activationLine)activeIdx=i;
  }
  if(headings.length&&activeIdx>=headings.length)activeIdx=headings.length-1;
  items.forEach((it,i)=>it.classList.toggle('toc-active',i===activeIdx));
}

/* ── TREE FROM PATHS ── */
let _tree=[];
function buildTreeFromPaths(paths,workspaceRoots=[]){
  const root=[];
  const folderMaps=new WeakMap();
  function getFolder(parentChildren, name, id){
    let map=folderMaps.get(parentChildren);
    if(!map){map=new Map();folderMaps.set(parentChildren,map);}
    let folder=map.get(name);
    if(!folder){
      folder={t:'folder',id,name,open:false,children:[]};
      parentChildren.push(folder);
      map.set(name,folder);
    }
    return folder;
  }
  const roots=Array.isArray(workspaceRoots)?workspaceRoots:[];
  const rootById=new Map(roots.map(item=>[item.id,item]));
  let mainChildren=root;
  if(roots.length){
    const rootName=String(S.root||document.getElementById('root-badge')?.title||'').split(/[\\/]+/).filter(Boolean).pop()||'project';
    const primary={t:'folder',id:'',name:rootName,open:true,workspaceRoot:true,path:S.root||'',children:[]};
    root.push(primary);
    mainChildren=primary.children;
  }
  const workspaceNodes=new Map();
  for(const item of roots){
    if(!item?.id)continue;
    const node={t:'folder',id:item.id,name:item.name||item.id,open:true,workspaceRoot:true,path:item.path||'',children:[]};
    workspaceNodes.set(item.id,node);
    root.push(node);
  }
  for(const id of paths){
    const rootId=String(id).split('/')[0];
    const ws=rootById.get(rootId);
    if(ws){
      const rel=id.slice(rootId.length+1);
      if(!rel)continue;
      const parts=rel.split('/');
      let children=workspaceNodes.get(rootId).children;
      for(let i=0;i<parts.length-1;i++){
        children=getFolder(children,parts[i],`${rootId}/${parts.slice(0,i+1).join('/')}`).children;
      }
      children.push({t:'file',id,name:parts[parts.length-1]});
      continue;
    }
    const parts=id.split('/');
    let children=mainChildren;
    for(let i=0;i<parts.length-1;i++){
      children=getFolder(children,parts[i],parts.slice(0,i+1).join('/')).children;
    }
    children.push({t:'file',id,name:parts[parts.length-1]});
  }
  return root;
}
function openTreePath(fileId){
  const folders=new Set(fileId.split('/').slice(0,-1).map((_,i,arr)=>arr.slice(0,i+1).join('/')));
  function walk(nodes){
    nodes.forEach(n=>{
      if(n.t==='folder'){
        if(folders.has(n.id))n.open=true;
        walk(n.children||[]);
      }
    });
  }
  walk(_tree);
}
function findTreeFolder(id,nodes=_tree){
  for(const n of nodes){
    if(n.t!=='folder')continue;
    if(n.id===id)return n;
    const hit=findTreeFolder(id,n.children||[]);
    if(hit)return hit;
  }
  return null;
}
function toggleTreeFolder(id){
  const folder=findTreeFolder(id);
  if(!folder)return;
  folder.open=!folder.open;
  refreshTree();
}
function refreshTree(){buildTree(_tree,document.getElementById('troot'));}

function cancelTreeFile(){
  const slot=document.getElementById('tree-new-file-slot');

function normalizeNewFileId(raw,baseDir=''){
  let id=String(raw||'').trim().replace(/\\/g,'/').replace(/^\/+/,'');
  if(!id)return '';
  if(id.split('/').some(part=>!part||part==='.'||part==='..'||part.startsWith('.')))return '';
  if(!/\.[^/.]+$/.test(id))id+='.md';
  const base=String(baseDir||'').trim().replace(/\\/g,'/').replace(/^\/+|\/+$/g,'');
  if(base&&id!==base&&!id.startsWith(base+'/'))id=`${base}/${id}`;
  return id;
}

async function createTreeFile(){
  const input=document.getElementById('tree-new-file-input');
  const id=normalizeNewFileId(input?.value,treeNewFileBaseDir);
  if(!id){input?.focus();return;}
  if(S.files.includes(id)){await openFile(id);setMode('edit');cancelTreeFile();return;}
  const title=id.split('/').pop().replace(/\.[^.]+$/,'');
  const content=`# ${title}\n`;
  if(S.bridge){
    const r=await fetch(`${BRIDGE}/save`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,content})});
    if(!r.ok){input?.focus();return;}
  }
  S.files.push(id);
  S.files=[...new Set(S.files)].sort((a,b)=>a.localeCompare(b));
  S.localNewFiles.add(id);
  S.content[id]=content;
  _tree=buildTreeFromPaths(S.files,S.workspaceRoots);
  openTreePath(id);
  cancelTreeFile();
  await openFile(id);
  setMode('edit');
}

async function addWorkspaceFolder(){
  closeTreeContextMenu();
  if(!S.bridge){
    setEmptyState('empty','문서 연결이 필요합니다');
    return;
  }
  let folder='';
  try{
    if(window.docpilot?.chooseWorkspaceFolder)folder=await window.docpilot.chooseWorkspaceFolder();
  }catch{}
  if(!folder){
    try{
      if(window.docpilot?.openFolderDialog)folder=await window.docpilot.openFolderDialog();
    }catch{}
  }
  if(!folder){
    setEmptyState('empty','폴더 선택이 취소되었거나 사용할 수 없습니다');
    return;
  }
  if(!folder)return;
  try{
    const r=await fetch(`${BRIDGE}/workspace-roots`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({path:folder}),
    });
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();
    S.workspaceRoots=Array.isArray(d.roots)?d.roots:S.workspaceRoots;
    S.files=Array.isArray(d.files)?d.files:S.files;
    _tree=buildTreeFromPaths(S.files,S.workspaceRoots);
    refreshTree();
    renderInstructionFiles();
  }catch(err){
    setEmptyState('empty','폴더를 workspace에 추가하지 못했습니다');
  }
}

/* ── INIT ── */
async function init(){
	  syncDiffControls();
	  syncAiModeUi();
	  renderRightPanel();
  setEmptyState('loading','브리지 연결을 확인하고 있습니다');
  try{
    const version=await window.docpilot?.getAppVersion?.();
    if(version)document.getElementById('version-badge').textContent='v'+version;
  }catch{}
  await checkBridge();
  setEmptyState('loading','파일 트리를 스캔하고 있습니다');
  try{
    const r=await fetch(`${BRIDGE}/files`);
    if(r.ok){
      const d=await r.json();
      S.files=d.files||[];
      S.workspaceRoots=Array.isArray(d.roots)?d.roots:S.workspaceRoots;
      if(window.INITIAL_OPEN_FILE&&!S.files.includes(window.INITIAL_OPEN_FILE)){
        S.files.unshift(window.INITIAL_OPEN_FILE);
      }
      _tree=buildTreeFromPaths(S.files,S.workspaceRoots);
      renderInstructionFiles();
      await loadFileStatus();
    }
  }catch{
    if(!S.bridge){refreshTree();renderInstructions();setEmptyState('empty','문서 연결이 필요합니다');return;}
    setEmptyState('empty','파일 목록을 가져오지 못했습니다');
  }
	  await loadInstructions();
	  await loadSessions();
	  if(!S.activeSessionId&&S.sessions.length)S.activeSessionId=S.sessions.find(s=>s.agent===S.aiMode)?.id||S.sessions[0].id;
	  const bootSession=S.sessions.find(s=>s.id===S.activeSessionId);
	  if(bootSession?.agent)S.aiMode=bootSession.agent==='codex'?'codex':'claude';
	  if(!S.activeSessionId&&S.bridge){
	    try{
	      const session=await ensureConsoleSession(S.aiMode);
	      S.activeSessionId=session.id;
	      S.aiMode=session.agent==='codex'?'codex':'claude';
	    }catch{}
	  }
	  syncAiModeUi();
	  renderRightPanel();
  refreshTree();
  if(window.INITIAL_OPEN_FILE&&S.files.includes(window.INITIAL_OPEN_FILE)){
    openTreePath(window.INITIAL_OPEN_FILE);
    openFile(window.INITIAL_OPEN_FILE);
  }else if(S.files.length){
    setEmptyState('ready');
  }else{
    setEmptyState('empty','이 폴더에서 문서를 찾지 못했습니다');
  }
}
